function toggleSound(){if(!audioCtx){initAudio();return}soundOn=!soundOn;if(audioCtx.state==='suspended')audioCtx.resume();const t=audioCtx.currentTime;masterGain.gain.cancelScheduledValues(t);masterGain.gain.linearRampToValueAtTime(soundOn?.5:.001,t+2);updateSoundUI()}function tuneVoices(settledRatio){if(!audioCtx||!soundOn)return;const t=audioCtx.currentTime,rootHz=BASE_HZ*(1+pFx*.12),partnerHz=rootHz*ENO_RATIOS[Math.round(pFy)%ENO_RATIOS.length],wetTarget=.15+settledRatio*.5+(strata.length/CFG.MAX_LAYERS)*.2;reverbGain.gain.cancelScheduledValues(t);reverbGain.gain.linearRampToValueAtTime(cl(wetTarget,.1,.85),t+7);voices.forEach((v,i)=>{const base=i>=3?partnerHz:rootHz;let hz=base*HARM[i%HARM.length];while(hz>500)hz/=2;while(hz<28)hz*=2;const detune=(kX-.5)*8+(kY-.5)*5;v.osc.frequency.cancelScheduledValues(t);v.osc.frequency.linearRampToValueAtTime(hz+detune,t+9);v.lfog.gain.cancelScheduledValues(t);v.lfog.gain.linearRampToValueAtTime(kY*3.5,t+4);v.phase+=.006+i*.0025;const amp=Math.max(0,Math.sin(v.phase))*.10+strata.length*.008;v.gain.gain.cancelScheduledValues(t);v.gain.gain.linearRampToValueAtTime(Math.min(amp,.14),t+6)});txt('m-voice',rootHz.toFixed(0)+'hz')}
function pushSlip(gen,fx,fy,kinName,fit,grey){const slip=document.createElement('div');slip.className='epoch-slip';slip.dataset.fx=fx.toFixed(3);slip.dataset.fy=fy.toFixed(3);slip.dataset.kinIdx=kinModeIdx;slip.dataset.kx=kX.toFixed(3);slip.dataset.ky=kY.toFixed(3);const sw=document.createElement('div');sw.className='swatch';sw.style.background=greyHex(grey);const t=document.createElement('div');t.className='act';t.textContent=`[G${String(gen).padStart(3,'0')}] L(${fx.toFixed(2)},${fy.toFixed(2)}) KIN:${kinName.split('·')[0]} FIT=${fit.toFixed(4)}`;slip.append(sw,t);slip.addEventListener('pointerdown',e=>{e.preventDefault();snapToSlip(slip)});$('ledger').insertBefore(slip,$('ledger').firstChild);while($('ledger').children.length>CFG.LEDGER_MAX)$('ledger').removeChild($('ledger').lastChild)}
function refreshActiveSlip(){const first=$('ledger').firstChild;if(!first)return;const act=first.querySelector('.act');if(act)act.textContent=`[G${String(generation).padStart(3,'0')}] L(${pFx.toFixed(2)},${pFy.toFixed(2)}) ${KIN_MODES[kinModeIdx].name} ·`}function snapToSlip(slip){pFx=parseFloat(slip.dataset.fx);pFy=parseFloat(slip.dataset.fy);kinModeIdx=parseInt(slip.dataset.kinIdx)||0;kX=parseFloat(slip.dataset.kx)||.5;kY=parseFloat(slip.dataset.ky)||.5;buildPlate();syncReticles();updateKinUI();document.querySelectorAll('.epoch-slip.sel').forEach(s=>s.classList.remove('sel'));slip.classList.add('sel');if(!isManual)toManual()}
function syncReticles(){const nx=(pFx-CFG.FX[0])/(CFG.FX[1]-CFG.FX[0]),ny=(pFy-CFG.FY[0])/(CFG.FY[1]-CFG.FY[0]);$('ret-L').style.left=nx*100+'%';$('ret-L').style.top=ny*100+'%';txt('ro-L',`${pFx.toFixed(2)}·${pFy.toFixed(2)}`);const m=KIN_MODES[kinModeIdx],pX=m.xRange[0]+kX*(m.xRange[1]-m.xRange[0]),pY=m.yRange[0]+kY*(m.yRange[1]-m.yRange[0]);$('ret-R').style.left=kX*100+'%';$('ret-R').style.top=kY*100+'%';txt('ro-R',`${pX.toFixed(2)}·${pY.toFixed(2)}`)}function updateKinUI(){const m=KIN_MODES[kinModeIdx];txt('kin-mode-lbl',m.pX+'·'+m.pY);txt('m-kin',m.name.split('·')[0])}
function scrubL(cx,cy){const r=$('pad-L').getBoundingClientRect(),nx=cl((cx-r.left)/r.width,0,1),ny=cl((cy-r.top)/r.height,0,1);pFx=CFG.FX[0]+nx*(CFG.FX[1]-CFG.FX[0]);pFy=CFG.FY[0]+ny*(CFG.FY[1]-CFG.FY[0]);$('ret-L').style.left=nx*100+'%';$('ret-L').style.top=ny*100+'%';txt('ro-L',`${pFx.toFixed(2)}·${pFy.toFixed(2)}`);buildPlate();refreshActiveSlip()}function scrubR(cx,cy){const r=$('pad-R').getBoundingClientRect();kX=cl((cx-r.left)/r.width,0,1);kY=cl((cy-r.top)/r.height,0,1);syncReticles();refreshActiveSlip()}function bindPad(pad,fn){let down=false;pad.addEventListener('pointerdown',e=>{e.preventDefault();down=true;pad.setPointerCapture(e.pointerId);if(!isManual)toManual();fn(e.clientX,e.clientY)});pad.addEventListener('pointermove',e=>{if(down){e.preventDefault();fn(e.clientX,e.clientY)}});['pointerup','pointercancel','pointerleave'].forEach(ev=>pad.addEventListener(ev,()=>down=false))}bindPad($('pad-L'),scrubL);bindPad($('pad-R'),scrubR);
function toManual(){isManual=true;txt('btn-mode','✋ MANUAL');$('btn-mode').classList.add('on');txt('mode-badge','MANUAL');$('mode-badge').classList.add('manual')}function toAuto(){isManual=false;txt('btn-mode','⚙ AUTO');$('btn-mode').classList.add('on');txt('mode-badge','AUTO');$('mode-badge').classList.remove('manual');document.querySelectorAll('.epoch-slip.sel').forEach(s=>s.classList.remove('sel'))}
$('btn-mode').addEventListener('click',()=>isManual?toAuto():toManual());$('btn-fork').addEventListener('click',()=>{genome=new QG(pFx,pFy);toAuto()});$('btn-kin').addEventListener('click',()=>{kinModeIdx=(kinModeIdx+1)%KIN_MODES.length;updateKinUI();syncReticles()});$('btn-field').addEventListener('click',()=>{isField=!isField;$('btn-field').classList.toggle('on',isField);rebuildField()});$('btn-clear').addEventListener('click',()=>{strata.forEach(l=>{scene.remove(l.mesh.mesh);l.mesh.geo.dispose();l.mesh.mesh.material.dispose()});strata.length=0;worms.fill(0);reorderStrata();txt('layer-badge','LAYER 0');txt('m-lay','0')});$('btn-reset').addEventListener('click',()=>{genome=new QG(2+rn()*5,3+rn()*4);pFx=genome.fx;pFy=genome.fy;kX=.5;kY=.5;generation=0;epochStep=0;lastFit=0;worms.fill(0);strata.forEach(l=>{scene.remove(l.mesh.mesh);l.mesh.geo.dispose();l.mesh.mesh.material.dispose()});strata.length=0;$('ledger').innerHTML='';reorderStrata();buildPlate();syncReticles();updateKinUI();invertSand();pushSlip(0,pFx,pFy,KIN_MODES[0].name,0,0);toAuto()});$('snd').addEventListener('click',()=>audioCtx?toggleSound():initAudio());document.addEventListener('pointerdown',()=>{if(!audioCtx)initAudio()},{once:true});
function resizeRenderer(){const r=$('canvas-wrap').getBoundingClientRect();renderer.setSize(r.width,r.height,false);camera.aspect=r.width/r.height;camera.updateProjectionMatrix()}function endEpoch(){lastFit=fitness();let set=0;for(let i=0;i<N;i++)if(py[i]<.12)set++;const settledRatio=set/N;pushStratum();txt('layer-badge',`LAYER ${strata.length}`);txt('m-lay',strata.length);pushSlip(generation,pFx,pFy,KIN_MODES[kinModeIdx].name,lastFit,layerGreyForDepth(0,strata.length));tuneVoices(settledRatio);if(!isManual){genome=lastFit<.002?new QG(1+rn()*7,1+rn()*7):genome.mutate(lastFit);pFx=genome.fx;pFy=genome.fy;if(rn()<.15)kinModeIdx=(kinModeIdx+1)%KIN_MODES.length;kX=cl(kX+(rn()-.5)*.15,0,1);kY=cl(kY+(rn()-.5)*.12,0,1);syncReticles();updateKinUI()}generation++;epochStep=0;buildPlate();invertSand()}
function updateUI(){txt('m-ep',`${epochStep}/${CFG.EPOCH}`);txt('m-gen',generation);txt('m-fit',lastFit.toFixed(4));let set=0;for(let i=0;i<N;i++)if(py[i]<.12)set++;txt('m-set',((set/N)*100).toFixed(1)+'%')}let lastT=0;function loop(ts){requestAnimationFrame(loop);if(ts-lastT>=CFG.STEP_MS){lastT=ts;driftStep();epochStep++;if(epochStep>=CFG.EPOCH)endEpoch();paintActiveStratum();syncParticles();updateUI()}renderer.render(scene,camera)}
function boot(){resizeRenderer();buildPlate();syncReticles();updateKinUI();invertSand();pushSlip(0,pFx,pFy,KIN_MODES[0].name,0,0);requestAnimationFrame(loop)}window.addEventListener('resize',resizeRenderer);boot();
</script>
