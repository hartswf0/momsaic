<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="theme-color" content="#0f1216">
<title>THE PARIS MODEL · VERDICT ENGINE</title>
<style>
/* ============================================================
   THE PARIS MODEL — legible build
   Slate ground (not absolute black). Body text near-white at full
   opacity. Labels lifted for contrast. Named accents kept.
   No border-radius on rectangles. No emoji (marks drawn as SVG/CSS).
   IBM Plex Mono. Mobile-first. Power-of-10 named ceilings.
   ============================================================ */
@import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500;600;700&display=swap');
:root{
  --bg:#0f1216; --bg2:#151a20; --bg3:#1b2129;
  --ink:#f2f5f7; --ink2:#cdd5dc; --label:#9fb0bd; --faint:#6f7d89;
  --line:#2b333c; --line2:#3d4753;
  --teal:#2ff0d2; --amber:#ffcf3f; --red:#ff5a52; --blue:#5b9bff;
  --safe-b:env(safe-area-inset-bottom,0px); --safe-t:env(safe-area-inset-top,0px);
  --mono:"IBM Plex Mono",ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;height:100%;height:100dvh;background:var(--bg);color:var(--ink);font-family:var(--mono);overflow:hidden;overscroll-behavior:none;-webkit-font-smoothing:antialiased}
button,input,textarea{font:inherit;color:inherit}
button{cursor:pointer;background:none;border:none}
#app{position:fixed;inset:0;display:flex;flex-direction:column;padding:calc(var(--safe-t) + 12px) 14px calc(var(--safe-b) + 8px);overflow:hidden}
#topbar{display:flex;align-items:center;justify-content:space-between;flex:0 0 auto;padding-bottom:12px}
.brand{display:flex;align-items:center;gap:10px;font-weight:600;letter-spacing:.1em;font-size:clamp(14px,4vw,20px)}
.brand .slash{color:var(--teal);font-weight:700}
.brand .sub{color:var(--label);font-weight:400;letter-spacing:.14em;font-size:clamp(7px,1.9vw,10px)}
.turnbadge{display:flex;align-items:center;gap:8px;border:1px solid var(--teal);padding:7px 13px;font-size:11px;letter-spacing:.1em;font-weight:600;color:var(--teal)}
.turnbadge .dot{width:8px;height:8px;background:var(--teal)}
.turnbadge.def{border-color:var(--amber);color:var(--amber)} .turnbadge.def .dot{background:var(--amber)}
#stephead{position:relative;flex:0 0 auto;border:1px solid var(--line);background:var(--bg2);padding:15px 16px;margin-bottom:14px;display:flex;align-items:baseline;justify-content:space-between;gap:16px}
#stephead .corner{position:absolute;width:13px;height:13px;border:1px solid var(--teal)}
.c-tl{top:-1px;left:-1px;border-right:none;border-bottom:none}
.c-tr{top:-1px;right:-1px;border-left:none;border-bottom:none}
.c-bl{bottom:-1px;left:-1px;border-right:none;border-top:none}
.c-br{bottom:-1px;right:-1px;border-left:none;border-top:none}
#stephead h1{margin:0;font-size:clamp(22px,6.8vw,38px);font-weight:600;letter-spacing:.01em;line-height:1;color:var(--ink)}
#stephead h1 em{font-style:normal;color:var(--label)}
.stepno{color:var(--teal);letter-spacing:.14em;font-size:clamp(11px,2.8vw,14px);white-space:nowrap}
.stepno b{color:var(--ink);font-weight:700}
#body{flex:1 1 auto;overflow-y:auto;overflow-x:hidden;touch-action:pan-y;scrollbar-width:thin;scrollbar-color:var(--line2) transparent}
#body::-webkit-scrollbar{width:6px} #body::-webkit-scrollbar-thumb{background:var(--line2)}
#foot{flex:0 0 auto;display:flex;align-items:center;justify-content:space-between;gap:12px;border-top:1px solid var(--line);margin-top:10px;padding-top:8px;font-size:9px;letter-spacing:.08em;color:var(--faint)}
#foot .creed{color:var(--label)}
.panel{position:relative;border:1px solid var(--line);background:var(--bg2);padding:16px}
.panel + .panel{margin-top:14px}
.phead{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:13px}
.phead .lhs{display:flex;align-items:center;gap:8px;color:var(--teal);letter-spacing:.1em;font-size:12px;font-weight:600}
.phead .dot{width:7px;height:7px;background:var(--teal);flex:0 0 auto}
.phead .rhs{color:var(--label);letter-spacing:.1em;font-size:11px}
.hint{font-size:12px;line-height:1.6;color:var(--ink2);letter-spacing:.01em}
.hint b{color:var(--teal);font-weight:600}
.infostrip{display:flex;align-items:center;gap:12px;border:1px solid var(--line);background:var(--bg2);padding:12px 14px;margin-top:14px;font-size:12px;line-height:1.55;color:var(--ink2);letter-spacing:.01em}
.infostrip .i{flex:0 0 auto;width:26px;height:26px;border:1px solid var(--label);color:var(--label);display:grid;place-items:center;font-weight:700;font-style:italic}
.infostrip .rule{margin-left:auto;flex:0 0 auto;border:1px solid var(--teal);color:var(--teal);padding:6px 10px;font-size:10px;letter-spacing:.08em;white-space:nowrap}
.action{position:relative;width:100%;display:flex;align-items:center;gap:16px;border:1px solid var(--teal);background:var(--bg2);padding:17px 18px;letter-spacing:.04em;text-align:left;transition:background .12s}
.action:active{background:var(--bg3)}
.action[disabled]{opacity:.4;pointer-events:none}
.action .ico{flex:0 0 auto;width:30px;height:30px;color:var(--teal)}
.action .tx{flex:1 1 auto}
.action .tx b{display:block;font-size:clamp(15px,4.3vw,19px);font-weight:600;color:var(--teal);letter-spacing:.02em}
.action .tx span{display:block;font-size:11px;color:var(--ink2);letter-spacing:.03em;margin-top:5px;line-height:1.4}
.action .arw{flex:0 0 auto;color:var(--teal);font-size:22px}
.action.amber{border-color:var(--amber)} .action.amber .ico,.action.amber .tx b,.action.amber .arw{color:var(--amber)}
.action.red{border-color:var(--red)} .action.red .ico,.action.red .tx b,.action.red .arw{color:var(--red)}
.action.ghost{border-color:var(--line2)} .action.ghost .ico,.action.ghost .tx b,.action.ghost .arw{color:var(--ink)}
.action-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:14px}
@media(max-width:520px){.action-row{grid-template-columns:1fr}}
.entry{width:100%;min-height:150px;resize:none;background:var(--bg3);border:1px solid var(--line2);padding:16px;font-size:15px;line-height:1.6;letter-spacing:.01em;color:var(--ink);outline:none}
.entry:focus{border-color:var(--teal)}
.entry::placeholder{color:var(--faint)}
.entry-foot{display:flex;justify-content:flex-end;font-size:11px;color:var(--label);letter-spacing:.06em;margin-top:6px}
.aifield{width:100%;background:var(--bg3);border:1px solid var(--line2);padding:12px 14px;font-family:var(--mono);font-size:14px;letter-spacing:.02em;color:var(--ink);outline:none}
.aifield:focus{border-color:var(--teal)} .aifield::placeholder{color:var(--faint)}
.aiseg{display:flex;border:1px solid var(--line2)}
.aiseg button{flex:1;background:var(--bg2);border:none;border-right:1px solid var(--line2);color:var(--ink2);font-family:var(--mono);font-size:11px;font-weight:600;letter-spacing:.06em;padding:11px 4px;cursor:pointer}
.aiseg button:last-child{border-right:none}
.aiseg button.on{background:var(--teal);color:var(--bg)}
.aibtns{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:14px}
.aibtns .action{gap:0;justify-content:center;text-align:center}
.modrow{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:16px}
@media(max-width:520px){.modrow{grid-template-columns:1fr}}
.modbtn{display:flex;align-items:center;gap:12px;border:1px solid var(--line2);background:var(--bg2);padding:14px}
.modbtn .box{flex:0 0 auto;width:20px;height:20px;border:1px solid var(--teal)}
.modbtn .lab b{display:block;font-size:15px;letter-spacing:.05em;font-weight:600;color:var(--ink)}
.modbtn .lab span{display:block;font-size:11px;color:var(--ink2);margin-top:3px;letter-spacing:.02em}
.modbtn.on{border-color:var(--teal);background:var(--bg3)} .modbtn.on .box{background:var(--teal)}
.eyebrow{font-size:10px;letter-spacing:.14em;color:var(--label);margin-bottom:12px;display:flex;align-items:center;gap:8px}
.eyebrow::before{content:"";width:22px;height:1px;background:var(--line2)}
.viewport{position:relative;width:100%;aspect-ratio:1 / 1;background:var(--bg);border:1px solid var(--line2);overflow:hidden}
.viewport.wide{aspect-ratio:16 / 10}
.viewport canvas{display:block;width:100%;height:100%}
.vp-tag{position:absolute;top:10px;left:12px;font-size:10px;letter-spacing:.1em;color:var(--teal);pointer-events:none;display:flex;align-items:center;gap:6px;z-index:2}
.vp-tag .dot{width:6px;height:6px;background:var(--teal)}
.vp-tr{position:absolute;top:10px;right:12px;font-size:10px;letter-spacing:.08em;color:var(--label);pointer-events:none;z-index:2}
.vp-claims{position:absolute;top:36px;left:12px;border:1px solid var(--line2);background:#0f1216cc;padding:8px 12px;font-size:12px;letter-spacing:.08em;color:var(--ink);pointer-events:none;z-index:2}
.vp-N,.vp-S{position:absolute;left:50%;transform:translateX(-50%);color:var(--label);font-size:11px;letter-spacing:.08em;z-index:2}
.vp-N{top:8px}.vp-S{bottom:8px}
.vp-arrows{position:absolute;top:50%;left:0;right:0;display:flex;justify-content:space-between;padding:0 8px;transform:translateY(-50%);color:var(--faint);font-size:20px;pointer-events:none;z-index:2}
.playbar{display:flex;align-items:center;gap:10px;border:1px solid var(--line2);border-top:none;background:var(--bg2);padding:12px 14px}
.playbar button{flex:0 0 auto;width:36px;height:36px;border:1px solid var(--line2);display:grid;place-items:center;color:var(--teal)}
.playbar .time{font-size:12px;color:var(--ink2);letter-spacing:.04em;font-variant-numeric:tabular-nums}
.playbar .track{flex:1 1 auto;height:3px;background:var(--line2);position:relative}
.playbar .track .fill{position:absolute;left:0;top:0;bottom:0;background:var(--teal)}
.playbar .track .head{position:absolute;top:-4px;width:3px;height:11px;background:var(--teal)}
.playbar .track .tick{position:absolute;top:0;bottom:0;width:1px;background:var(--bg2)}
.scenectl{display:grid;grid-template-columns:repeat(3,1fr);gap:0;border:1px solid var(--line);background:var(--bg2);margin-top:14px}
.scenectl > div{padding:14px;display:flex;align-items:center;gap:12px;border-right:1px solid var(--line)}
.scenectl > div:last-child{border-right:none}
.scenectl .ci{flex:0 0 auto;width:26px;height:26px;color:var(--teal)}
.scenectl .cl b{display:block;font-size:13px;letter-spacing:.05em;color:var(--teal)}
.scenectl .cl span{display:block;font-size:10px;color:var(--ink2);letter-spacing:.03em;margin-top:2px}
@media(max-width:520px){.scenectl{grid-template-columns:1fr}.scenectl > div{border-right:none;border-bottom:1px solid var(--line)}.scenectl > div:last-child{border-bottom:none}}
.side{position:relative}
.side + .side{margin-top:16px}
.side-head{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:12px 14px;border:1px solid;border-bottom:none;background:var(--bg2)}
.side.pros .side-head{border-color:var(--blue)} .side.pros .lab{color:var(--blue)}
.side.def .side-head{border-color:var(--amber)} .side.def .lab{color:var(--amber)}
.side-head .lab{display:flex;align-items:center;gap:8px;letter-spacing:.1em;font-size:12px;font-weight:600}
.side-head .lab .dot{width:8px;height:8px;background:currentColor}
.side-head .cam{color:var(--label);font-size:10px;letter-spacing:.08em}
.side-claim{padding:11px 14px;border:1px solid;border-top:none;border-bottom:none;background:var(--bg2);font-size:12px;letter-spacing:.03em;color:var(--ink2)}
.side.pros .side-claim{border-color:var(--blue)} .side.def .side-claim{border-color:var(--amber)}
.side-claim b{color:var(--ink)}
.side.pros .viewport{border-color:var(--blue)} .side.def .viewport{border-color:var(--amber)}
.credbar{display:flex;align-items:center;gap:6px;position:absolute;bottom:10px;right:12px;background:#0f1216dd;border:1px solid var(--line2);padding:8px 10px;pointer-events:none;z-index:2}
.credbar .pip{width:12px;height:12px;border:1px solid}
.side.pros .credbar .pip{border-color:var(--blue)} .side.pros .credbar .pip.on{background:var(--blue)}
.side.def .credbar .pip{border-color:var(--amber)} .side.def .credbar .pip.on{background:var(--amber)}
.claimlist{margin-top:16px;border:1px solid var(--line);background:var(--bg2)}
.claimlist .ci{display:flex;align-items:flex-start;gap:12px;padding:14px;border-bottom:1px solid var(--line);cursor:pointer}
.claimlist .ci:last-child{border-bottom:none}
.claimlist .ci:active{background:var(--bg3)}
.claimlist .ci .stamp{flex:0 0 auto;width:16px;height:16px;border:1px solid var(--teal);margin-top:2px}
.claimlist .ci.witnessed .stamp{background:var(--teal)}
.claimlist .ci .txt{flex:1 1 auto;font-size:13px;line-height:1.5;letter-spacing:.01em;color:var(--ink)}
.claimlist .ci .txt .meta{display:block;font-size:10px;color:var(--label);letter-spacing:.06em;margin-top:5px}
.claimlist .ci.witnessed .txt .meta{color:var(--teal)}
.claimlist .ci .flag{flex:0 0 auto;border:1px solid var(--red);color:var(--red);padding:6px 10px;font-size:9px;letter-spacing:.08em}
.claimlist .ci.flagged{border-left:3px solid var(--red);background:var(--bg3)}
.claimlist .ci.flagged .flag{background:var(--red);color:var(--bg)}
.ruling-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}
@media(max-width:640px){.ruling-grid{grid-template-columns:1fr}}
.analysis{border:1px solid var(--line);background:var(--bg2);padding:16px}
.analysis .arow{border-bottom:1px solid var(--line);padding-bottom:14px;margin-bottom:14px}
.analysis .arow:last-child{border-bottom:none;margin-bottom:0}
.analysis .ak{display:flex;align-items:center;gap:8px;color:var(--ink);font-size:12px;letter-spacing:.08em;font-weight:600;margin-bottom:7px}
.analysis .ak .plus{color:var(--teal)}
.analysis .av{font-size:12px;line-height:1.55;color:var(--ink2);letter-spacing:.02em}
.verdict-card{border:1px solid var(--line);background:var(--bg2);padding:20px;margin-top:16px}
.vc-q{font-size:clamp(16px,4.4vw,22px);line-height:1.35;text-align:center;letter-spacing:.01em;margin:6px 0 20px;font-weight:600;color:var(--ink)}
.vc-sep{height:1px;background:var(--line);margin:16px 0}
.vc-lab{font-size:10px;letter-spacing:.12em;color:var(--teal);display:flex;align-items:center;gap:8px;margin-bottom:12px}
.vc-lab::before{content:"";width:7px;height:7px;background:var(--teal)}
.zonechip{width:100px;height:66px;border:1px solid var(--red);color:var(--red);display:grid;place-items:center;margin:0 auto;letter-spacing:.1em;font-size:14px;font-weight:600;position:relative}
.zonechip.witnessed{border-color:var(--teal);color:var(--teal)}
.zonechip.ambiguous{border-color:var(--amber);color:var(--amber)}
.zonechip .cc{position:absolute;width:10px;height:10px;border:1px solid currentColor}
.zonechip .cc.tl{top:-1px;left:-1px;border-right:none;border-bottom:none}
.zonechip .cc.tr{top:-1px;right:-1px;border-left:none;border-bottom:none}
.zonechip .cc.bl{bottom:-1px;left:-1px;border-right:none;border-top:none}
.zonechip .cc.br{bottom:-1px;right:-1px;border-left:none;border-top:none}
.status-big{text-align:center;font-size:clamp(28px,8vw,46px);font-weight:700;letter-spacing:.06em;color:var(--red)}
.status-big.overruled{color:var(--teal)}
.prevail{border:1px solid var(--teal);background:var(--bg2);padding:22px 18px;display:flex;align-items:center;gap:18px}
.prevail .gv{flex:0 0 auto;width:52px;height:52px;color:var(--teal)}
.prevail .pt b{display:block;font-size:clamp(20px,6vw,32px);color:var(--teal);letter-spacing:.03em;font-weight:700;line-height:1.05}
.prevail .pt span{display:block;font-size:12px;color:var(--ink2);letter-spacing:.02em;margin-top:8px;line-height:1.45}
.scorecard{border:1px solid;background:var(--bg2);padding:16px;margin-top:14px;display:flex;gap:16px;align-items:flex-start}
.scorecard.pros{border-color:var(--blue)} .scorecard.def{border-color:var(--amber)}
.scorecard .sci{flex:0 0 auto;width:44px;height:52px}
.scorecard.pros .sci{color:var(--blue)} .scorecard.def .sci{color:var(--amber)}
.scorecard .scname{font-size:clamp(16px,4.8vw,22px);letter-spacing:.05em;font-weight:700;margin-bottom:2px}
.scorecard.pros .scname{color:var(--blue)} .scorecard.def .scname{color:var(--amber)}
.scorecard .sclab{font-size:10px;color:var(--ink2);letter-spacing:.06em;margin-bottom:14px}
.metricrow{display:grid;grid-template-columns:1fr 1fr;gap:16px}
@media(max-width:520px){.metricrow{grid-template-columns:1fr}}
.metric .mk{font-size:10px;letter-spacing:.12em;margin-bottom:6px}
.scorecard.pros .metric .mk{color:var(--blue)} .scorecard.def .metric .mk{color:var(--amber)}
.metric .mv{font-size:clamp(22px,6vw,30px);font-weight:700;font-variant-numeric:tabular-nums;display:flex;align-items:baseline;gap:8px;color:var(--ink)}
.metric .mv small{font-size:12px;color:var(--ink2);font-weight:400}
.metric .mbar{height:5px;background:#ffffff1a;margin-top:8px;position:relative}
.metric .mbar .mf{position:absolute;left:0;top:0;bottom:0}
.scorecard.pros .metric .mbar .mf{background:var(--blue)} .scorecard.def .metric .mbar .mf{background:var(--amber)}
.metric .mscale{display:flex;justify-content:space-between;font-size:9px;color:var(--faint);margin-top:4px}
.ledger{border:1px solid var(--line);background:var(--bg2);margin-top:16px}
.ledger .lh{display:flex;align-items:center;justify-content:space-between;padding:14px;border-bottom:1px solid var(--line);color:var(--teal);letter-spacing:.1em;font-size:12px;font-weight:600}
.ledger .lh .n{color:var(--label);font-size:11px}
.ledger .lcols{display:grid;grid-template-columns:130px 1fr 160px;gap:12px;padding:10px 14px;border-bottom:1px solid var(--line);font-size:10px;letter-spacing:.12em;color:var(--label)}
.ledger .lrow{display:grid;grid-template-columns:130px 1fr 160px;gap:12px;padding:13px 14px;border-bottom:1px solid var(--line);align-items:center}
.ledger .lrow:last-child{border-bottom:none}
.ledger .lrow .st{display:flex;align-items:center;gap:8px;font-size:11px;letter-spacing:.05em}
.ledger .lrow .st .box{width:14px;height:14px;border:1px solid var(--ink)}
.ledger .lrow.witnessed .st .box{background:var(--ink)} .ledger .lrow.witnessed .st{color:var(--ink)}
.ledger .lrow.inferred .st .box{background:none} .ledger .lrow.inferred .st{color:var(--ink2)}
.ledger .lrow.fabricated .st{color:var(--red);text-decoration:line-through}
.ledger .lrow.fabricated .st .box{border-color:var(--red);position:relative}
.ledger .lrow.fabricated .st .box::before,.ledger .lrow.fabricated .st .box::after{content:"";position:absolute;inset:0;margin:auto;width:16px;height:1px;background:var(--red)}
.ledger .lrow.fabricated .st .box::before{transform:rotate(45deg)}
.ledger .lrow.fabricated .st .box::after{transform:rotate(-45deg)}
.ledger .lrow .cl{font-size:12px;line-height:1.45;color:var(--ink)}
.ledger .lrow .sr{font-size:10px;color:var(--ink2);letter-spacing:.03em;line-height:1.4}
.ledger .lrow .au{font-size:9px;letter-spacing:.08em;margin-top:4px}
.ledger .lrow .au.pros{color:var(--blue)} .ledger .lrow .au.def{color:var(--amber)}

.metabox{border:1px solid var(--line);background:var(--bg2);padding:16px;margin-top:14px;font-size:12px;letter-spacing:.05em;color:var(--ink2);line-height:2}
.metabox .mr{display:flex;justify-content:space-between} .metabox .mr b{color:var(--ink);font-weight:600;font-variant-numeric:tabular-nums}
.handoff{border:1px solid var(--teal);background:var(--bg2);padding:26px 20px;text-align:center;margin-top:8px}

.handoff .who.def{color:var(--amber)} .handoff .who.pros{color:var(--blue)}
.handoff .lab{font-size:11px;letter-spacing:.18em;color:var(--teal)}
.handoff .desc{font-size:13px;color:var(--ink2);line-height:1.6;max-width:420px;margin:16px auto 0}

.lobby-hero{text-align:center;padding:8px 0 4px}

/* 0 · CONSTANTS (Power-of-10 ceilings) */

/* 1 · STATE (single local model — pass & play) */
const STATE={ step:0, turn:'pros', match:null, rulingIdx:0 };
function newMatch(){return{
  id:uid('match'), wreck:null,
  replayUsed:{pros:false,def:false}, sealed:{pros:null,def:null},
  claims:{pros:[],def:[]}, scenes:{pros:null,def:null},
  challenges:[], rulings:[], verdict:null,
  done:{pros:{},def:{}}
};}
function bothDone(phase){const M=STATE.match;return M.done.pros[phase]&&M.done.def[phase];}
async function finish(phase){
  const M=STATE.match; M.done[STATE.turn][phase]=true;
  if(bothDone(phase)){ await advanceFrom(phase); }
  else { STATE.turn=other(STATE.turn); handoff(phase); }
}
async function advanceFrom(phase){
  const map={SEAL:2,DEPO:3,SCENE:4,CONFRONT:5}; STATE.turn='pros';
  if(phase==='CONFRONT'){ STATE.step=5; render(); await runJudge(); if(!STATE.match.verdict)STATE.match.verdict=computeVerdict(); render(); return; }
  STATE.step=map[phase]; render();
}

/* 2 · GENERATIVE AI — client-key direct call (same plumbing as THUNDER RIGS).
   Key lives in this browser only; use a temporary/restricted one. Must be
   HOSTED (https), not opened from file:// — file origin is null and CORS
   blocks it even with the browser-access header. */
const AI_KEY='paris.ai.config.v1';
const AI_DEFAULTS={
  anthropic:{model:'claude-sonnet-4-6',endpoint:'https://api.anthropic.com/v1/messages'},
  openai:{model:'gpt-5.4-mini',endpoint:'https://api.openai.com/v1/responses'},
  gemini:{model:'gemini-2.5-flash',endpoint:''},
  custom:{model:'',endpoint:''}
};
function getAIConfig(){
  let s={}; try{ s=JSON.parse(localStorage.getItem(AI_KEY)||'{}'); }catch(_){}
  const provider=s.provider||'anthropic';
  const d=AI_DEFAULTS[provider]||AI_DEFAULTS.anthropic;
  return {provider, model:(s.model||d.model), endpoint:(s.endpoint||d.endpoint), apiKey:(s.apiKey||'')};
}
function saveAIConfig(c){
  const provider=c.provider||'anthropic'; const d=AI_DEFAULTS[provider]||AI_DEFAULTS.anthropic;
  localStorage.setItem(AI_KEY,JSON.stringify({provider,model:(c.model||d.model||'').trim(),endpoint:(c.endpoint||d.endpoint||'').trim(),apiKey:(c.apiKey||'').trim()}));
}
function aiReady(){ return !!getAIConfig().apiKey; }
async function callLLM(system,user){
  const cfg=getAIConfig();
  if(!cfg.apiKey) throw new Error('NO_KEY');
  const provider=cfg.provider, model=cfg.model;
  if(provider==='gemini'){
    const base=cfg.endpoint||`https://generativelanguage.googleapis.com/v1beta/models/${encodeURIComponent(model)}:generateContent`;
    const url=base.includes('?')?`${base}&key=${encodeURIComponent(cfg.apiKey)}`:`${base}?key=${encodeURIComponent(cfg.apiKey)}`;
    const res=await fetch(url,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({systemInstruction:{parts:[{text:system}]},contents:[{role:'user',parts:[{text:user}]}],generationConfig:{responseMimeType:'application/json'}})});
    const j=await res.json().catch(()=>({})); if(!res.ok) throw new Error(j.error?.message||('Gemini HTTP '+res.status));
    return (j.candidates?.[0]?.content?.parts||[]).map(p=>p.text||'').join('\n');
  }
  if(provider==='anthropic'){
    const res=await fetch(cfg.endpoint,{method:'POST',headers:{'Content-Type':'application/json','x-api-key':cfg.apiKey,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},body:JSON.stringify({model,max_tokens:1600,system,messages:[{role:'user',content:user}]})});
    const j=await res.json().catch(()=>({})); if(!res.ok) throw new Error(j.error?.message||('Anthropic HTTP '+res.status));
    return (j.content||[]).filter(b=>b.type==='text').map(b=>b.text).join('');
  }
  if(provider==='openai'){
    const res=await fetch(cfg.endpoint,{method:'POST',headers:{'Content-Type':'application/json',Authorization:`Bearer ${cfg.apiKey}`},body:JSON.stringify({model,instructions:system,input:user,max_output_tokens:1600})});
    const j=await res.json().catch(()=>({})); if(!res.ok) throw new Error(j.error?.message||('OpenAI HTTP '+res.status));
    if(typeof j.output_text==='string') return j.output_text;
    if(Array.isArray(j.output)) return j.output.map(o=>o.content?.map(c=>c.text||'').join('\n')||'').join('\n');
    return j.choices?.[0]?.message?.content||'';
  }
  /* custom: OpenAI-compatible chat/completions */
  if(!cfg.endpoint) throw new Error('MISSING_ENDPOINT');
  const res=await fetch(cfg.endpoint,{method:'POST',headers:{'Content-Type':'application/json',Authorization:`Bearer ${cfg.apiKey}`},body:JSON.stringify({model,messages:[{role:'system',content:system},{role:'user',content:user}],temperature:0.6})});
  const j=await res.json().catch(()=>({})); if(!res.ok) throw new Error(j.error?.message||('HTTP '+res.status));
  return j.choices?.[0]?.message?.content||'';
}
async function claudeJSON(system,user){
  const text=await callLLM(system,user);
  return JSON.parse(String(text).replace(/```json/gi,'').replace(/```/g,'').trim());
}
async function generateWreck(){
  const sys=`You author a single road-traffic collision as STRUCTURED GROUND TRUTH for an adversarial courtroom-reconstruction game. Two players each reconstruct THIS wreck and argue opposing accounts of fault. Return ONLY JSON.

Partition every fact by visibility zone:
- "WITNESSED": the on-scene video shows it unambiguously. Contradicting it is perjury.
- "AMBIGUOUS": the video is unclear (angle, speed, partial). Fair inference lives here.
- "HIDDEN": the video does NOT show it (off-frame, occluded, pre-clip). Asserting it as witnessed is fabrication.
The true fault MUST turn on a HIDDEN or AMBIGUOUS fact, so honest copying is insufficient — players must argue.

Schema:
{"title":"<=6 words","camera":"CAM_XX :: LOCATION","clip":{"start":"MM:SS.CC","end":"MM:SS.CC"},
 "objects":[{"id":"veh_a","type":"sedan|suv|truck","color":"gray|red|blue|amber|white","role":"ego|other","start":[x,z],"end":[x,z],"heading":deg}],
 "facts":[{"id":"f1","text":"one plain sentence","zone":"WITNESSED|AMBIGUOUS|HIDDEN","truth":true|false}],
 "fault":{"liable":"veh_a|veh_b|shared","reason":"one sentence citing a HIDDEN/AMBIGUOUS fact id"},
 "conditions":{"time":"day|dusk|night","weather":"clear|rain|fog","light":"green|amber|red|none"}}
coords in [-6..6]; 2-4 objects; 8-10 facts mixed zones with some false.`;
  const w=await claudeJSON(sys,`Author one fresh wreck now. Make fault genuinely contestable; vary from any template.`);
  w.objects=(w.objects||[]).slice(0,MAX_OBJECTS); w.facts=(w.facts||[]).slice(0,MAX_FACTS);
  return w;
}
async function judgeChallenge(ch,claim,wreck){
  const sys=`You are a NEUTRAL REFEREE-JUDGE. Rule on ONE challenge. Cite ONLY facts from the provided graph, by id. Never invent facts. Return ONLY JSON.
Law:
- A "WITNESSED"-stamped claim is PERJURY if its fact zone is HIDDEN, or it contradicts a true WITNESSED fact.
- An "INFER"-stamped claim is never perjury; judge plausibility vs WITNESSED/AMBIGUOUS facts.
- Challenge correct (fabrication / contradicts record) -> sustained=true.
- Challenge misfires (legit inference / matches record) -> sustained=false; challenger pays.
Schema: {"factId":"<id or empty>","zone":"WITNESSED|AMBIGUOUS|HIDDEN","sustained":true|false,"citation":"one sentence","rule":"one clause"}`;
  const r=await claudeJSON(sys,JSON.stringify({challenge:{kind:ch.kind},claim:{text:claim.text,modality:claim.modality},ground_truth:{facts:wreck.facts,fault:wreck.fault}}));
  if(r.factId && !wreck.facts.some(f=>f.id===r.factId)) r.factId='';
  return r;
}
async function runJudge(){
  const M=STATE.match; if(!M.wreck)return;
  const all=[...M.claims.pros,...M.claims.def]; const byId=id=>all.find(c=>c.id===id);
  const rulings=[]; let t=0;
  for(const ch of M.challenges){
    if(t++>MAX_POLL)break; const claim=byId(ch.targetClaimId); if(!claim)continue;
    try{ const r=await judgeChallenge(ch,claim,M.wreck);
      rulings.push({id:uid('rl'),challengeId:ch.id,by:ch.by,claimId:claim.id,claimText:claim.text,claimAuthor:claim.author,zone:r.zone,sustained:!!r.sustained,citation:r.citation,rule:r.rule,factId:r.factId});
    }catch(e){ rulings.push({id:uid('rl'),challengeId:ch.id,by:ch.by,claimId:claim.id,claimText:claim.text,claimAuthor:claim.author,zone:'AMBIGUOUS',sustained:false,citation:'Ruling unavailable — challenge dismissed.',rule:'no-ruling',factId:''}); }
  }
  M.rulings=rulings; M.verdict=computeVerdict();
}

/* 3 · SCORING & LEDGER */
function computeVerdict(){
  const M=STATE.match;
  const score=role=>{
    const claims=M.claims[role]||[];
    const wit=claims.filter(c=>c.modality==='WITNESSED'), inf=claims.filter(c=>c.modality==='INFER');
    const fabCaught=M.rulings.filter(r=>r.claimAuthor===role&&r.sustained).length;
    const misfires=M.rulings.filter(r=>r.by===role&&!r.sustained).length;
    const hits=M.rulings.filter(r=>r.by===role&&r.sustained).length;
    const witSurv=Math.max(0,wit.length-fabCaught);
    const witnessed=clamp((witSurv/Math.max(1,wit.length))-fabCaught*0.18+hits*0.06,0,1);
    const inferred=clamp((inf.length?0.45+inf.length*0.05:0.3)-misfires*0.12+hits*0.04,0,1);
    return{witnessed:+witnessed.toFixed(2),inferred:+inferred.toFixed(2),fabCaught,misfires,hits,claims:claims.length};
  };
  const pros=score('pros'),def=score('def'); const tot=s=>s.witnessed*0.62+s.inferred*0.38;
  return{pros,def,winner:tot(pros)>=tot(def)?'pros':'def',at:Date.now()};
}
function buildLedger(){
  const M=STATE.match; const rows=[];
  const fab=new Set(M.rulings.filter(r=>r.sustained).map(r=>r.claimId));
  for(const role of['pros','def'])for(const c of(M.claims[role]||[])){
    let status=c.modality==='WITNESSED'?'witnessed':'inferred'; if(fab.has(c.id))status='fabricated';
    const rl=M.rulings.find(r=>r.claimId===c.id);
    const src=rl&&rl.factId?`GT :: ${rl.factId} (${rl.zone})`:c.modality==='WITNESSED'?'DEPOSITION :: SEALED':'INFERENCE :: ARGUED';
    rows.push({status,text:c.text,source:src,author:role});
  }
  return rows;
}

/* 4 · WIREFRAME TOY COURTROOM */
class ToyScene{
  constructor(canvas){
    this.canvas=canvas;
    this.renderer=new THREE.WebGLRenderer({canvas,antialias:true,alpha:true});
    this.renderer.setPixelRatio(Math.min(devicePixelRatio,2));
    this.scene=new THREE.Scene();
    this.cam=new THREE.PerspectiveCamera(42,1,.1,200); this.cam.position.set(9,9,9); this.cam.lookAt(0,0,0);
    this.root=new THREE.Group(); this.scene.add(this.root);
    this.yaw=Math.PI*.25; this.autorotate=false; this.grid=null; this.showGrid=true; this.showLabels=true;
    this.labels=[]; this.objects=[]; this._resize(); this._drag(); this._last=performance.now(); this.loop();
  }
  _resize(){const r=this.canvas.getBoundingClientRect();const w=Math.max(2,r.width),h=Math.max(2,r.height);this.renderer.setSize(w,h,false);this.cam.aspect=w/h;this.cam.updateProjectionMatrix();}
  _drag(){let id=null,lx=0;this.canvas.addEventListener('pointerdown',e=>{id=e.pointerId;lx=e.clientX;this.canvas.setPointerCapture(id);});this.canvas.addEventListener('pointermove',e=>{if(e.pointerId===id){this.yaw+=(e.clientX-lx)*.008;lx=e.clientX;}});this.canvas.addEventListener('pointerup',e=>{if(e.pointerId===id)id=null;});}
  clear(){while(this.root.children.length)this.root.remove(this.root.children[0]);this.labels.forEach(l=>l.remove());this.labels=[];this.objects=[];}
  wire(c){return new THREE.LineBasicMaterial({color:c||0xf2f5f7,transparent:true,opacity:.95});}
  addGrid(){const g=new THREE.GridHelper(12,12,0x3a4650,0x252d35);g.material.opacity=this.showGrid?.85:0;g.material.transparent=true;this.root.add(g);this.grid=g;
    const box=new THREE.LineSegments(new THREE.EdgesGeometry(new THREE.BoxGeometry(12,0.02,12)),this.wire(0x44505c));this.root.add(box);}
  vehicle(type,color){const g=new THREE.Group();const col=color||0xf2f5f7;
    const d=type==='suv'?[1.4,1.0,2.4]:type==='truck'?[1.5,1.1,3.4]:[1.3,.75,2.6];
    const body=new THREE.LineSegments(new THREE.EdgesGeometry(new THREE.BoxGeometry(...d)),this.wire(col));body.position.y=d[1]/2+.18;g.add(body);
    const cab=new THREE.LineSegments(new THREE.EdgesGeometry(new THREE.BoxGeometry(d[0]*.9,d[1]*.7,d[2]*.45)),this.wire(col));cab.position.set(0,d[1]+.18,type==='truck'?d[2]*.28:-.1);g.add(cab);
    const wr=.34;[[-1,1],[1,1],[-1,-1],[1,-1]].forEach(([sx,sz])=>{const w=new THREE.LineLoop(new THREE.CircleGeometry(wr,14),this.wire(col));w.rotation.y=Math.PI/2;w.position.set(sx*d[0]*.5,wr,sz*d[2]*.32);g.add(w);});
    return g;}
  makeLabel(text,color){const dd=el('div');dd.style.cssText='position:absolute;font-size:11px;font-weight:600;letter-spacing:.08em;color:'+color+';pointer-events:none;white-space:nowrap;transform:translate(-50%,-150%);text-shadow:0 0 4px #0f1216,0 0 4px #0f1216;';dd.textContent=text;this.canvas.parentElement.appendChild(dd);this.labels.push(dd);return dd;}
  load(wreck,opts={}){this.clear();this.addGrid();if(!wreck||!wreck.objects)return;
    const accent=opts.accent||0xf2f5f7; const objs=wreck.objects.slice(0,MAX_OBJECTS);
    objs.forEach((o,i)=>{const c=i===0?accent:0xb8c2cc;const v=this.vehicle(o.type,c);
      const p=opts.atEnd?(o.end||o.start||[0,0]):(o.start||[0,0]);v.position.set(p[0]||0,0,p[1]||0);v.rotation.y=(o.heading||0)*Math.PI/180;this.root.add(v);this.objects.push({mesh:v,spec:o});
      if(this.showLabels){const lbl=this.makeLabel((o.role==='ego'?'EGO':(o.type||'VEH')).toUpperCase(),i===0?'#2ff0d2':'#cdd5dc');v.userData.label=lbl;}
      if(o.start&&o.end){const a=new THREE.Vector3(o.start[0],.1,o.start[1]),b=new THREE.Vector3(o.end[0],.1,o.end[1]);
        const line=new THREE.Line(new THREE.BufferGeometry().setFromPoints([a,b]),new THREE.LineDashedMaterial({color:0x2ff0d2,dashSize:.3,gapSize:.2,transparent:true,opacity:.9}));line.computeLineDistances();this.root.add(line);}
    });
    if(opts.occlude){const slab=new THREE.Mesh(new THREE.PlaneGeometry(6,4),new THREE.MeshBasicMaterial({color:0x0f1216,transparent:true,opacity:.5,side:THREE.DoubleSide}));slab.rotation.x=-Math.PI/2;slab.position.set(3,.05,-2.5);this.root.add(slab);}
  }
  loadContested(wreck,idx=0){this.clear();this.addGrid();const o=(wreck&&wreck.objects&&wreck.objects[idx])||{type:'suv'};
    const v=this.vehicle(o.type,0xf2f5f7);this.root.add(v);this.objects.push({mesh:v,spec:o});
    const ring=new THREE.LineLoop(new THREE.CircleGeometry(2.6,48),this.wire(0xff5a52));ring.rotation.x=-Math.PI/2;ring.position.y=.02;this.root.add(ring);}
  projectLabels(){for(const{mesh}of this.objects){const lbl=mesh.userData.label;if(!lbl)continue;const p=new THREE.Vector3(0,1.4,0);mesh.localToWorld(p);p.project(this.cam);const r=this.canvas.getBoundingClientRect();lbl.style.left=((p.x*.5+.5)*r.width)+'px';lbl.style.top=((-p.y*.5+.5)*r.height)+'px';lbl.style.opacity=(p.z<1&&this.showLabels)?'1':'0';}}
  loop(){this._raf=requestAnimationFrame(()=>this.loop());const now=performance.now(),dt=(now-this._last)/1000;this._last=now;if(this.autorotate)this.yaw+=dt*.35;this.root.rotation.y=this.yaw;if(this.grid)this.grid.material.opacity=this.showGrid?.85:0;this.projectLabels();this.renderer.render(this.scene,this.cam);}
  destroy(){cancelAnimationFrame(this._raf);this.labels.forEach(l=>l.remove());this.renderer.dispose();}
}

/* 5 · HEADER / TURN CHROME */
const STEP_TITLES={1:['EVIDENCE','CHAMBER'],2:['DEPOSITION',''],3:['YOUR','RECONSTRUCTION'],4:['CONFRONTATION','CHALLENGE'],5:['RULING',''],6:['VERDICT',''],7:['EXPORT','RECORD']};

/* STEP 4 · CONFRONTATION */
function screenConfrontation(body){
  const M=STATE.match,me=STATE.turn,opp=other(me),done=!!M.done[me]['CONFRONT'];

    const side=el('div','side '+role);const claims=M.claims[role]||[];

    side.appendChild(vp);body.appendChild(side);

    if(role==='pros')TOY=inst;else TOY2=inst;
  }
  const lp=el('div','panel');lp.style.marginTop='16px';
  lp.innerHTML=`<div class="phead"><span class="lhs"><span class="dot"></span>CHALLENGE ${roleName(opp)}'S CLAIMS</span><span class="rhs">TAP TO FLAG</span></div>`;
  const list=el('div','claimlist');const oppC=M.claims[opp]||[];const flagged=new Set();
  if(!oppC.length)list.appendChild(el('div','center-note','Opponent filed no claims.'));
  oppC.forEach(c=>{const ci=el('div','ci'+(c.modality==='WITNESSED'?' witnessed':''));
    ci.innerHTML=`<span class="stamp"></span><span class="txt">${c.text}<span class="meta">${c.modality==='WITNESSED'?'STAMPED · WITNESSED':'STAMPED · INFERENCE'}</span></span><span class="flag">FLAG</span>`;
    ci.onclick=()=>{if(done)return;if(flagged.has(c.id)){flagged.delete(c.id);ci.classList.remove('flagged');}else{flagged.add(c.id);ci.classList.add('flagged');}};
    list.appendChild(ci);});
  lp.appendChild(list);body.appendChild(lp);
  const kr=el('div','action-row');
  const kf=el('button','action red');kf.innerHTML=`<span class="ico">${MK.crosshair}</span><span class="tx"><b>CHALLENGE FACT</b><span>DISPUTE THE CLAIMED FACT</span></span><span class="arw">&rsaquo;</span>`;

}

  const M=STATE.match;

  const i=clamp(STATE.rulingIdx,0,M.rulings.length-1);const r=M.rulings[i];

  grid.appendChild(right);body.appendChild(grid);
  TOY=new ToyScene(cv);TOY.loadContested(M.wreck,0);TOY.autorotate=true;
  const zc=r.zone==='WITNESSED'?'witnessed':r.zone==='AMBIGUOUS'?'ambiguous':'';
  const card=el('div','verdict-card');
  card.innerHTML=`<div class="vc-lab">CHALLENGED CLAIM</div><div class="vc-q">"${(r.claimText||'').toUpperCase()}"</div>
    <div class="vc-sep"></div><div class="vc-lab">EVIDENCE VISIBILITY</div>
    <div class="zonechip ${zc}"><span class="cc tl"></span><span class="cc tr"></span><span class="cc bl"></span><span class="cc br"></span>${r.zone}</div>
    <div class="vc-sep"></div><div class="vc-lab">RULING STATUS</div>
    <div class="status-big ${r.sustained?'':'overruled'}">${r.sustained?'SUSTAINED':'OVERRULED'}</div>`;
  body.appendChild(card);
  const last=i>=M.rulings.length-1;const nx=el('button','action');nx.style.marginTop='16px';
  nx.innerHTML=`<span class="ico">${MK.gavel}</span><span class="tx"><b>${last?'DELIVER VERDICT':'NEXT CHALLENGE'}</b><span>${last?'TALLY THE RECONSTRUCTED RECORD':`RULING ${i+1} OF ${M.rulings.length}`}</span></span><span class="arw">&rsaquo;</span>`;
  body.appendChild(nx);
  nx.onclick=()=>{if(last){STATE.rulingIdx=0;if(!M.verdict)M.verdict=computeVerdict();STATE.step=6;render();}else{STATE.rulingIdx=i+1;render();}};
}

/* STEP 6 · VERDICT */
function screenVerdict(body){
  const M=STATE.match,V=M.verdict||computeVerdict(),win=roleName(V.winner);
  const pv=el('div','prevail');
  pv.innerHTML=`<span class="gv">${MK.gavel}</span><span class="pt"><b>${win} PREVAILS</b><span>The reconstructed record favors ${win.toLowerCase()} on the balance of witnessed fact and defensible inference.</span></span>`;
  body.appendChild(pv);
  for(const role of['pros','def']){const s=V[role];const card=el('div','scorecard '+role);
    card.innerHTML=`<span class="sci">${role==='pros'?MK.scale:MK.shield}</span><div class="scbody">
      <div class="scname">${roleName(role)}</div>
      <div class="sclab">EVIDENCE FIDELITY${s.fabCaught?` · ${s.fabCaught} FABRICATION${s.fabCaught>1?'S':''} CAUGHT`:''}${s.misfires?` · ${s.misfires} MISFIRE${s.misfires>1?'S':''}`:''}</div>
      <div class="metricrow">
        <div class="metric"><div class="mk">WITNESSED</div><div class="mv">${s.witnessed.toFixed(2)}<small>(${Math.round(s.witnessed*100)}%)</small></div><div class="mbar"><div class="mf" style="width:${s.witnessed*100}%"></div></div><div class="mscale"><span>0</span><span>0.5</span><span>1.0</span></div></div>
        <div class="metric"><div class="mk">INFERRED</div><div class="mv">${s.inferred.toFixed(2)}<small>(${Math.round(s.inferred*100)}%)</small></div><div class="mbar"><div class="mf" style="width:${s.inferred*100}%"></div></div><div class="mscale"><span>0</span><span>0.5</span><span>1.0</span></div></div>
      </div></div>`;
    body.appendChild(card);}
  const rows=buildLedger();const lg=el('div','ledger');
  lg.innerHTML=`<div class="lh"><span>PROVENANCE LEDGER</span><span class="n">${rows.length} CLAIMS ANALYZED</span></div><div class="lcols"><span>STATUS</span><span>CLAIM</span><span>SOURCE</span></div>`;
  rows.forEach(r=>{const row=el('div','lrow '+r.status);
    row.innerHTML=`<span class="st"><span class="box"></span>${r.status.toUpperCase()}</span><span class="cl">${r.text}<span class="au ${r.author}">${roleName(r.author)}</span></span><span class="sr">${r.source}</span>`;
    lg.appendChild(row);});
  body.appendChild(lg);
  const exp=el('button','action');exp.style.marginTop='16px';
  exp.innerHTML=`<span class="ico">${MK.export}</span><span class="tx"><b>EXPORT RECORD</b><span>VERDICT, LEDGER, AND EVIDENCE PACKAGE</span></span><span class="arw">&rsaquo;</span>`;
  body.appendChild(exp);exp.onclick=()=>{STATE.step=7;render();};
}

/* STEP 7 · EXPORT */
function screenExport(body){
  const M=STATE.match,V=M.verdict||computeVerdict();
  const pkg={engine:'VERDICT ENGINE v1.1',model:'THE PARIS MODEL',reconstructionId:'R-'+M.id.slice(-4).toUpperCase(),
    generatedAt:new Date().toISOString(),
    note:'Ground truth is synthetic — authored live, not recorded. The record this verdict rests on was itself reconstructed.',
    wreck:{title:M.wreck?.title,camera:M.wreck?.camera,conditions:M.wreck?.conditions,fault:M.wreck?.fault,facts:M.wreck?.facts},
    depositions:{prosecution:M.claims.pros,defense:M.claims.def},sealedAccounts:M.sealed,
    challenges:M.challenges,rulings:M.rulings,verdict:V,ledger:buildLedger()};
  const json=JSON.stringify(pkg,null,2);
  const meta=el('div','metabox');
  meta.innerHTML=`<div class="mr"><span>WINNER</span><b>${roleName(V.winner)}</b></div>
    <div class="mr"><span>CASE ID</span><b>${pkg.reconstructionId}</b></div>
    <div class="mr"><span>ENGINE</span><b>VE v1.1</b></div>
    <div class="mr"><span>CLAIMS ANALYZED</span><b>${pkg.ledger.length}</b></div>
    <div class="mr"><span>RULINGS</span><b>${M.rulings.length}</b></div>`;
  body.appendChild(meta);
  const dl=el('button','action');dl.style.marginTop='16px';
  dl.innerHTML=`<span class="ico">${MK.export}</span><span class="tx"><b>DOWNLOAD RECORD (JSON)</b><span>THE FULL PROVENANCE PACKAGE</span></span><span class="arw">&rsaquo;</span>`;
  body.appendChild(dl);
  dl.onclick=()=>{const b=new Blob([json],{type:'application/json'});const a=el('a');a.href=URL.createObjectURL(b);a.download=`paris-model_${pkg.reconstructionId}.json`;a.click();toast('RECORD EXPORTED');};
  const again=el('button','action ghost');again.style.marginTop='12px';
  again.innerHTML=`<span class="ico">${MK.replay}</span><span class="tx"><b>NEW TRIAL</b><span>RETURN TO LOBBY</span></span><span class="arw">&rsaquo;</span>`;
  body.appendChild(again);again.onclick=()=>{STATE.step=0;STATE.match=null;STATE.turn='pros';STATE.rulingIdx=0;render();};
  const c=el('div','infostrip');c.style.marginTop='16px';
  c.innerHTML=`<span class="i">i</span>Truth isn't given. It's reconstructed. Even the ground truth in this record was authored — which is the point the game is quietly about.`;
  body.appendChild(c);
}

/* 7 · SHARED BITS */
function infoStrip(text,rule){const s=el('div','infostrip');s.innerHTML=`<span class="i">i</span><span>${text}</span>${rule?`<span class="rule">${rule}</span>`:''}`;return s;}
function waitStrip(extra){const s=el('div','infostrip');s.style.borderColor='var(--teal)';
  s.innerHTML=`<span class="i" style="border-color:var(--teal);color:var(--teal);padding:3px">${MK.check}</span><span>${extra?extra+' ':''}Locked in. Handing to the other player…</span>`;return s;}
function centerCard(t,x){const w=el('div','handoff');w.innerHTML=`<div class="spin"></div><div class="lab">${t}</div><div class="desc">${x}</div>`;return w;}
let toastN=null;
function toast(m){if(toastN)toastN.remove();toastN=el('div');toastN.textContent=m;
  toastN.style.cssText='position:fixed;left:50%;top:15%;transform:translateX(-50%);z-index:200;background:var(--bg2);border:1px solid var(--ink);padding:11px 16px;font-size:11px;letter-spacing:.12em;color:var(--ink)';
  document.body.appendChild(toastN);setTimeout(()=>{toastN&&toastN.remove();toastN=null;},1600);}
addEventListener('resize',()=>{if(TOY)TOY._resize();if(TOY2)TOY2._resize();});

/* 8 · BOOT */
render();
</script>
</body>
</html>
