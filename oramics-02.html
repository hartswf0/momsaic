<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0, viewport-fit=cover" />
<meta name="theme-color" content="#ffffff" />
<title>ORAMICS TOUCH FILM — STABILIZED</title>
<style>
  :root {
    --bg: #ffffff;
    --ink: #000000;
    --safe-top: env(safe-area-inset-top, 0px);
    --safe-bottom: env(safe-area-inset-bottom, 0px);
    --line: 1px solid #000000;
    --fat: 2px solid #000000;
    --mono: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
    --sans: Arial, Helvetica, sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; border-radius: 0 !important; -webkit-tap-highlight-color: transparent; }
  
  /* STRICT VIEWPORT LOCK: Eliminates bottom URL bar cut-off */
  html, body {
    width: 100%; height: 100%;
    position: fixed; top: 0; left: 0;
    overflow: hidden;
    background: var(--bg); color: var(--ink);
    touch-action: none; overscroll-behavior: none;
    -webkit-user-select: none; user-select: none;
  }

  body { font-family: var(--mono); }
  button { appearance: none; -webkit-appearance: none; font: inherit; color: var(--ink); background: var(--bg); border: var(--line); cursor: pointer; }
  button:focus-visible { outline: 2px solid var(--ink); outline-offset: -4px; }

  /* Dynamic --vh prevents squashing under mobile chrome */
  .machine {
    position: absolute; top: 0; left: 0; width: 100%;
    height: 100vh; height: calc(var(--vh, 1vh) * 100);
    display: flex; flex-direction: column;
    background: var(--bg); color: var(--ink); overflow: hidden;
  }

  /* M0: HEADER */
  .header {
    flex: 0 0 auto;
    padding: calc(6px + var(--safe-top)) 6px 5px; border-bottom: var(--fat);
    display: flex; align-items: stretch; justify-content: space-between;
  }
  .brand { display: flex; flex-direction: column; justify-content: center; }
  .title { font-family: var(--sans); font-weight: 900; font-size: clamp(24px, 8vw, 36px); line-height: 0.85; letter-spacing: -0.05em; text-transform: uppercase; }
  .subtitle { font-size: 10px; font-weight: 900; text-transform: uppercase; }

  .play-cell {
    width: 110px; display: flex; align-items: center; justify-content: center;
    font-size: 18px; font-weight: 900; text-transform: uppercase;
    border: var(--fat); background: var(--bg); color: var(--ink); transition: 0.1s;
  }
  .play-cell.on { background: var(--ink); color: var(--bg); animation: pulsePlay 1.2s infinite alternate; }
  @keyframes pulsePlay { 0% { background: var(--ink); } 100% { background: #444; } }

  /* M1: OPTICAL FILM DECK */
  .film-deck { flex: 1 1 auto; position: relative; width: 100%; min-height: 0; background: var(--bg); }
  canvas#film { position: absolute; inset: 0; width: 100%; height: 100%; display: block; image-rendering: pixelated; }
  
  /* M2: ORAM BUS */
  .bus { flex: 0 0 24px; display: flex; border-top: var(--fat); border-bottom: var(--line); background: var(--bg); }
  .bus-cell { display: flex; align-items: center; justify-content: center; border-right: var(--line); font-size: 10px; font-weight: 900; padding: 0 6px; }
  .bus-cell:last-child { border-right: none; flex: 1; justify-content: flex-end; }
  .bus-cell.live-on { background: var(--ink); color: var(--bg); }

  /* M3: RELAY LEDGER */
  .ledger { flex: 0 0 34px; display: flex; background: var(--bg); }
  .ledger-tag { width: 56px; display: flex; align-items: center; justify-content: center; background: var(--ink); color: var(--bg); font-size: 10px; font-weight: 900; }
  .ledger-slip { flex: 1; display: flex; align-items: center; padding: 0 8px; font-size: 10px; font-weight: 900; text-transform: uppercase; border-left: var(--fat); }
  .ledger-slip.engaged { background: var(--ink); color: var(--bg); }

  /* M4: ACTION COMMANDS */
  .commands {
    flex: 0 0 auto; display: flex; gap: 5px;
    padding: 6px; padding-bottom: max(6px, var(--safe-bottom));
    border-top: var(--fat); background: var(--bg);
  }
  .cmd {
    flex: 1; display: flex; flex-direction: column; align-items: flex-start; justify-content: center;
    padding: 6px; border: var(--fat); min-height: 48px; background: var(--bg); color: var(--ink);
  }
  .cmd b { font-size: clamp(12px, 3vw, 15px); font-weight: 900; text-transform: uppercase; line-height: 1.1; letter-spacing: -0.5px; }
  .cmd span { font-size: 9px; font-weight: 900; text-transform: uppercase; line-height: 1.1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; width: 100%; text-align: left; }
  .cmd.active { background: var(--ink); color: var(--bg); }

</style>
</head>
<body>
<div class="machine" id="machine">
  <header class="header">
    <div class="brand">
      <h1 class="title">ORAMICS TOUCH</h1>
      <p class="subtitle">GAPLESS INDEX INTERPOLATION</p>
    </div>
    <button id="btnPlay" class="play-cell" type="button">► PLAY</button>
  </header>

  <main class="film-deck" id="filmDeck">
    <canvas id="film"></canvas>
  </main>

  <section class="bus">
    <div class="bus-cell" id="busLive">LIVE</div>
    <div class="bus-cell" id="busIdx">IDX 0000</div>
    <div class="bus-cell" id="busVer">VER 000</div>
    <div class="bus-cell" id="busFault">OK</div>
  </section>

  <section class="ledger">
    <div class="ledger-tag" id="ledgerTag">DRAW</div>
    <div id="ledgerSlip" class="ledger-slip">SYSTEM IDLE. AWAITING RUN COMMAND.</div>
  </section>

  <nav class="commands">
    <button class="cmd active" id="btnArm" type="button"><b>ARM: PITCH</b><span>CYCLE TRACK</span></button>
    <button class="cmd" id="btnWipe" type="button"><b>WIPE</b><span>CLEAR TRACK</span></button>
    <button class="cmd" id="btnResync" type="button"><b>RESYNC</b><span>FIX GLITCH</span></button>
    <button class="cmd" id="btnBflix" type="button"><b>EXPORT</b><span>.BFLIX</span></button>
  </nav>
</div>

<script>
(() => {
  'use strict';

  // --- ARCHITECTURE CONSTANTS ---
  const BUFFER_SIZE = 2048;
  const CYCLE_SECONDS = 4.8;
  const BASELINES = { PITCH: 0.42, VOLUME: 0.32, REVERB: 0.08, GATE: 1.0 };
  const STRIPS = [
    { id: 'PITCH', share: .34, baseline: BASELINES.PITCH },
    { id: 'VOLUME', share: .26, baseline: BASELINES.VOLUME },
    { id: 'REVERB', share: .22, baseline: BASELINES.REVERB },
    { id: 'GATE', share: .18, baseline: BASELINES.GATE }
  ];
  const STRIP_ORDER = STRIPS.map(s => s.id);

  const state = {
    activeStrip: 'PITCH', running: false, audioIndex: 0, phase: 0,
    versions: { PITCH: 0, VOLUME: 0, REVERB: 0, GATE: 0 },
    pen: { active: false, pointerId: null, x: 0, y: 0, lastIdx: -1, lastVal: -1 },
    needsPaint: true, dpr: 1, w: 1, h: 1, lanes: []
  };

  const buffers = {};
  STRIPS.forEach(s => buffers[s.id] = new Float32Array(BUFFER_SIZE).fill(s.baseline));

  const canvas = document.getElementById('film');
  const ctx = canvas.getContext('2d', { alpha: false, desynchronized: true });
  const ledgerSlip = document.getElementById('ledgerSlip');
  const busIdx = document.getElementById('busIdx');
  
  let audioCtx = null, worklet = null, raf = 0, lastFrameTime = performance.now();
  const strokeTrail = [];
  const timeOrigin = performance.timeOrigin || 0;

  function clamp01(v) { return Math.max(0, Math.min(1, v)); }
  function pad(n) { return String(Math.floor(n)).padStart(4, '0'); }
  function now() { return performance.now(); }

  // --- LAYOUT CORE ---
  function updateViewport() {
    document.documentElement.style.setProperty('--vh', `${window.innerHeight * 0.01}px`);
  }

  function resize() {
    const rect = canvas.parentElement.getBoundingClientRect();
    state.dpr = Math.max(1, Math.min(2.5, window.devicePixelRatio || 1));
    state.w = Math.max(1, Math.floor(rect.width));
    state.h = Math.max(1, Math.floor(rect.height));
    canvas.width = Math.floor(state.w * state.dpr);
    canvas.height = Math.floor(state.h * state.dpr);
    ctx.setTransform(state.dpr, 0, 0, state.dpr, 0, 0);
    
    const padY = 7, gap = 7, available = Math.max(10, state.h - padY * 2 - gap * (STRIPS.length - 1));
    let y = padY;
    state.lanes = STRIPS.map((strip, i) => {
      const remainShare = STRIPS.slice(i).reduce((sum, s) => sum + s.share, 0);
      const laneH = Math.max(5, Math.floor((available - gap * (STRIPS.length - 1 - i)) * (strip.share / remainShare)));
      const lane = { id: strip.id, x: 7, y, w: state.w - 14, h: laneH };
      y += laneH + gap;
      return lane;
    });
    state.needsPaint = true;
  }

  // --- SPATIAL MATH (Exact Hardware Extrapolation) ---
  function getEventTime(ev) {
    let t = ev.timeStamp;
    if (t > 1e12) t -= timeOrigin; // Normalizes epoch timestamps to DOMHighResTimeStamp
    return t;
  }

  function getCanvasPoint(ev) {
    const rect = canvas.getBoundingClientRect();
    return { x: ev.clientX - rect.left, y: ev.clientY - rect.top, t: getEventTime(ev) };
  }

  // Translates physical pixel to exact chronological index, factoring time elapsed since last render
  function visibleToIndex(x, lane, time) {
    const rx = state.w / 2;
    const phaseOffset = (x - rx) / lane.w;
    let exactPhase = state.phase;
    
    if (state.running && time && lastFrameTime) {
      const dt = time - lastFrameTime;
      exactPhase += (dt / 1000) / CYCLE_SECONDS;
    }
    
    let shifted = (exactPhase + phaseOffset) % 1;
    if (shifted < 0) shifted += 1;
    return Math.max(0, Math.min(BUFFER_SIZE - 1, Math.floor(shifted * BUFFER_SIZE)));
  }

  function yToValue(y, lane, stripId) {
    const raw = 1 - ((y - lane.y) / Math.max(1, lane.h));
    return stripId === 'GATE' ? (clamp01(raw) > .48 ? 1 : 0) : clamp01(raw);
  }

  function laneFor(id) { return state.lanes.find(l => l.id === id) || state.lanes[0]; }

  // --- AUDIO WORKLET ENGINE (ANALOG SLEW LIMITERS) ---
  async function bootAudio() {
    if (audioCtx) return;
    const AC = window.AudioContext || window.webkitAudioContext;
    audioCtx = new AC({ latencyHint: 'interactive' });
    const code = `
class OramicsAnalog extends AudioWorkletProcessor {
  constructor(){
    super();
    this.s=2048; this.ph=0; this.oscPh=0;
    this.p=new Float32Array(this.s); this.v=new Float32Array(this.s); 
    this.r=new Float32Array(this.s); this.g=new Float32Array(this.s);
    
    // ANTI-GLITCH SLEW LIMITERS (Control Voltage Smoothers)
    this.slewP=0; this.slewV=0; this.slewR=0; this.slewG=0;
    this.hpState=0;
    
    this.delay=new Float32Array(44100); this.dIdx=0;
    this.run=false;
    
    this.port.onmessage=e=>{
      const m=e.data;
      if(m.type==='RUN') this.run=m.run;
      if(m.type==='SYNC'){ this.p.set(m.b.PITCH); this.v.set(m.b.VOLUME); this.r.set(m.b.REVERB); this.g.set(m.b.GATE); }
      if(m.type==='PATCH'){
        const t=m.id==='PITCH'?this.p:m.id==='VOLUME'?this.v:m.id==='REVERB'?this.r:this.g;
        for(let i=0;i<m.val.length;i++) t[(m.start+i)%this.s]=m.val[i];
      }
    };
  }
  process(ins, outs){
    const outL=outs[0][0], outR=outs[0][1]; if(!outL) return true;
    for(let i=0; i<outL.length; i++){
      if(!this.run){ outL[i]=0; if(outR) outR[i]=0; continue; }
      
      const idx = Math.floor(this.ph*(this.s-1));
      
      // Slew Limiting: Glides instantaneous jumps over ~4.5ms
      this.slewP += (this.p[idx] - this.slewP) * 0.005;
      this.slewV += (this.v[idx] - this.slewV) * 0.005;
      this.slewR += (this.r[idx] - this.slewR) * 0.005;
      this.slewG += ((this.g[idx]>.48?1:0) - this.slewG) * 0.05; 

      // Exponential pitch: ~32Hz to ~4kHz
      const freq = 32 * Math.pow(2, this.slewP * 7.25);
      const amp = Math.pow(this.slewV, 1.3) * this.slewG;
      
      this.oscPh += 2*Math.PI*freq/sampleRate; 
      if(this.oscPh > Math.PI*2) this.oscPh -= Math.PI*2;
      
      // Warm Analog Wave (Sine folded with harmonic)
      const raw = (Math.sin(this.oscPh) + 0.3 * Math.sin(2 * this.oscPh)) * amp;
      
      // Tape Delay (300ms) with HPF Feedback to kill low-end mud
      const dSmp = Math.floor(0.3 * sampleRate);
      const wet = this.delay[(this.dIdx - dSmp + 44100) % 44100] || 0;
      
      this.hpState += (300 / sampleRate) * (wet - this.hpState);
      const hpWet = wet - this.hpState;
      
      this.delay[this.dIdx] = raw + hpWet * Math.min(0.85, this.slewR * 0.9);
      this.dIdx = (this.dIdx + 1) % 44100;
      
      outL[i] = Math.tanh(raw + wet * this.slewR * 0.7);
      if(outR) outR[i] = outL[i];

      this.ph += 1/(sampleRate * ${CYCLE_SECONDS});
      if(this.ph >= 1.0) this.ph -= 1.0;
    }
    
    // Throttled UI Sync emission (approx 17 times a second)
    if(Math.random() < 0.05) this.port.postMessage({ idx: Math.floor(this.ph*(this.s-1)), ph: this.ph });
    return true;
  }
}
registerProcessor('oram', OramicsAnalog);`;
    const url = URL.createObjectURL(new Blob([code], {type:'application/javascript'}));
    await audioCtx.audioWorklet.addModule(url);
    worklet = new AudioWorkletNode(audioCtx, 'oram', { outputChannelCount: [2] });
    worklet.port.onmessage = e => {
      state.audioIndex = e.data.idx;
      // Drift protection
      if (Math.abs(state.phase - e.data.ph) > 0.05 && Math.abs(state.phase - e.data.ph) < 0.95) {
        state.phase = e.data.ph; 
      }
      const busLive = document.getElementById('busLive');
      busLive.classList.add('live-on');
      setTimeout(() => busLive.classList.remove('live-on'), 50);
    };
    worklet.connect(audioCtx.destination);
    worklet.port.postMessage({ type:'SYNC', b:buffers });
  }

  // --- TACTILE ENGINE (ABSOLUTE GAPLESS INTERPOLATION) ---
  function updateLedger(txt) {
    ledgerSlip.textContent = txt;
    ledgerSlip.classList.add('engaged');
    setTimeout(() => ledgerSlip.classList.remove('engaged'), 150);
    busIdx.textContent = 'IDX ' + pad(state.audioIndex);
    document.getElementById('busVer').textContent = 'VER ' + String(state.versions[state.activeStrip]).padStart(3, '0');
  }

  function broadcastPatch(stripId, startIndex, values) {
    state.versions[stripId]++;
    if (worklet) worklet.port.postMessage({ type:'PATCH', id: stripId, start: startIndex, val: values });
    state.needsPaint = true;
  }

  function applyStrokeWrites(idxA, valA, idxB, valB, stripId) {
    const buf = buffers[stripId];
    let dist = idxB - idxA;
    if (dist > BUFFER_SIZE / 2) dist -= BUFFER_SIZE;
    if (dist < -BUFFER_SIZE / 2) dist += BUFFER_SIZE;

    const steps = Math.abs(dist);
    const writes = [];

    if (steps === 0) {
      if (buf[idxB] !== valB) { buf[idxB] = valB; writes.push(idxB); }
      return writes;
    }

    const startIdx = dist > 0 ? idxA : idxB;
    const startVal = dist > 0 ? valA : valB;
    const endVal = dist > 0 ? valB : valA;

    for (let i = 0; i <= steps; i++) {
      const t = i / steps;
      const v = startVal + (endVal - startVal) * t;
      let writeIdx = (startIdx + i) % BUFFER_SIZE;
      if (writeIdx < 0) writeIdx += BUFFER_SIZE;
      buf[writeIdx] = v;
      writes.push(writeIdx);
    }
    return writes;
  }

  function pointerDown(ev) {
    if (state.drawing) return; 
    ev.preventDefault(); 
    state.pointerId = ev.pointerId;
    try { canvas.setPointerCapture(ev.pointerId); } catch(e){}
    
    const p = getCanvasPoint(ev);
    
    const touched = state.lanes.find(l => p.y >= l.y && p.y <= l.y + l.h);
    if (touched && touched.id !== state.activeStrip) {
      state.activeStrip = touched.id;
      document.getElementById('btnArm').querySelector('b').textContent = `ARM: ${state.activeStrip}`;
      updateLedger(`FOCUS BOUND TO ${state.activeStrip}.`);
    }
    
    state.pen.active = true;
    state.pen.x = p.x; state.pen.y = p.y;
    
    const lane = laneFor(state.activeStrip);
    state.pen.lastIdx = visibleToIndex(p.x, lane, p.t);
    state.pen.lastVal = yToValue(p.y, lane, state.activeStrip);
    
    const writes = applyStrokeWrites(state.pen.lastIdx, state.pen.lastVal, state.pen.lastIdx, state.pen.lastVal, state.activeStrip);
    if (writes.length) broadcastPatch(state.activeStrip, writes[0], [state.pen.lastVal]);
    
    strokeTrail.push({x: p.x, y: p.y, t: now()});
  }

  function pointerMove(ev) {
    if (!state.pen.active || ev.pointerId !== state.pointerId) return;
    ev.preventDefault();
    const pts = ev.getCoalescedEvents ? ev.getCoalescedEvents() : [ev];
    
    let minIdx = BUFFER_SIZE;
    let maxIdx = -1;

    for (const evPt of pts) {
      const p = getCanvasPoint(evPt);
      state.pen.x = p.x; state.pen.y = p.y;
      
      const lane = laneFor(state.activeStrip);
      const currentIdx = visibleToIndex(p.x, lane, p.t);
      const currentVal = yToValue(p.y, lane, state.activeStrip);
      
      const writes = applyStrokeWrites(state.pen.lastIdx, state.pen.lastVal, currentIdx, currentVal, state.activeStrip);
      
      if (writes.length) {
        minIdx = Math.min(minIdx, ...writes);
        maxIdx = Math.max(maxIdx, ...writes);
      }

      state.pen.lastIdx = currentIdx;
      state.pen.lastVal = currentVal;
      strokeTrail.push({ x: p.x, y: p.y, t: now() });
    }

    if (maxIdx !== -1) {
      if (maxIdx - minIdx > BUFFER_SIZE / 2) {
        broadcastPatch(state.activeStrip, 0, Array.from(buffers[state.activeStrip]));
      } else {
        const payload = Array.from(buffers[state.activeStrip].subarray(minIdx, maxIdx + 1));
        broadcastPatch(state.activeStrip, minIdx, payload);
      }
    }
  }

  function pointerUp(ev) {
    if(ev.pointerId !== state.pointerId) return;
    ev.preventDefault(); 
    state.pen.active = false; 
    state.drawing = false; 
    state.pointerId = null;
    try { canvas.releasePointerCapture(ev.pointerId); } catch(e){}
    updateLedger(`DRAWING COMPLETE. BUFFER UPDATED.`);
  }

  // --- COMMAND INTERFACE ---
  const btnPlay = document.getElementById('btnPlay');
  btnPlay.addEventListener('pointerdown', async (ev) => {
    ev.preventDefault();
    if (!audioCtx) await bootAudio();
    if (audioCtx.state === 'suspended') await audioCtx.resume();
    state.running = !state.running;
    worklet.port.postMessage({ type:'RUN', run: state.running });
    btnPlay.textContent = state.running ? "■ STOP" : "► PLAY";
    btnPlay.classList.toggle('on', state.running);
    updateLedger(state.running ? "APERTURE OPEN. CONVERTING FILM TO SOUND." : "APERTURE CLOSED. LOOP HALTED.");
  });

  document.getElementById('btnArm').addEventListener('pointerdown', ev => {
    ev.preventDefault();
    state.activeStrip = STRIP_ORDER[(STRIP_ORDER.indexOf(state.activeStrip) + 1) % STRIP_ORDER.length];
    document.getElementById('btnArm').querySelector('b').textContent = `ARM: ${state.activeStrip}`;
    updateLedger(`ARMED: ${state.activeStrip}. NEXT TOUCH WRITES MASS.`);
    state.needsPaint = true;
  });

  document.getElementById('btnWipe').addEventListener('pointerdown', ev => {
    ev.preventDefault();
    const bl = STRIPS.find(s=>s.id===state.activeStrip).baseline;
    buffers[state.activeStrip].fill(bl);
    broadcastPatch(state.activeStrip, 0, Array.from(buffers[state.activeStrip]));
    updateLedger(`${state.activeStrip} WIPED TO BASELINE.`);
  });

  document.getElementById('btnResync').addEventListener('pointerdown', async (ev) => {
    ev.preventDefault();
    if(audioCtx && audioCtx.state === 'suspended') await audioCtx.resume();
    if(worklet) worklet.port.postMessage({ type:'SYNC', b:buffers });
    updateLedger(`CONTRACT RESTORED. AUDIO GLITCHES CLEARED.`);
  });

  document.getElementById('btnBflix').addEventListener('pointerdown', ev => {
    ev.preventDefault();
    const payload = {
      format: "abc-flix", version: "1.0", type: "oramics-emulation",
      length: BUFFER_SIZE, cycleSeconds: CYCLE_SECONDS,
      tracks: {
        PITCH: Array.from(buffers.PITCH), VOLUME: Array.from(buffers.VOLUME),
        REVERB: Array.from(buffers.REVERB), GATE: Array.from(buffers.GATE)
      }
    };
    const blob = new Blob([JSON.stringify(payload)], {type: "application/json"});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = `oramics_${Date.now()}.bflix`;
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    URL.revokeObjectURL(url);
    updateLedger("BFLIX FILE EXPORTED SUCCESSFULLY.");
  });

  // --- RENDERING PIPELINE ---
  function draw() {
    const t = now();
    const dt = t - lastFrameTime;
    lastFrameTime = t;

    if (!state.needsPaint && !state.running && strokeTrail.length === 0 && !state.pen.active) {
      raf = requestAnimationFrame(draw); return;
    }
    state.needsPaint = false;

    if (state.running) {
      state.phase += (dt / 1000) / CYCLE_SECONDS;
      if (state.phase >= 1.0) state.phase -= 1.0;
      state.audioIndex = Math.floor(state.phase * (BUFFER_SIZE - 1));
      busIdx.textContent = 'IDX ' + pad(state.audioIndex);
    }

    // Crucial: Draw while stationary to perfectly capture phase offset against physical finger
    if (state.pen.active) {
      const lane = laneFor(state.activeStrip);
      const currentIdx = visibleToIndex(state.pen.x, lane, false);
      const currentVal = yToValue(state.pen.y, lane, state.activeStrip);
      const writes = applyStrokeWrites(state.pen.lastIdx, state.pen.lastVal, currentIdx, currentVal, state.activeStrip);
      
      if (writes.length) {
        const minIdx = Math.min(...writes), maxIdx = Math.max(...writes);
        if (maxIdx - minIdx > BUFFER_SIZE / 2) {
          broadcastPatch(state.activeStrip, 0, Array.from(buffers[state.activeStrip]));
        } else {
          broadcastPatch(state.activeStrip, minIdx, Array.from(buffers[state.activeStrip].subarray(minIdx, maxIdx + 1)));
        }
      }
      state.pen.lastIdx = currentIdx;
      state.pen.lastVal = currentVal;
    }

    ctx.fillStyle = '#fff'; ctx.fillRect(0,0,state.w,state.h);
    ctx.strokeStyle = '#000'; ctx.lineWidth = 2; ctx.strokeRect(1,1,state.w-2,state.h-2);
    
    for(const lane of state.lanes){
      const active = lane.id === state.activeStrip;
      ctx.strokeStyle = '#000'; ctx.lineWidth = active ? 3 : 2;
      ctx.strokeRect(lane.x, lane.y, lane.w, lane.h);
      
      // Moving Dots Substrate
      ctx.fillStyle = '#000';
      const dx = Math.max(10, Math.floor(lane.w / 28)), dy = Math.max(10, Math.floor(lane.h / 7));
      const offset = (state.phase * lane.w) % dx;
      for(let y = lane.y+8; y < lane.y+lane.h-4; y+=dy){
        for(let x = lane.x+8-offset; x < lane.x+lane.w-4; x+=dx){
          ctx.fillRect(Math.round(x), Math.round(y), 2, 2);
        }
      }

      // High-Fidelity Continuous Line Drawing
      if (lane.id !== 'GATE') {
        ctx.beginPath();
        const arr = buffers[lane.id];
        let prevIdx = -1;
        let started = false;
        
        for(let x=0; x<=Math.floor(lane.w); x+=1){
          const vx = lane.x + x;
          const idx = visibleToIndex(vx, lane, false); 
          const y = lane.y + (1 - arr[idx]) * lane.h;
          
          if(!started || Math.abs(idx - prevIdx) > BUFFER_SIZE / 2) {
              ctx.moveTo(vx, y);
              started = true;
          } else {
              ctx.lineTo(vx, y);
          }
          prevIdx = idx;
        }
        ctx.lineWidth = active ? 4 : 2; ctx.lineJoin = 'round'; ctx.stroke();
      }

      // Gate Optical Mass Logic
      if(lane.id === 'GATE'){
        ctx.fillStyle = '#000';
        for(let c=0; c<72; c++){
          const x = lane.x + (c/72)*lane.w;
          if(buffers[lane.id][visibleToIndex(x, lane, false)] < .5) {
            ctx.fillRect(Math.floor(x), lane.y+2, Math.ceil(lane.w/72)+1, lane.h-4);
          }
        }
      }

      // Labels
      const lw = Math.min(118, lane.w*.28);
      ctx.fillStyle = active ? '#000' : '#fff'; ctx.fillRect(lane.x, lane.y, lw, 22);
      ctx.strokeStyle = '#000'; ctx.lineWidth = 1; ctx.strokeRect(lane.x, lane.y, lw, 22);
      ctx.fillStyle = active ? '#fff' : '#000'; ctx.font = '900 11px ui-monospace, monospace';
      ctx.textBaseline = 'middle'; ctx.fillText(lane.id, lane.x+6, lane.y+11);
    }

    // Fixed Central Readhead
    const rx = Math.floor(state.w / 2) + .5;
    ctx.strokeStyle = '#000'; ctx.lineWidth = 4;
    ctx.beginPath(); ctx.moveTo(rx, 0); ctx.lineTo(rx, state.h); ctx.stroke();

    // Fade stroke trail
    while(strokeTrail.length && t - strokeTrail[0].t > 400) strokeTrail.shift();
    ctx.fillStyle = '#000';
    for(const p of strokeTrail){
      const age = t - p.t;
      const size = age < 100 ? 10 : age < 200 ? 6 : 3;
      ctx.fillRect(p.x - size/2, p.y - size/2, size, size);
    }

    raf = requestAnimationFrame(draw);
  }

  canvas.addEventListener('pointerdown', pointerDown, { passive:false });
  canvas.addEventListener('pointermove', pointerMove, { passive:false });
  window.addEventListener('pointerup', pointerUp, { passive:false });
  window.addEventListener('pointercancel', pointerUp, { passive:false });

  document.addEventListener('touchmove', e => e.preventDefault(), { passive:false });
  document.addEventListener('gesturestart', e => e.preventDefault());
  window.addEventListener('resize', () => { updateViewport(); resize(); });
  
  updateViewport(); resize(); 
  raf = requestAnimationFrame(draw);
})();
</script>
</body>
</html>
