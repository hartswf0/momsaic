                    { label: `SHOT COST (${shotsThisLevel})`, value: '-' + tallyPenalty, color: tallyPenalty > 0 ? '#ff5577' : 'rgba(255,255,255,0.5)', delay: 66 },
                ];
                if (usedCompound) lines.push({ label: 'COMPOUND x2', value: '2.0x', color: '#ff5577', delay: 78 });

                ctx.font = '16px var(--font-mono)';
                ctx.shadowBlur = 3; ctx.shadowColor = 'rgba(0,0,0,0.7)';
                lines.forEach((line, i) => {
                    let a = Math.min(1, Math.max(0, (aT - line.delay) / 12));
                    if (a <= 0) return;
                    ctx.globalAlpha = a;
                    let ly = scoreY + i * 32;
                    let numVal = parseInt(line.value.replace(/[^0-9]/g, '')) || 0;
                    let dispVal = Math.floor(numVal * Math.min(1, (aT - line.delay) / 20));
                    let prefix = line.value[0];
                    if (line.value.includes('x')) { dispVal = '2.0x'; prefix = ''; }
                    else dispVal = prefix + dispVal;

                    ctx.fillStyle = 'rgba(255,255,255,0.5)';
                    ctx.textAlign = 'left';
                    ctx.fillText(line.label, width / 2 - 200, ly);
                    ctx.fillStyle = line.color;
                    ctx.textAlign = 'right';
                    ctx.fillText(dispVal, width / 2 + 200, ly);
                });
                ctx.shadowBlur = 0;
                ctx.globalAlpha = 1; ctx.textAlign = 'center';

                // Divider line
                let divDelay = usedCompound ? 90 : 78;
                if (aT > divDelay) {
                    let dA = Math.min(1, (aT - divDelay) / 10);
                    ctx.globalAlpha = dA;
                    ctx.beginPath();
                    ctx.moveTo(width / 2 - 200, scoreY + lines.length * 32 + 10);
                    ctx.lineTo(width / 2 + 200, scoreY + lines.length * 32 + 10);
                    ctx.strokeStyle = 'rgba(0, 255, 204, 0.4)'; ctx.lineWidth = 1.5; ctx.stroke();
                    ctx.globalAlpha = 1;
                }

                // Net Yield — big reveal
                let yieldDelay = divDelay + 15;
                if (aT > yieldDelay) {
                    let yA = Math.min(1, (aT - yieldDelay) / 15);
                    let yScale = 1 + (1 - yA) * 0.3;
                    ctx.globalAlpha = yA;
                    ctx.save();
                    ctx.translate(width / 2, scoreY + lines.length * 32 + 50);
                    ctx.scale(yScale, yScale);
                    ctx.font = 'bold 26px var(--font-mono)';
                    ctx.fillStyle = '#00ffcc';
                    ctx.shadowBlur = 6; ctx.shadowColor = '#00ffcc';
                    let dispYield = Math.floor(tallyFinal * Math.min(1, (aT - yieldDelay) / 25));
                    ctx.fillText(`NET YIELD: ${dispYield}`, 0, 0);
                    ctx.shadowBlur = 0;
                    ctx.restore();
                    ctx.globalAlpha = 1;
                }

                // Rank — dramatic entrance
                let rankDelay = yieldDelay + 30;
                if (aT > rankDelay) {
                    let rA = Math.min(1, (aT - rankDelay) / 20);
                    let rScale = 1 + (1 - rA) * 1.5;
                    ctx.globalAlpha = rA;
                    ctx.save();
                    ctx.translate(width / 2, scoreY + lines.length * 32 + 120);
                    ctx.scale(rScale, rScale);
                    ctx.font = 'bold 72px var(--font-mono)';
                    ctx.fillStyle = tallyRankColor;
                    ctx.shadowBlur = 40; ctx.shadowColor = tallyRankColor;
                    ctx.fillText(tallyRank, 0, 0);
                    ctx.shadowBlur = 0;
                    ctx.restore();
                    ctx.globalAlpha = 1;
                }

                // Continue prompt
                if (aT > rankDelay + 30) {
                    let pA = (Math.sin(Date.now() / 400) + 1) / 2;
                    ctx.globalAlpha = 0.4 + pA * 0.5;
                    ctx.font = '16px var(--font-mono)';
                    ctx.fillStyle = '#e0e0e5';
                    ctx.fillText('TAP TO CONTINUE', width / 2, height - 50);
                    ctx.globalAlpha = 1;
                }
            }

            requestAnimationFrame(render);
        }

        function drawMetaScreens() {
            // --- TITLE SCREEN ---
            if (state === 'TITLE_SCREEN') {
                ctx.fillStyle = '#050507'; ctx.fillRect(0, 0, width, height);

                // Animated grid background
                ctx.strokeStyle = 'rgba(0, 255, 204, 0.03)'; ctx.lineWidth = 1;
                for (let x = 0; x < width; x += 40) {
                    ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, height); ctx.stroke();
                }
                for (let y = 0; y < height; y += 40) {
                    ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(width, y); ctx.stroke();
                }

                // Animated particles
                let t = Date.now() / 1000;
                ctx.globalCompositeOperation = 'screen';
                for (let i = 0; i < 30; i++) {
                    let px = (Math.sin(t * 0.3 + i * 2.1) * 0.5 + 0.5) * width;
                    let py = (Math.cos(t * 0.2 + i * 1.7) * 0.5 + 0.5) * height;
                    let r = 2 + Math.sin(t + i) * 1;
                    ctx.beginPath(); ctx.arc(px, py, r, 0, Math.PI * 2);
                    ctx.fillStyle = i % 3 === 0 ? 'rgba(0,255,204,0.15)' : (i % 3 === 1 ? 'rgba(0,136,255,0.1)' : 'rgba(255,42,95,0.08)');
                    ctx.fill();
                }
                ctx.globalCompositeOperation = 'source-over';

                // Title
                ctx.textAlign = 'center';
                let titlePulse = Math.sin(t * 1.5) * 0.15 + 0.85;
                ctx.font = 'bold 56px var(--font-mono)';
                ctx.fillStyle = `rgba(0, 255, 204, ${titlePulse})`;
                ctx.shadowBlur = 50; ctx.shadowColor = '#00ffcc';
                ctx.fillText('PUTT-OP', width / 2, height * 0.14);
                ctx.shadowBlur = 0;

                ctx.font = '16px var(--font-mono)';
                ctx.fillStyle = 'rgba(255, 255, 255, 0.45)';
                ctx.fillText('EPISTEMIC PHYSICS', width / 2, height * 0.14 + 36);

                // Play button
                let btnY = height * 0.28;
                let btnHover = Math.sin(t * 2) * 2;
                ctx.strokeStyle = 'rgba(0, 255, 204, 0.5)'; ctx.lineWidth = 2;
                ctx.strokeRect(width / 2 - 110, btnY - 24 + btnHover, 220, 48);
                ctx.font = 'bold 18px var(--font-mono)';
                ctx.fillStyle = '#00ffcc';
                ctx.fillText('CONTINUE', width / 2, btnY + 6 + btnHover);
                ctx.font = '12px var(--font-mono)';
                ctx.fillStyle = 'rgba(255,255,255,0.35)';
                ctx.fillText(`PARADIGM ${Math.min(highestUnlocked + 1, levels.length)}`, width / 2, btnY + 22 + btnHover);

                // Level grid
                let cols = Math.min(6, Math.max(3, Math.floor(width / 130)));
                let cellW = Math.min(110, (width - 80) / cols);
                let cellH = cellW * 0.85;
                let gridW = cols * cellW;
                let startX = (width - gridW) / 2;
                let startY = height * 0.40;

                const PNAMES = [
                    'FIRST CONTACT', 'THE CRADLE', 'GRAVITY WELL', 'FOUR CORNERS', 'THE SWITCHBACK',
                    'GRAVITY CORRIDOR', 'TWIN ORBITS', 'SNIPER SHIELD', 'THE FUNNEL', 'EVENT HORIZON',
                    'GRIP', 'TEST', 'CRACK', 'CARRY', 'HATCH',
                    'EAT', 'BURY', 'SANKOFA', 'THE SPIRAL', 'THE GAUNTLET',
                    'THE NEST', 'THE MIRROR', 'THE ANCESTORS', 'THE EGG'
                ];

                ctx.font = '14px var(--font-mono)';
                ctx.fillStyle = 'rgba(255,255,255,0.3)';
                ctx.fillText('SELECT PARADIGM', width / 2, startY - 14);

                for (let i = 0; i < levels.length; i++) {
                    let col = i % cols, row = Math.floor(i / cols);
                    let cx = startX + col * cellW + cellW / 2;
                    let cy = startY + row * (cellH + 10) + cellH / 2;
                    let unlocked = i <= highestUnlocked;
                    let completed = levelRanks[i];

                    // Cell background
                    ctx.fillStyle = unlocked ? 'rgba(15,20,30,0.85)' : 'rgba(10,10,15,0.5)';
                    ctx.fillRect(cx - cellW / 2 + 3, cy - cellH / 2 + 3, cellW - 6, cellH - 6);

                    // Border
                    if (completed) {
                        ctx.strokeStyle = completed.color || '#00ffcc';
                    } else if (unlocked) {
                        ctx.strokeStyle = 'rgba(0, 255, 204, 0.35)';
                    } else {
                        ctx.strokeStyle = 'rgba(255,255,255,0.08)';
                    }
                    ctx.lineWidth = completed ? 2 : 1;
                    ctx.strokeRect(cx - cellW / 2 + 3, cy - cellH / 2 + 3, cellW - 6, cellH - 6);

                    // Number
                    ctx.font = 'bold 20px var(--font-mono)';
                    ctx.fillStyle = unlocked ? 'rgba(255,255,255,0.8)' : 'rgba(255,255,255,0.12)';
                    ctx.fillText(i + 1, cx, cy - 6);

                    // Name
                    if (unlocked && PNAMES[i]) {
                        ctx.font = '9px var(--font-mono)';
                        ctx.fillStyle = 'rgba(255,255,255,0.35)';
                        ctx.fillText(PNAMES[i], cx, cy + 14);
                    }

                    // Rank badge
                    if (completed) {
                        ctx.font = 'bold 13px var(--font-mono)';
                        ctx.fillStyle = completed.color;
                        ctx.fillText(completed.rank, cx + cellW / 2 - 16, cy - cellH / 2 + 18);
                    }

                    // Lock icon
                    if (!unlocked) {
                        ctx.font = '16px var(--font-mono)';
                        ctx.fillStyle = 'rgba(255,255,255,0.1)';
                        ctx.fillText('-', cx, cy + 2);
                    }
                }

                // Footer
                ctx.font = '14px var(--font-mono)';
                ctx.fillStyle = 'rgba(255,255,255,0.2)';
                ctx.fillText(`TOTAL SCORE: ${(bankedScore || 0).toString().padStart(6, '0')}`, width / 2, height - 34);

                // SANKOFA tagline
                ctx.font = '11px var(--font-mono)';
                ctx.fillStyle = 'rgba(0, 255, 204, 0.18)';
                ctx.fillText('SANKOFA-CLAW // GO BACK AND FETCH IT', width / 2, height - 14);
            }

            // --- TUTORIAL ---
            if (state === 'TUTORIAL') {
                ctx.fillStyle = 'rgba(5, 5, 7, 0.94)'; ctx.fillRect(0, 0, width, height);

                let card = TUTORIAL_CARDS[tutorialStep];
                let cardW = Math.min(500, width - 50);
                let cardH = 280;
                let cx = width / 2, cy = height / 2;

                // Card background
                ctx.fillStyle = 'rgba(12, 16, 28, 0.95)';
                ctx.strokeStyle = 'rgba(0, 255, 204, 0.25)';
                ctx.lineWidth = 1.5;
                ctx.fillRect(cx - cardW / 2, cy - cardH / 2, cardW, cardH);
                ctx.strokeRect(cx - cardW / 2, cy - cardH / 2, cardW, cardH);

                // Step indicator
                ctx.textAlign = 'center';
                ctx.font = '14px var(--font-mono)';
                ctx.fillStyle = 'rgba(0, 255, 204, 0.5)';
                ctx.fillText(`${tutorialStep + 1} / ${TUTORIAL_CARDS.length}`, cx, cy - cardH / 2 + 30);

                // Title
                ctx.font = 'bold 30px var(--font-mono)';
                ctx.fillStyle = '#00ffcc';
                ctx.shadowBlur = 6; ctx.shadowColor = '#00ffcc';
                ctx.fillText(card.title, cx, cy - 35);
                ctx.shadowBlur = 0;

                // Body
                ctx.font = '16px var(--font-mono)';
                ctx.fillStyle = 'rgba(255, 255, 255, 0.85)';
                // Word-wrap
                let words = card.body.split(' ');
                let line = '', lineY = cy + 5, maxW = cardW - 60;
                words.forEach(word => {
                    let test = line + word + ' ';
                    if (ctx.measureText(test).width > maxW) {
                        ctx.fillText(line.trim(), cx, lineY);
                        line = word + ' '; lineY += 24;
                    } else { line = test; }
                });
                if (line) ctx.fillText(line.trim(), cx, lineY);

                // Progress dots
                for (let i = 0; i < TUTORIAL_CARDS.length; i++) {
                    ctx.beginPath(); ctx.arc(cx - (TUTORIAL_CARDS.length - 1) * 10 + i * 20, cy + cardH / 2 - 30, 6, 0, Math.PI * 2);
                    ctx.fillStyle = i === tutorialStep ? '#00ffcc' : 'rgba(255,255,255,0.18)';
                    ctx.fill();
                }

                // Tap prompt
                let pA = (Math.sin(Date.now() / 400) + 1) / 2;
                ctx.globalAlpha = 0.4 + pA * 0.5;
                ctx.font = '16px var(--font-mono)';
                ctx.fillStyle = '#e0e0e5';
                ctx.fillText(tutorialStep < TUTORIAL_CARDS.length - 1 ? 'TAP TO CONTINUE' : 'TAP TO BEGIN', cx, height - 40);
                ctx.globalAlpha = 1;
            }

            // --- PAUSE MENU ---
            if (state === 'PAUSED') {
                ctx.fillStyle = 'rgba(5, 5, 7, 0.88)'; ctx.fillRect(0, 0, width, height);

                ctx.textAlign = 'center';
                ctx.font = 'bold 36px var(--font-mono)';
                ctx.fillStyle = '#00ffcc';
                ctx.shadowBlur = 10; ctx.shadowColor = '#00ffcc';
                ctx.fillText('PAUSED', width / 2, height / 2 - 120);
                ctx.shadowBlur = 0;

                let btnW = 240, btnH = 50;
                let bx = width / 2 - btnW / 2;
                let btns = [
                    { label: 'RESUME', y: height / 2 - 60, color: '#00ffcc' },
                    { label: 'HOW TO PLAY', y: height / 2, color: '#0088ff' },
                    { label: 'QUIT TO MENU', y: height / 2 + 60, color: '#ff5577' },
                ];
                btns.forEach(b => {
                    ctx.strokeStyle = b.color; ctx.lineWidth = 1.5;
                    ctx.strokeRect(bx, b.y, btnW, btnH);
                    ctx.fillStyle = 'rgba(15,20,30,0.8)';
                    ctx.fillRect(bx, b.y, btnW, btnH);
                    ctx.font = 'bold 16px var(--font-mono)';
                    ctx.fillStyle = b.color;
                    ctx.fillText(b.label, width / 2, b.y + 32);
                });
            }
        }

        function drawMathOverlay(pt, colorBase) {
            let n = pt.normal; let v = pt.vIn; let vLen = Math.hypot(v.x, v.y);
            let inDir = { x: v.x / vLen, y: v.y / vLen };

            ctx.strokeStyle = 'rgba(255,255,255,0.5)'; ctx.lineWidth = 1; ctx.setLineDash([2, 4]);
            ctx.beginPath(); ctx.moveTo(pt.x, pt.y); ctx.lineTo(pt.x + n.x * 35, pt.y + n.y * 35); ctx.stroke();
            ctx.setLineDash([]);

            let dot = -(inDir.x * n.x + inDir.y * n.y);
            let angleRad = Math.acos(Math.max(-1, Math.min(1, dot)));
            let deg = (angleRad * (180 / Math.PI)).toFixed(1);

            ctx.fillStyle = `rgb(${colorBase})`;
            ctx.font = '14px var(--font-mono)';
            ctx.fillText(`${deg}°`, pt.x + n.x * 40, pt.y + n.y * 40 + 3);
        }

        window.addEventListener('resize', () => {
            width = window.innerWidth; height = window.innerHeight;
            canvas.width = width; canvas.height = height;
            if (state !== 'TITLE_SCREEN' && state !== 'TUTORIAL') loadLevel();
        });

        // Don't auto-load level — start at title screen
        requestAnimationFrame(render);
    </script>
</body>
