<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#000000">
<title>FIFA WORLD CUP 2026 — CARD EXPERIENCE</title>
<style>
/* ============================================================
   DOCTRINE
   - Reality layer = live camera passthrough (or synthetic stadium fallback).
   - Overlay layer = spatial panels, parallaxed by device orientation.
   - Chrome layer = pure #FFF / #000, IBM Plex Mono, zero radius,
     gradients (never blur), vector glyphs, one primary control.
   - LAUNCH is already solved by the card's NFC tap / QR scan.
     This page is the launched scene. No image target. No tracking.
   ============================================================ */
:root{ --w:#fff; --k:#000; }
*{ margin:0; padding:0; box-sizing:border-box; border-radius:0 !important; -webkit-tap-highlight-color:transparent; }
html,body{ height:100%; width:100%; overflow:hidden; background:#000; }
body{
  font-family:"IBM Plex Mono", ui-monospace, "SFMono-Regular", Menlo, Consolas, monospace;
  color:var(--w);
  position:fixed; inset:0;
  -webkit-user-select:none; user-select:none;
}
button{ font:inherit; color:inherit; background:none; border:none; cursor:pointer; }

/* ---------- REALITY LAYER ---------- */
#reality{ position:absolute; inset:0; z-index:0; overflow:hidden; background:#000; }
#cam{ position:absolute; inset:0; width:100%; height:100%; object-fit:cover; display:none; }
#stadium{ position:absolute; inset:0; display:block; }
.s-sky{ position:absolute; inset:0; background:linear-gradient(180deg,#0a0c0f 0%,#15191e 40%,#1c2127 60%,#0d0f12 100%); }
.s-roof{ position:absolute; top:0; left:0; right:0; height:34%;
  background:repeating-linear-gradient(90deg,#05060880,#05060880 3px,#1a1f2640 3px,#1a1f2640 26px);
  -webkit-mask:linear-gradient(180deg,#000 60%,transparent 100%); mask:linear-gradient(180deg,#000 60%,transparent 100%); }
.s-crowd{ position:absolute; top:24%; left:0; right:0; height:34%;
  background:radial-gradient(circle at 1px 1px,#3a3f48 0.7px,transparent 1.4px); background-size:6px 6px; opacity:.5;
  -webkit-mask:linear-gradient(180deg,transparent,#000 30%,#000 70%,transparent); mask:linear-gradient(180deg,transparent,#000 30%,#000 70%,transparent); }
.s-pitch{ position:absolute; left:-10%; right:-10%; bottom:-6%; height:54%;
  background:repeating-linear-gradient(90deg,#16331c,#16331c 7%,#1c3d22 7%,#1c3d22 14%);
  clip-path:polygon(22% 0,78% 0,100% 100%,0 100%); }
.s-line{ position:absolute; left:31%; right:31%; bottom:30%; height:2px; background:#2f5a36; opacity:.7;
  transform:perspective(300px) rotateX(58deg); }

/* ---------- OVERLAY LAYER (parallaxed) ---------- */
#scene{ position:absolute; inset:0; z-index:1; pointer-events:none; }
#scene > *{ position:absolute; will-change:transform; }

/* halo scoreboard ribbon */
.ribbon{ top:12%; left:50%; width:min(78vw,360px); transform:translateX(-50%);
  background:#000; border:1px solid var(--w); pointer-events:auto; }
.ribbon .rib-top{ display:flex; justify-content:space-between; align-items:center;
  font-size:9px; letter-spacing:.18em; padding:5px 8px; border-bottom:1px solid #ffffff33; opacity:.85; }
.rib-live{ display:flex; align-items:center; gap:5px; }
.rib-dot{ width:6px; height:6px; background:var(--w); }
.ribbon .rib-body{ display:grid; grid-template-columns:1fr auto 1fr; align-items:center; padding:9px 8px; }
.rib-team{ display:flex; align-items:center; gap:7px; font-size:13px; letter-spacing:.1em; }
.rib-team.away{ flex-direction:row-reverse; }
.rib-flag{ width:20px; height:14px; border:1px solid #ffffff55; flex:none; }
.rib-score{ font-size:22px; letter-spacing:.06em; padding:0 12px; white-space:nowrap; font-variant-numeric:tabular-nums; }

/* broadcast portal */
.broadcast{ top:38%; left:50%; width:min(62vw,260px); transform:translate(-50%,-30%);
  background:#000; border:1px solid var(--w); pointer-events:auto; }
.bc-bar{ display:flex; justify-content:space-between; align-items:center;
  font-size:9px; letter-spacing:.2em; padding:5px 8px; border-bottom:1px solid #ffffff33; }
.bc-stage{ position:relative; aspect-ratio:3/4; background:#000; overflow:hidden; }
#bvid{ position:absolute; inset:0; width:100%; height:100%; object-fit:cover; display:none; }
.bc-synth{ position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:14px; }
.bc-mark{ text-align:center; line-height:1.25; }
.bc-mark b{ display:block; font-size:11px; letter-spacing:.06em; }
.bc-mark span{ display:block; font-size:8px; letter-spacing:.32em; opacity:.7; margin-top:5px; }
.bc-wave{ display:flex; align-items:flex-end; gap:3px; height:30px; }
.bc-wave i{ width:3px; height:4px; background:var(--w); display:block; }
.bc-foot{ font-size:8px; letter-spacing:.22em; text-align:center; padding:6px 8px; border-top:1px solid #ffffff33; opacity:.75; }

/* foreground card (monochrome reinterpretation, anchored at base) */
.card{ bottom:11%; left:6%; width:min(34vw,150px); transform-origin:bottom left;
  transform:rotate(-7deg); }
.card-face{ aspect-ratio:5/7; background:#000; border:1px solid var(--w); padding:14px 10px 10px;
  display:flex; flex-direction:column; align-items:center; justify-content:space-between; }
.card-face .trophy{ width:38%; }
.card-face .ttl{ text-align:center; line-height:1.3; }
.card-face .ttl b{ display:block; font-size:10px; letter-spacing:.12em; }
.card-face .ttl em{ display:block; font-size:18px; letter-spacing:.08em; font-style:normal; margin-top:2px; }

/* bound state for bidirectional manifest link */
.bind{ outline:2px solid var(--w); outline-offset:3px; }

/* ---------- CHROME LAYER ---------- */
#scrim-top{ position:absolute; top:0; left:0; right:0; height:120px; z-index:2; pointer-events:none;
  background:linear-gradient(180deg,#000 0%,#0009 45%,transparent 100%); }
#scrim-bot{ position:absolute; bottom:0; left:0; right:0; height:200px; z-index:2; pointer-events:none;
  background:linear-gradient(0deg,#000 0%,#000a 45%,transparent 100%); }

#status{ position:absolute; top:14px; left:14px; z-index:4;
  display:flex; align-items:center; gap:7px; font-size:10px; letter-spacing:.2em;
  border:1px solid var(--w); padding:5px 9px; background:#000; }
#status .pip{ width:7px; height:7px; background:var(--w); }
#status.searching .pip{ animation:blink 1s steps(1) infinite; }
@keyframes blink{ 50%{ opacity:.15; } }

#xr{ position:absolute; top:14px; right:14px; z-index:4; display:none;
  font-size:10px; letter-spacing:.2em; border:1px solid var(--w); padding:6px 11px; background:#000; }
#xr:active{ background:var(--w); color:var(--k); }

#caption{ position:absolute; left:50%; bottom:150px; transform:translateX(-50%); z-index:4;
  max-width:84vw; text-align:center; font-size:15px; line-height:1.35; letter-spacing:.02em;
  padding:8px 14px; background:#000; border:1px solid var(--w); opacity:0; transition:opacity .25s; }
#caption.show{ opacity:1; }

/* transport */
#transport{ position:absolute; left:0; right:0; bottom:0; z-index:5;
  display:flex; align-items:center; gap:12px; padding:16px 16px calc(16px + env(safe-area-inset-bottom));
}
#transport.hidden{ display:none; }
.t-btn{ width:38px; height:38px; flex:none; border:1px solid var(--w); background:#000;
  display:flex; align-items:center; justify-content:center; }
.t-btn:active{ background:var(--w); }
.t-btn:active svg{ fill:var(--k); stroke:var(--k); }
.t-btn svg{ width:15px; height:15px; fill:var(--w); stroke:var(--w); }
#track{ position:relative; flex:1; height:38px; display:flex; align-items:center; }
#track .rail{ position:absolute; left:0; right:0; height:2px; background:#ffffff44; }
#track .fill{ position:absolute; left:0; height:2px; background:var(--w); width:0%; }
#track .thumb{ position:absolute; width:13px; height:13px; background:var(--w); transform:translateX(-50%); left:0%; }
#time{ font-size:12px; letter-spacing:.06em; font-variant-numeric:tabular-nums; min-width:54px; text-align:right; }

/* layers manifest (bidirectional binding) */
#manifest{ position:absolute; left:14px; bottom:84px; z-index:4; }
#layers-btn{ font-size:10px; letter-spacing:.2em; border:1px solid var(--w); padding:5px 9px; background:#000; }
#layers-btn:active{ background:var(--w); color:var(--k); }
#layers-list{ display:none; margin-top:6px; border:1px solid var(--w); background:#000; }
#layers-list.open{ display:block; }
#layers-list li{ list-style:none; font-size:10px; letter-spacing:.14em; padding:7px 10px; border-bottom:1px solid #ffffff22; }
#layers-list li:last-child{ border-bottom:none; }
#layers-list li.active{ background:var(--w); color:var(--k); }

/* ---------- PRE-ROLL GATE ---------- */
#preroll{ position:absolute; inset:0; z-index:20; background:#000;
  display:flex; flex-direction:column; align-items:center; justify-content:center; gap:30px;
  text-align:center; padding:32px; }
#preroll.gone{ display:none; }
#preroll .pcard{ width:min(54vw,210px); animation:rise .8s ease-out both; }
@keyframes rise{ from{ transform:translateY(18px); opacity:0; } to{ transform:translateY(0); opacity:1; } }
#preroll .pttl{ line-height:1.4; }
#preroll .pttl b{ display:block; font-size:12px; letter-spacing:.28em; opacity:.7; }
#preroll .pttl h1{ font-size:22px; letter-spacing:.1em; margin-top:8px; font-weight:600; }
#preroll .powner{ font-size:11px; letter-spacing:.18em; opacity:.55; }
#enter{ border:1px solid var(--w); background:#000; padding:15px 30px;
  font-size:13px; letter-spacing:.22em; }
#enter:active{ background:var(--w); color:var(--k); }
#hint{ position:absolute; bottom:calc(26px + env(safe-area-inset-bottom)); font-size:9px; letter-spacing:.18em; opacity:.4; max-width:80vw; }

@media (prefers-reduced-motion: reduce){ *{ animation:none !important; } }
</style>
</head>
<body>

<!-- REALITY -->
<div id="reality">
  <video id="cam" playsinline muted autoplay></video>
  <div id="stadium">
    <div class="s-sky"></div><div class="s-roof"></div>
    <div class="s-crowd"></div><div class="s-pitch"></div><div class="s-line"></div>
  </div>
</div>

<!-- OVERLAY -->
<div id="scene">
  <!-- scoreboard -->
  <div class="ribbon" id="lyr-score" data-depth="6">
    <div class="rib-top">
      <span class="rib-live"><i class="rib-dot"></i>LIVE</span>
      <span id="rib-venue">ATLANTA · GROUP STAGE</span>
    </div>
    <div class="rib-body">
      <span class="rib-team home"><svg class="rib-flag" id="flag-h" viewBox="0 0 20 14"></svg><span id="code-h">CZE</span></span>
      <span class="rib-score"><b id="sh">1</b> — <b id="sa">0</b></span>
      <span class="rib-team away"><svg class="rib-flag" id="flag-a" viewBox="0 0 20 14"></svg><span id="code-a">RSA</span></span>
    </div>
  </div>

  <!-- broadcast portal -->
  <div class="broadcast" id="lyr-broadcast" data-depth="14">
    <div class="bc-bar"><span id="bc-tag">FIFA · BROADCAST</span><span>26'</span></div>
    <div class="bc-stage">
      <video id="bvid" playsinline></video>
      <div class="bc-synth" id="bc-synth">
        <div class="bc-mark"><b>FIFA WORLD CUP</b><span>2026</span></div>
        <div class="bc-wave" id="wave"></div>
      </div>
    </div>
    <div class="bc-foot">PRESIDENT · ADDRESS</div>
  </div>

  <!-- foreground card -->
  <div class="card" id="lyr-card" data-depth="26">
    <div class="card-face">
      <svg class="trophy" viewBox="0 0 40 64" fill="#fff">
        <path d="M11 4h18v3c0 8-3 13-7 15v8h5l-2 10h2v4H13v-4h2l-2-10h5v-8c-4-2-7-7-7-15V4z"/>
        <rect x="9" y="50" width="22" height="3"/><rect x="7" y="55" width="26" height="5"/>
      </svg>
      <div class="ttl"><b>FIFA WORLD CUP</b><em>2026</em></div>
    </div>
  </div>
</div>

<!-- CHROME -->
<div id="scrim-top"></div>
<div id="scrim-bot"></div>

<div id="status" class="searching"><i class="pip"></i><span id="status-txt">SEARCHING</span></div>
<button id="xr">ENTER AR</button>

<div id="caption"></div>

<div id="manifest">
  <button id="layers-btn">LAYERS</button>
  <ul id="layers-list">
    <li data-target="lyr-broadcast">BROADCAST</li>
    <li data-target="lyr-score">SCOREBOARD</li>
    <li data-target="lyr-card">CARD</li>
  </ul>
</div>

<div id="transport" class="hidden">
  <button class="t-btn" id="play"></button>
  <div id="track"><div class="rail"></div><div class="fill"></div><div class="thumb"></div></div>
  <span id="time">-0:00</span>
  <button class="t-btn" id="mute"></button>
</div>

<!-- PRE-ROLL -->
<div id="preroll">
  <div class="pcard">
    <div class="card-face">
      <svg class="trophy" viewBox="0 0 40 64" fill="#fff" style="width:34%">
        <path d="M11 4h18v3c0 8-3 13-7 15v8h5l-2 10h2v4H13v-4h2l-2-10h5v-8c-4-2-7-7-7-15V4z"/>
        <rect x="9" y="50" width="22" height="3"/><rect x="7" y="55" width="26" height="5"/>
      </svg>
      <div class="ttl"><b>FIFA WORLD CUP</b><em>2026</em></div>
    </div>
  </div>
  <div class="pttl"><b id="p-edition">COLLECTOR CARD</b><h1>STEP INTO THE STADIUM</h1></div>
  <div class="powner" id="p-owner"></div>
  <button id="enter">CONTINUE TO EXPERIENCE</button>
  <div id="hint">TAP TO ENABLE CAMERA, MOTION &amp; SOUND</div>
</div>

<!-- =====================  ICONS  ===================== -->
<svg style="display:none">
  <symbol id="i-play" viewBox="0 0 24 24"><path d="M7 4l13 8-13 8z" stroke="none"/></symbol>
  <symbol id="i-pause" viewBox="0 0 24 24"><rect x="6" y="4" width="4" height="16" stroke="none"/><rect x="14" y="4" width="4" height="16" stroke="none"/></symbol>
  <symbol id="i-vol" viewBox="0 0 24 24"><path d="M4 9h4l5-4v14l-5-4H4z" stroke="none"/><path d="M16 8a5 5 0 0 1 0 8" fill="none" stroke-width="2"/></symbol>
  <symbol id="i-mute" viewBox="0 0 24 24"><path d="M4 9h4l5-4v14l-5-4H4z" stroke="none"/><line x1="16" y1="9" x2="22" y2="15" stroke-width="2"/><line x1="22" y1="9" x2="16" y2="15" stroke-width="2"/></symbol>
</svg>

<script>
"use strict";
const $=s=>document.querySelector(s), $$=s=>document.querySelectorAll(s);

/* ---------- CONFIG : driven by the token the NFC/QR encodes ----------
   Card opens e.g.  https://you.app/?t=<base64-json>
   or plain params  ?home=CZE&away=RSA&hs=1&as=0&venue=ATLANTA&video=<url>&owner=NAME&edition=...
-------------------------------------------------------------------- */
function parseConfig(){
  const p=new URLSearchParams(location.search);
  let c={ home:"CZE", away:"RSA", hs:"1", as:"0", venue:"ATLANTA · GROUP STAGE",
          flagH:"cz", flagA:"za", video:"", owner:"", edition:"COLLECTOR CARD",
          duration:78,
          captions:[
            [0.5,4.5,"Welcome to the FIFA World Cup 2026."],
            [4.5,9.5,"Forty-eight nations. Three host countries."],
            [9.5,14,"One hundred and four matches."],
            [14,19,"Canada. Mexico. The United States."],
            [19,24,"One trophy. One summer. One world."],
            [24,30,"This is your card. This is your seat."],
          ] };
  const t=p.get("t");
  if(t){ try{ Object.assign(c, JSON.parse(decodeURIComponent(escape(atob(t.replace(/-/g,"+").replace(/_/g,"/")))))); }catch(e){} }
  for(const k of ["home","away","venue","video","owner","edition"]) if(p.get(k)!=null) c[k]=p.get(k);
  if(p.get("hs")!=null) c.hs=p.get("hs"); if(p.get("as")!=null) c.as=p.get("as");
  if(p.get("flagH")) c.flagH=p.get("flagH"); if(p.get("flagA")) c.flagA=p.get("flagA");
  return c;
}
const CFG=parseConfig();

/* simplified vector flags (drawn, never emoji) */
const FLAGS={
  cz:'<rect width="20" height="7" fill="#fff"/><rect y="7" width="20" height="7" fill="#d7141a"/><path d="M0 0L9 7L0 14Z" fill="#11457e"/>',
  za:'<rect width="20" height="14" fill="#fff"/><rect width="20" height="4.6" fill="#de3831"/><rect y="9.4" width="20" height="4.6" fill="#002395"/><path d="M0 0L7 7L0 14Z" fill="#007a4d"/><path d="M0 2L5 7L0 12Z" fill="#000"/>',
  generic:'<rect width="20" height="14" fill="#222"/><rect x="1" y="1" width="18" height="12" fill="none" stroke="#fff" stroke-width="0.6"/>'
};
function applyConfig(){
  $("#code-h").textContent=CFG.home; $("#code-a").textContent=CFG.away;
  $("#sh").textContent=CFG.hs; $("#sa").textContent=CFG.as;
  $("#rib-venue").textContent=CFG.venue;
  $("#flag-h").innerHTML=FLAGS[CFG.flagH]||FLAGS.generic;
  $("#flag-a").innerHTML=FLAGS[CFG.flagA]||FLAGS.generic;
  $("#p-edition").textContent=CFG.edition;
  if(CFG.owner){ $("#p-owner").textContent="ISSUED TO · "+CFG.owner; }
}
applyConfig();

/* build waveform + icons */
const WAVE=$("#wave"); for(let i=0;i<16;i++){ WAVE.appendChild(document.createElement("i")); }
function ico(sym){ return '<svg><use href="#'+sym+'"/></svg>'; }
$("#play").innerHTML=ico("i-play"); $("#mute").innerHTML=ico("i-mute");

/* ---------- STATE ---------- */
let started=false, playing=false, muted=true;
let elapsed=0, last=0;
const hasVideo=!!CFG.video;
const duration=()=> hasVideo ? (isFinite(BVID.duration)&&BVID.duration>0?BVID.duration:CFG.duration) : CFG.duration;
const BVID=$("#bvid");

/* ---------- PARALLAX ---------- */
let px=0, py=0, tx=0, ty=0;
function setTarget(nx,ny){ tx=Math.max(-1,Math.min(1,nx)); ty=Math.max(-1,Math.min(1,ny)); }
window.addEventListener("deviceorientation",e=>{
  if(e.gamma==null) return;
  setTarget(e.gamma/40, (e.beta-50)/40);
},true);
window.addEventListener("mousemove",e=>{ setTarget(e.clientX/innerWidth*2-1, e.clientY/innerHeight*2-1); });
function parallaxFrame(){
  px+=(tx-px)*0.08; py+=(ty-py)*0.08;
  $$("#scene > *").forEach(el=>{
    const d=+el.dataset.depth||0, base=el.dataset.base||"";
    el.style.transform=`translate(${(-px*d).toFixed(1)}px,${(-py*d*0.6).toFixed(1)}px) ${base}`;
  });
  $("#stadium").style.transform=`translate(${(-px*4).toFixed(1)}px,${(-py*2).toFixed(1)}px) scale(1.08)`;
}
/* preserve per-element base transforms */
$("#lyr-score").dataset.base="translateX(-50%)";
$("#lyr-broadcast").dataset.base="translate(-50%,-30%)";
$("#lyr-card").dataset.base="rotate(-7deg)";

/* ---------- PERMISSIONS + START ---------- */
async function reqOrientation(){
  try{
    const D=window.DeviceOrientationEvent;
    if(D && typeof D.requestPermission==="function"){ await D.requestPermission(); }
  }catch(e){}
}
async function startCamera(){
  try{
    const stream=await navigator.mediaDevices.getUserMedia({ video:{ facingMode:{ ideal:"environment" } }, audio:false });
    const cam=$("#cam"); cam.srcObject=stream; await cam.play();
    cam.style.display="block"; $("#stadium").style.display="none";
    setStatus(false,"LIVE");
  }catch(e){ setStatus(false,"STADIUM"); }
}
function startBroadcast(){
  if(hasVideo){
    BVID.src=CFG.video; BVID.muted=muted; BVID.style.display="block"; $("#bc-synth").style.display="none";
    BVID.addEventListener("timeupdate",()=>{ elapsed=BVID.currentTime; });
    BVID.play().catch(()=>{});
  }
}
function setStatus(searching,txt){
  $("#status").classList.toggle("searching",searching); $("#status-txt").textContent=txt;
}
async function begin(){
  if(started) return; started=true;
  $("#preroll").classList.add("gone");
  $("#transport").classList.remove("hidden");
  await reqOrientation();
  await startCamera();
  startBroadcast();
  muted=false; setMuted();      // first gesture lets us unmute
  play();
}
$("#enter").addEventListener("click",begin);

/* ---------- TRANSPORT ---------- */
function play(){ playing=true; $("#play").innerHTML=ico("i-pause"); if(hasVideo) BVID.play().catch(()=>{}); }
function pause(){ playing=false; $("#play").innerHTML=ico("i-play"); if(hasVideo) BVID.pause(); }
$("#play").addEventListener("click",()=>{ playing?pause():play(); });
function setMuted(){
  $("#mute").innerHTML=ico(muted?"i-mute":"i-vol");
  if(hasVideo) BVID.muted=muted;
  $("#bc-tag").textContent=muted?"FIFA · MUTED":"FIFA · BROADCAST";
}
$("#mute").addEventListener("click",()=>{ muted=!muted; setMuted(); });

const TRACK=$("#track");
function seekFromX(clientX){
  const r=TRACK.getBoundingClientRect();
  const ratio=Math.max(0,Math.min(1,(clientX-r.left)/r.width));
  elapsed=ratio*duration(); if(hasVideo) BVID.currentTime=elapsed;
}
let scrubbing=false;
TRACK.addEventListener("pointerdown",e=>{ scrubbing=true; TRACK.setPointerCapture(e.pointerId); seekFromX(e.clientX); });
TRACK.addEventListener("pointermove",e=>{ if(scrubbing) seekFromX(e.clientX); });
TRACK.addEventListener("pointerup",()=>{ scrubbing=false; });

function fmt(s){ s=Math.max(0,s); const m=Math.floor(s/60), ss=Math.floor(s%60); return "-"+m+":"+String(ss).padStart(2,"0"); }

/* ---------- CAPTIONS ---------- */
const CAP=$("#caption");
function updateCaption(t){
  let line=null;
  for(const c of CFG.captions){ if(t>=c[0] && t<c[1]){ line=c[2]; break; } }
  if(line){ CAP.textContent=line; CAP.classList.add("show"); }
  else CAP.classList.remove("show");
}

/* ---------- MAIN LOOP ---------- */
function frame(ts){
  const dt=last?(ts-last)/1000:0; last=ts;
  if(started && playing){
    if(hasVideo){ elapsed=BVID.currentTime; if(BVID.ended) pause(); }
    else { elapsed=Math.min(duration(), elapsed+dt); if(elapsed>=duration()) pause(); }
  }
  // transport readout (countdown = remaining)
  const d=duration(), rem=d-elapsed, ratio=d?elapsed/d:0;
  $("#time").textContent=fmt(rem);
  $("#track .fill").style.width=(ratio*100)+"%";
  $("#track .thumb").style.left=(ratio*100)+"%";
  updateCaption(elapsed);
  // waveform
  const bars=WAVE.children;
  for(let i=0;i<bars.length;i++){
    const h=(started&&playing&&!muted)? 4+Math.abs(Math.sin(ts/180+i*0.7))*24*Math.random()+ (i%3?4:0) : 4;
    bars[i].style.height=h.toFixed(0)+"px";
  }
  parallaxFrame();
  requestAnimationFrame(frame);
}
requestAnimationFrame(frame);

/* ---------- BIDIRECTIONAL MANIFEST LINK ---------- */
$("#layers-btn").addEventListener("click",()=>$("#layers-list").classList.toggle("open"));
function clearBind(){ $$(".bind").forEach(e=>e.classList.remove("bind")); $$("#layers-list li").forEach(e=>e.classList.remove("active")); }
$$("#layers-list li").forEach(li=>{
  li.addEventListener("click",()=>{
    const t=document.getElementById(li.dataset.target), was=li.classList.contains("active");
    clearBind(); if(!was){ li.classList.add("active"); t.classList.add("bind"); }
  });
});
["lyr-broadcast","lyr-score","lyr-card"].forEach(id=>{
  document.getElementById(id).addEventListener("click",()=>{
    const li=$(`#layers-list li[data-target="${id}"]`), el=document.getElementById(id), was=el.classList.contains("bind");
    clearBind(); if(!was){ el.classList.add("bind"); li.classList.add("active"); $("#layers-list").classList.add("open"); }
  });
});

/* ---------- OPTIONAL: TRUE WEBXR (Android immersive-ar, dom-overlay) ---------- */
let xrSession=null, xrGL=null;
if(navigator.xr && navigator.xr.isSessionSupported){
  navigator.xr.isSessionSupported("immersive-ar").then(ok=>{ if(ok) $("#xr").style.display="block"; }).catch(()=>{});
}
$("#xr").addEventListener("click",async()=>{
  if(xrSession){ xrSession.end(); return; }
  try{
    const canvas=document.createElement("canvas");
    xrGL=canvas.getContext("webgl",{xrCompatible:true,alpha:true});
    xrSession=await navigator.xr.requestSession("immersive-ar",{
      optionalFeatures:["dom-overlay","local-floor"], domOverlay:{ root:document.body }
    });
    xrSession.updateRenderState({ baseLayer:new XRWebGLLayer(xrSession,xrGL) });
    const ref=await xrSession.requestReferenceSpace("local");
    $("#cam").style.display="none"; $("#stadium").style.display="none";
    if(!started) begin();
    $("#xr").textContent="EXIT AR"; setStatus(false,"AR · LIVE");
    const onXR=(t,fr)=>{ if(!xrSession) return;
      const gl=xrGL; gl.bindFramebuffer(gl.FRAMEBUFFER, xrSession.renderState.baseLayer.framebuffer);
      gl.clearColor(0,0,0,0); gl.clear(gl.COLOR_BUFFER_BIT); xrSession.requestAnimationFrame(onXR); };
    xrSession.requestAnimationFrame(onXR);
    xrSession.addEventListener("end",()=>{ xrSession=null; $("#xr").textContent="ENTER AR";
      $("#cam").srcObject?($("#cam").style.display="block"):($("#stadium").style.display="block"); });
  }catch(e){ xrSession=null; $("#xr").style.display="none"; }
});

/* prevent gesture scroll/zoom */
document.addEventListener("gesturestart",e=>e.preventDefault());
document.addEventListener("touchmove",e=>{ if(e.touches.length>1) e.preventDefault(); },{passive:false});
</script>
