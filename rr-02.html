<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="theme-color" content="#000000">
<title>RICOCHET RIGS</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;-webkit-user-select:none;user-select:none}
html,body{height:100%;width:100%;overflow:hidden;background:#000;touch-action:none;overscroll-behavior:none}
body{font-family:"IBM Plex Mono",ui-monospace,Menlo,Consolas,monospace;color:#fff;position:fixed;inset:0}
#gl{position:absolute;inset:0;display:block;z-index:1}

/* ---- top HUD : score + clock, pure monospace, no chrome ---- */
#score{position:absolute;top:max(14px,env(safe-area-inset-top));left:50%;transform:translateX(-50%);z-index:5;display:flex;align-items:center;gap:14px;font-size:30px;letter-spacing:.04em;font-variant-numeric:tabular-nums;pointer-events:none}
#score .sq{width:11px;height:11px;display:inline-block}#score .s{min-width:32px;text-align:center}
#score .sep{opacity:.3;font-size:22px}
#clock{position:absolute;top:calc(max(14px,env(safe-area-inset-top)) + 42px);left:50%;transform:translateX(-50%);z-index:5;font-size:14px;letter-spacing:.32em;font-variant-numeric:tabular-nums;opacity:.9;pointer-events:none}
#clock.sd{color:#ff2e2e}

#menu{position:absolute;top:max(14px,env(safe-area-inset-top));left:14px;z-index:6;border:1px solid #fff;background:#000;color:#fff;font:inherit;font-size:10px;letter-spacing:.2em;padding:7px 12px}
#menu:active{background:#fff;color:#000}
#pausebtn{position:absolute;top:max(14px,env(safe-area-inset-top));right:14px;z-index:6;border:1px solid #fff;background:#000;width:38px;height:30px;display:flex;align-items:center;justify-content:center;gap:5px}
#pausebtn i{width:4px;height:13px;background:#fff;display:block}
#pausebtn:active{background:#fff}#pausebtn:active i{background:#000}

/* ---- part queue readout : the FIFO buffer made visible ---- */
#parts{position:absolute;top:calc(max(14px,env(safe-area-inset-top)) + 4px);right:14px;z-index:6;display:flex;flex-direction:column;align-items:flex-end;gap:5px;pointer-events:none}
#parts.shifted{top:calc(max(14px,env(safe-area-inset-top)) + 40px)}
#partcount{font-size:10px;letter-spacing:.18em;opacity:.6}
#partbar{display:flex;gap:2px}
#partbar i{width:5px;height:9px;background:#fff;opacity:.16}
#partbar i.on{opacity:.9}
#partbar i.old{opacity:.9;background:#ff2e2e}

/* ---- drive pad (left) : steering, twin to STRIKER ---- */
#drivezone{position:absolute;left:0;bottom:0;width:62%;height:74%;z-index:7;touch-action:none}
#driveBase{position:absolute;width:152px;height:152px;border-radius:50%;transform:translate(-50%,-50%);pointer-events:none;z-index:7;opacity:.9;background:conic-gradient(#fff calc(var(--t,0)*1turn), #ffffff1c 0)}
#driveBase::after{content:"";position:absolute;inset:7px;border-radius:50%;background:#000;border:1px solid #ffffff44}
#driveLbl{position:absolute;transform:translate(-50%,-50%);z-index:7;pointer-events:none;font-size:9px;letter-spacing:.3em;opacity:.4}
#driveKnob{position:absolute;width:60px;height:60px;border-radius:50%;border:1px solid #fff;background:#ffffff22;transform:translate(-50%,-50%);pointer-events:none;z-index:8}

/* ---- right cluster : build verbs + boost ---- */
#rig{position:absolute;right:max(16px,env(safe-area-inset-right));bottom:max(22px,env(safe-area-inset-bottom));z-index:8;display:flex;align-items:flex-end;gap:12px}
#buildcol{display:flex;flex-direction:column;gap:11px}
.bbtn{width:74px;height:52px;border:1px solid #fff;background:#000;color:#fff;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;position:relative}
.bbtn .gly{width:24px;height:16px;position:relative}
.bbtn .lab{font-size:8px;letter-spacing:.16em}
.bbtn .cost{font-size:7px;letter-spacing:.1em;opacity:.5}
.bbtn:active,.bbtn.on{background:#fff;color:#000}
.bbtn.cant{opacity:.3}
/* bumper glyph : ring */
#bumpGly{border:2px solid currentColor;border-radius:50%;width:16px;height:16px;margin:0 auto}
/* wall glyph : bar */
#wallGly{width:22px;height:7px;border:2px solid currentColor;margin:5px auto 0}
/* ramp glyph : right-triangle wedge */
#rampGly{width:0;height:0;border-style:solid;border-width:0 0 14px 22px;border-color:transparent transparent currentColor transparent;margin:2px auto 0}
#boostbtn{position:relative;width:108px;height:108px;border:none;border-radius:50%;background:conic-gradient(#fff calc(var(--f,1)*1turn),#ffffff1c 0);display:flex;align-items:center;justify-content:center;font-size:12px;letter-spacing:.2em;color:#fff}
#boostbtn::before{content:"";position:absolute;inset:5px;border-radius:50%;background:#000;border:1px solid #ffffff44;z-index:0}
#boostbtn>span{position:relative;z-index:1}
#boostbtn:active::before,#boostbtn.on::before{background:#fff}
#boostbtn:active>span,#boostbtn.on>span{color:#000}

/* ===================== FORGE (pre-match arena editor) ===================== */
#forgeUI{position:absolute;inset:0;z-index:9;pointer-events:none;display:none}
#forgeUI.on{display:block}
/* top bar : title + part count + done */
#forgebar{position:absolute;top:max(12px,env(safe-area-inset-top));left:50%;transform:translateX(-50%);z-index:11;display:flex;align-items:center;gap:12px;pointer-events:auto}
#forgebar .ft{font-size:12px;letter-spacing:.36em;font-weight:700}
#forgebar .fc{font-size:10px;letter-spacing:.18em;opacity:.6;font-variant-numeric:tabular-nums}
/* tool rail (right) — move/rotate/scale + snap, SOLIDBENCH grammar */
#forgeRail{position:absolute;right:12px;top:50%;transform:translateY(-50%);z-index:11;display:flex;flex-direction:column;gap:7px;pointer-events:auto}
.frtool{width:46px;height:46px;border:1px solid #fff;background:#000;color:#fff;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px}
.frtool .ti{width:20px;height:20px;display:block;position:relative}
.frtool .tl{font-size:6px;letter-spacing:.1em;opacity:.7}
.frtool.sel{background:#fff;color:#000}
.frtool.sel .tl{opacity:1}
.frdiv{height:1px;background:#ffffff33;margin:1px 0}
/* part palette (left) — what Add drops */
#forgePalette{position:absolute;left:12px;top:50%;transform:translateY(-50%);z-index:11;display:flex;flex-direction:column;gap:7px;pointer-events:auto}
.fpitem{width:54px;height:54px;border:1px solid #fff;background:#000;color:#fff;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px}
.fpitem .pl{font-size:7px;letter-spacing:.08em}
.fpitem.sel{background:#fff;color:#000}
/* contextual quick-actions ring (top center, appears on select) */
#forgeQuick{position:absolute;top:calc(max(12px,env(safe-area-inset-top)) + 42px);left:50%;transform:translateX(-50%) translateY(-10px);z-index:11;display:flex;align-items:center;gap:6px;background:#000;border:1px solid #fff;padding:6px;pointer-events:auto;opacity:0;transition:opacity .2s,transform .2s}
#forgeQuick.on{opacity:1;transform:translateX(-50%) translateY(0)}
.fqbtn{width:42px;height:42px;border:1px solid #ffffff44;background:#000;color:#fff;display:flex;align-items:center;justify-content:center}
.fqbtn:active{background:#fff;color:#000}
.fqbtn.warn:active{background:#ff2e2e;border-color:#ff2e2e;color:#fff}
.fqsep{width:1px;height:24px;background:#ffffff33}
/* bottom bar : add / clear / kickoff */
#forgeBottom{position:absolute;left:0;right:0;bottom:max(16px,env(safe-area-inset-bottom));z-index:11;display:flex;align-items:center;justify-content:center;gap:10px;padding:0 14px;pointer-events:none}
#forgeBottom>*{pointer-events:auto}
#forgeAdd{flex:1;max-width:140px;height:54px;border:1px solid #fff;background:#000;color:#fff;font:inherit;font-size:12px;letter-spacing:.16em;display:flex;align-items:center;justify-content:center;gap:8px}
#forgeAdd:active{background:#fff;color:#000}
#forgeAdd .plus{font-size:20px;font-weight:700}
#forgeClear{height:54px;padding:0 16px;border:1px solid #ffffff55;background:#000;color:#fff;font:inherit;font-size:10px;letter-spacing:.14em}
#forgeClear:active{background:#fff;color:#000}
#forgeKick{flex:1;max-width:180px;height:54px;border:2px solid #ffd23f;background:#000;color:#ffd23f;font:inherit;font-size:13px;letter-spacing:.18em;font-weight:700}
#forgeKick:active{background:#ffd23f;color:#000}
/* forge hint */
#forgeHint{position:absolute;left:50%;bottom:84px;transform:translateX(-50%);z-index:11;background:#000d;border:1px solid #ffffff44;padding:10px 16px;font-size:10px;letter-spacing:.08em;line-height:1.7;text-align:center;max-width:80vw;pointer-events:none;transition:opacity .5s}
#forgeHint.hgone{opacity:0}
/* preset row on the start screen */
#presetrow{display:flex;gap:8px;width:min(330px,84vw);margin-top:2px}
#presetrow button{flex:1;border:1px solid #ffffff55;background:#000;color:#fff;font:inherit;padding:10px 4px;font-size:9px;letter-spacing:.1em}
#presetrow button:active{background:#fff;color:#000}

/* ---- overlays ---- */
.ov{position:absolute;inset:0;z-index:20;background:#000;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;text-align:center;padding:24px;overflow:hidden}
.ov.gone{display:none}
.kick{font-size:10px;letter-spacing:.6em;opacity:.5}
h1{font-size:clamp(40px,15vw,92px);letter-spacing:-.02em;font-weight:700;line-height:.86}
.sub{font-size:11px;letter-spacing:.34em;opacity:.65}
.col{display:flex;flex-direction:column;gap:11px;margin-top:8px;width:min(330px,84vw)}
.col button{border:1px solid #fff;background:#000;color:#fff;font:inherit;padding:16px;font-size:13px;letter-spacing:.2em}
.col button:active{background:#fff;color:#000}
.col button.key{border-width:2px}
.col button.key:active{background:#fff;color:#000}
#help{font-size:9px;letter-spacing:.14em;opacity:.4;max-width:84vw;line-height:2.1;margin-top:4px}

/* title signature : the wall-of-marks lockup */
#titlemark{display:flex;gap:4px;margin-bottom:6px;height:46px;align-items:flex-end}
#titlemark i{width:8px;background:#fff;transition:height .3s}

#flash{position:absolute;inset:0;z-index:15;pointer-events:none;opacity:0;mix-blend-mode:screen}
#bigtxt{position:absolute;inset:0;z-index:16;display:flex;align-items:center;justify-content:center;font-size:clamp(52px,16vw,140px);font-weight:700;letter-spacing:-.02em;opacity:0;pointer-events:none;text-align:center;padding:0 20px}

#hint{position:absolute;left:50%;bottom:23%;transform:translateX(-50%);z-index:13;background:#000d;border:1px solid #ffffff44;padding:12px 18px;font-size:11px;letter-spacing:.08em;line-height:1.8;text-align:center;max-width:86vw;transition:opacity .5s;pointer-events:none}
#hint.hgone{opacity:0}

#pausepanel .sub{margin-bottom:4px}
#resumebtn{border-width:2px}
#topfade{position:absolute;top:0;left:0;right:0;height:120px;background:linear-gradient(180deg,#000 0%,#0007 50%,transparent 100%);z-index:4;pointer-events:none}

#err{position:fixed;left:0;right:0;bottom:0;max-height:55%;overflow:auto;z-index:99999;background:#1a0000;color:#ffd;font:12px/1.5 ui-monospace,monospace;padding:12px;white-space:pre-wrap;border-top:1px solid #f55;display:none}

/* mode-select grid feel */
#diffrow{display:flex;gap:8px;width:min(330px,84vw)}
#diffrow button{flex:1;border:1px solid #fff;background:#000;color:#fff;font:inherit;padding:12px 4px;font-size:10px;letter-spacing:.12em}
#diffrow button.sel{background:#fff;color:#000}
</style>
</head>
<body>
<canvas id="gl"></canvas>
<div id="topfade"></div>

<div id="score"><span class="sq" id="sqL" style="background:#19e6c8"></span><span class="s" id="s-you">0</span><span class="sep">/</span><span class="s" id="s-cpu">0</span><span class="sq" id="sqR" style="background:#ff8a3d"></span></div>
<div id="clock">5:00</div>

<button id="menu">MENU</button>
<button id="pausebtn"><i></i><i></i></button>

<div id="parts"><span id="partcount">RIGS 0 / 30</span><div id="partbar"></div></div>

<div id="drivezone"></div><div id="driveBase"></div><div id="driveLbl">DRIVE</div><div id="driveKnob"></div>

<div id="rig">
  <div id="buildcol">
    <button class="bbtn" id="bumpbtn"><span class="gly"><span id="bumpGly"></span></span><span class="lab">BUMPER</span><span class="cost">F · 25</span></button>
    <button class="bbtn" id="rampbtn"><span class="gly"><span id="rampGly"></span></span><span class="lab">RAMP</span><span class="cost">R · 40</span></button>
    <button class="bbtn" id="wallbtn"><span class="gly"><span id="wallGly"></span></span><span class="lab">WALL</span><span class="cost">G · 25</span></button>
  </div>
  <button id="boostbtn"><span>BOOST</span></button>
</div>

<div id="hint" class="hgone"></div>
<div id="flash"></div><div id="bigtxt"></div>

<!-- ===================== FORGE UI ===================== -->
<div id="forgeUI">
  <div id="forgebar">
    <span class="ft">FORGE</span>
    <span class="fc" id="forgeCount">0 / 30</span>
  </div>

  <!-- part palette : what Add drops -->
  <div id="forgePalette">
    <button class="fpitem sel" data-pal="wall"><span style="width:20px;height:7px;border:2px solid currentColor;display:block"></span><span class="pl">WALL</span></button>
    <button class="fpitem" data-pal="bump"><span style="width:16px;height:16px;border:2px solid currentColor;border-radius:50%;display:block"></span><span class="pl">BUMPER</span></button>
    <button class="fpitem" data-pal="ramp"><span style="width:0;height:0;border-style:solid;border-width:0 0 13px 20px;border-color:transparent transparent currentColor transparent;display:block"></span><span class="pl">RAMP</span></button>
    <button class="fpitem" data-pal="pad"><span style="width:18px;height:18px;border:2px solid currentColor;border-radius:50%;display:flex;align-items:center;justify-content:center"><span style="width:6px;height:6px;background:currentColor;border-radius:50%"></span></span><span class="pl">PAD</span></button>
  </div>

  <!-- transform tool rail -->
  <div id="forgeRail">
    <button class="frtool sel" data-edit="orbit" title="Orbit"><span class="ti"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M2.5 12C3.7 8 7.5 5 12 5s8.3 3 9.5 7c-1.2 4-5 7-9.5 7s-8.3-3-9.5-7z"/></svg></span><span class="tl">ORBIT</span></button>
    <button class="frtool" data-edit="move" title="Move"><span class="ti"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 3v18M3 12h18M12 3l-3 3M12 3l3 3M12 21l-3-3M12 21l3-3M3 12l3-3M3 12l3 3M21 12l-3-3M21 12l-3 3"/></svg></span><span class="tl">MOVE</span></button>
    <button class="frtool" data-edit="rotate" title="Rotate"><span class="ti"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4v5h5M20 20v-5h-5"/><path d="M20 9A8 8 0 0 0 5.6 5.6M4 15a8 8 0 0 0 14.4 3.4"/></svg></span><span class="tl">SPIN</span></button>
    <button class="frtool" data-edit="scale" title="Scale"><span class="ti"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 9V4h5M20 15v5h-5M4 4l6 6M20 20l-6-6"/></svg></span><span class="tl">SIZE</span></button>
    <div class="frdiv"></div>
    <button class="frtool sel" id="forgeSnap" title="Grid snap"><span class="ti"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 9h16M4 15h16M9 4v16M15 4v16"/></svg></span><span class="tl">SNAP</span></button>
  </div>

  <!-- contextual quick-actions (appears when a part is selected) -->
  <div id="forgeQuick">
    <button class="fqbtn" id="fqDeselect" title="Deselect"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 18L18 6M6 6l12 12"/></svg></button>
    <div class="fqsep"></div>
    <button class="fqbtn" id="fqDup" title="Duplicate"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="11" height="11" rx="1"/><path d="M5 15V5a1 1 0 0 1 1-1h10"/></svg></button>
    <button class="fqbtn" id="fqRot" title="Rotate 15°"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4v5h5"/><path d="M20 9A8 8 0 1 0 18 18"/></svg></button>
    <button class="fqbtn warn" id="fqDel" title="Delete"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 7h14M9 7V5a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2M6 7l1 13h10l1-13"/></svg></button>
  </div>

  <div id="forgeHint" class="hgone"></div>

  <!-- bottom action bar -->
  <div id="forgeBottom">
    <button id="forgeClear">CLEAR</button>
    <button id="forgeAdd"><span class="plus">+</span><span id="forgeAddLbl">WALL</span></button>
    <button id="forgeKick">KICK OFF</button>
  </div>
</div>

<div id="pausepanel" class="ov gone">
  <div class="kick">MATCH</div><h1>PAUSED</h1>
  <div class="sub" id="pausesub">RESUME TO CONTINUE</div>
  <div class="col"><button id="resumebtn" class="key">RESUME</button><button id="leavebtn">QUIT TO MENU</button></div>
</div>

<div id="start" class="ov">
  <div id="titlemark"></div>
  <h1>RICOCHET<br>RIGS</h1>
  <div class="sub">BUILD THE ARENA AT 100KM/H</div>
  <div class="col"><button id="m-forge" class="key">FORGE ARENA</button><button id="m-cpu">VS CPU</button><button id="m-practice">FREE BUILD</button></div>
  <div id="presetrow"><button data-preset="empty">EMPTY</button><button data-preset="funnel">FUNNELS</button><button data-preset="pinball">PINBALL</button><button data-preset="ramps">RAMP CITY</button></div>
  <div id="diffrow"><button data-d="0">ROOKIE</button><button data-d="1" class="sel">PRO</button><button data-d="2">ACE</button></div>
  <div id="help">FORGE lays out ramps, walls, bumpers &amp; pads before kickoff<br>then plays vs CPU on the arena you authored</div>
</div>

<div id="overpanel" class="ov gone"></div>

<div id="err"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>window.THREE||document.write('<scr'+'ipt src="https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.min.js"><\/scr'+'ipt>');</script>
<script>window.THREE||document.write('<scr'+'ipt src="https://unpkg.com/three@0.128.0/build/three.min.js"><\/scr'+'ipt>');</script>
<script>
"use strict";
(function(){function show(m){try{var d=document.getElementById("err");d.style.display="block";d.textContent="\u26a0 "+m;}catch(_){}}
window.addEventListener("error",function(e){show((e.message||"error")+"  @ "+((e.filename||"").split("/").pop())+":"+(e.lineno||"?"));});
window.addEventListener("unhandledrejection",function(e){show("promise: "+((e.reason&&e.reason.message)||e.reason||""));});
if(typeof THREE==="undefined"){show("three.js failed to load \u2014 the CDN is blocked or you are offline. Disable any blocker and reload.");}})();

const $=s=>document.querySelector(s);
const sa=(a,b)=>{let d=a-b;while(d>Math.PI)d-=2*Math.PI;while(d<-Math.PI)d+=2*Math.PI;return d;};
const clamp=(v,a,b)=>Math.max(a,Math.min(b,v));
const toward=(a,b,s)=>a<b?Math.min(a+s,b):Math.max(a-s,b);
const lerp=(a,b,t)=>a+(b-a)*t;

if(!window.THREE){$("#start").innerHTML='<div style="padding:40px;text-align:center;line-height:1.8">COULD NOT LOAD 3D ENGINE.<br>OPEN WITH AN INTERNET CONNECTION.</div>';}
else main();

function main(){
/* ===================== CONSTANTS ===================== */
const HW=22,HL=32,CEIL=15, GOAL_HW=7.5,GOAL_H=5, CAR_R=1.9,BALL_R=1.55,BALL_M=1.0;
const REST_Y=0.7, GRAV=22, JUMP_V=11.5;
const ACCEL=37,BOOST_ACC=62,MAXSPD=19,BOOST_MAX=30,DEMO_SPEED=20;
const COAST=2.6,DRIVE_DRAG=1.05;
/* boost economy : ONE meter feeds both driving and building */
const BOOST_FUEL=100, BOOST_DRAIN=40, BOOST_REGEN=10, BUILD_COST=25, PAD_GAIN=34;
const BALL_REST=0.62,BALL_FRIC=0.992,MAXBALL=52;
const H=1/60, MAX_SUBSTEPS=3;
/* parts */
const PART_MAX=30, BUILD_DIST=5.0;
const BUMP_R=1.9, BUMP_H=2.4, BUMP_IMPULSE=34, BUMP_RANGE=1.9, BUMP_HEALTH=Infinity;
const WALL_HW=2.6, WALL_H=2.8, WALL_TH=0.7, WALL_HEALTH=100;
/* ramp : an angled wedge. low edge at +localZ, high edge at -localZ. one buildable, three jobs from orientation. */
const RAMP_HW=2.6, RAMP_LEN=4.6, RAMP_H=2.6, RAMP_HEALTH=140, RAMP_COST=40, RAMP_LAUNCH=1.0;
const MATCH_TIME=300; /* 5 minutes */
const C_YOU=0x19e6c8, C_CPU=0xff8a3d, C_AMBER=0xffd23f, C_TEAL=0x19e6c8, C_RED=0xff2e2e, C_VIOLET=0xb07cff;
/* forge editing */
let editMode="orbit"; /* orbit | move | rotate | scale */
let snapOn=true; const SNAP_POS=2, SNAP_DEG=15;
let sel=null; /* selected part in forge */
let forgePalette='wall'; /* what the Add FAB drops */
let selHalo=null;

/* ===================== RENDERER / SCENE ===================== */
const renderer=new THREE.WebGLRenderer({canvas:$("#gl"),antialias:true});
renderer.setPixelRatio(Math.min(devicePixelRatio,2));renderer.setSize(innerWidth,innerHeight);
renderer.setClearColor(0x000000,1);
const scene=new THREE.Scene();scene.background=new THREE.Color(0x000000);scene.fog=new THREE.Fog(0x000000,70,150);
const camera=new THREE.PerspectiveCamera(58,innerWidth/innerHeight,0.1,400);
scene.add(new THREE.HemisphereLight(0xffffff,0x101418,0.9));

/* ---- arena floor : neon grid on black, Swiss/brutalist ---- */

let AC=null,master=null,verb,dry,padGain,windGain,crowdGain,NOISEBUF;const pad=[];

  padGain=AC.createGain();padGain.gain.value=0;send(padGain);padGain.gain.linearRampToValueAtTime(0.10,AC.currentTime+4);
  [NOTES[2],NOTES[5],NOTES[9]].forEach((m,i)=>{const o=AC.createOscillator();o.type=i?"sine":"sawtooth";o.frequency.value=hz(m);const g=AC.createGain();g.gain.value=i?0.05:0.025;o.connect(g);g.connect(padGain);o.start();const lfo=AC.createOscillator();lfo.frequency.value=0.05+Math.random()*0.06;const la=AC.createGain();la.gain.value=4;lfo.connect(la);la.connect(o.detune);lfo.start();pad.push({o,m});});

  const cm=noiseSrc();const clp=AC.createBiquadFilter();clp.type="lowpass";clp.frequency.value=300;crowdGain=AC.createGain();crowdGain.gain.value=0;cm.connect(clp);clp.connect(crowdGain);crowdGain.connect(master);cm.start();crowdGain.gain.linearRampToValueAtTime(0.03,AC.currentTime+4);
  setInterval(drift,7000);}catch(e){AC=null;}}

/* shared ramp resolve for ball & cars : climb the slope, launch off the high lip.

function rampVsBody(part,body,rad,isBall){
  const c=Math.cos(part.yaw),s=Math.sin(part.yaw),sc=part.sc;
  const dx=body.pos.x-part.x,dz=body.pos.z-part.z;
  let lx=dx*c - dz*s, lz=dx*s + dz*c;
  const hw=RAMP_HW*sc, hl=RAMP_LEN*sc/2, h=RAMP_H*sc;
  if(Math.abs(lx)>hw+rad || Math.abs(lz)>hl+rad) return false;
  // surface height at local z: low lip at +hl (y~0), high at -hl (y=h). t in [0,1] from low->high
  const t=clamp((hl-lz)/(2*hl),0,1);
  const surfY=t*h+0.05;
  const by=body.pos.y;
  // the slope's upward+forward normal in local space (points up the +y, tilted toward +z/low side)
  const slopeAng=Math.atan2(h,2*hl); // rise/run
  // only act if the body is at/under the surface (on the ramp) and within ramp z-span
  if(Math.abs(lz)<=hl+rad){
    if(by < surfY+rad){
      // push up to surface
      body.pos.y = surfY+rad*0.9;
      const vy = isBall?body.vel.y:body.vy;
      if(vy<0){ // landed on slope: convert downward speed into up+forward (down-slope, toward +z low edge in world)
        const launch = -vy*RAMP_LAUNCH;
        // world forward = local +z direction (down-slope) ; high edge launches toward local -z? No: car drives up toward -z and flies off -z high lip.
        // We want: momentum up the slope carries over the high lip. Forward dir = toward -z (up slope) in world:
        const fwx=-s, fwz=-c; // local -z in world (up-slope/high lip direction)
        if(isBall){body.vel.y=Math.max(body.vel.y,launch*0.5+1.5);}
        else{body.vy=Math.max(body.vy,launch*0.5+1.0);body.grounded=false;}
      } else {
        if(isBall){if(body.vel.y<0)body.vel.y=0;}
        else{body.vy=Math.max(body.vy,0);body.grounded=false;}
      }
      // add a gentle up-slope acceleration so driving up the ramp pops you off the top lip
      const upx=-s, upz=-c; // toward high lip
      const climbing = (body.vel.x*upx+body.vel.z*upz);
      if(climbing>4){ // moving up the slope fast -> launch over the lip when near the top
        if(t>0.7){

}

function driveCar(car,wx,wy,boost,jump,dt){if(car.dead)return false;
  const mag=clamp(Math.hypot(wx,wy),0,1);let boosting=false;let dx=0,dz=0;if(mag>0.001){const inv=1/Math.hypot(wx,wy);dx=wx*inv;dz=wy*inv;}

  if(boost&&car.boost>0&&mag>0.12){car.vel.x+=dx*BOOST_ACC*dt;car.vel.z+=dz*BOOST_ACC*dt;car.boost-=BOOST_DRAIN*dt;boosting=true;}

  const drag=(mag<0.12)?COAST:DRIVE_DRAG;car.vel.x*=Math.exp(-drag*dt);car.vel.z*=Math.exp(-drag*dt);
  const planar=Math.hypot(car.vel.x,car.vel.z),max=(boosting?BOOST_MAX:MAXSPD);if(planar>max){const s=max/planar;car.vel.x*=s;car.vel.z*=s;}

  let tyaw;if(mag>0.12)tyaw=Math.atan2(dx,dz);else if(planar>0.4)tyaw=Math.atan2(car.vel.x,car.vel.z);else tyaw=car.yaw;

  if(car.pos.x>HW-ex){car.pos.x=HW-ex;car.vel.x=-Math.abs(car.vel.x)*0.45;}if(car.pos.x<-(HW-ex)){car.pos.x=-(HW-ex);car.vel.x=Math.abs(car.vel.x)*0.45;}

  return boosting;}

  if(B.pos.y>CEIL-BALL_R){B.pos.y=CEIL-BALL_R;B.vel.y*=-BALL_REST;}
  if(B.pos.x>HW-BALL_R){B.pos.x=HW-BALL_R;B.vel.x*=-BALL_REST;wf();}if(B.pos.x<-(HW-BALL_R)){B.pos.x=-(HW-BALL_R);B.vel.x*=-BALL_REST;wf();}

const N=new THREE.Vector3(),cf=new THREE.Vector3(),sdir=new THREE.Vector3();
function carBall(car,boosting){if(car.dead)return;const sum=car.cr+BALL_R;N.copy(B.pos).sub(car.pos);const d=N.length();
  if(d<sum){N.divideScalar(d||1);B.pos.copy(car.pos).addScaledVector(N,sum+0.01);cf.set(Math.sin(car.yaw),0,Math.cos(car.yaw));const spd=Math.hypot(car.vel.x,car.vel.z);const approach=Math.max(0,car.vel.x*N.x+car.vel.z*N.z);

function sep(a,b){if(a.dead||b.dead)return;const dx=b.pos.x-a.pos.x,dz=b.pos.z-a.pos.z,d=Math.hypot(dx,dz),min=a.cr+b.cr;if(d>0.001&&d<min){const preA=Math.hypot(a.vel.x,a.vel.z),preB=Math.hypot(b.vel.x,b.vel.z),ux=dx/d,uz=dz/d,ma=a.mass,mb=b.mass,ia=1/ma,ib=1/mb,inv=ia+ib,push=(min-d);a.pos.x-=ux*push*(ia/inv);a.pos.z-=uz*push*(ia/inv);b.pos.x+=ux*push*(ib/inv);b.pos.z+=uz*push*(ib/inv);const vrn=(b.vel.x-a.vel.x)*ux+(b.vel.z-a.vel.z)*uz;if(vrn<0){const e=0.62,j=-(1+e)*vrn/inv;a.vel.x-=j*ia*ux;a.vel.z-=j*ia*uz;b.vel.x+=j*ib*ux;b.vel.z+=j*ib*uz;const imp=-vrn;if(imp>9){shake=Math.max(shake,clamp(imp*0.012,0,0.22));buzz(clamp(imp,6,20));tmpv.set((a.pos.x+b.pos.x)/2,1.0,(a.pos.z+b.pos.z)/2);spark(tmpv,0xffffff,3,8,5,0.4,8);}}if(a.side!==b.side){if(preA>=DEMO_SPEED&&preA>preB+1.5)demolish(b,a);else if(preB>=DEMO_SPEED&&preB>preA+1.5)demolish(a,b);}}}

/* ===================== AI : combat engineer bot ===================== */
const aiState={think:0,plan:"chase",buildCd:0};
function aiTick(dt){if(A.dead){return {wx:0,wy:0,boost:false,jump:false};}
  aiState.think-=dt;aiState.buildCd-=dt;
  const tgZ=-HL; // CPU attacks the teal goal (z=-HL), defends z=+HL
  const ownZ=HL;
  // predict ball a touch ahead
  const px=B.pos.x+B.vel.x*0.3, pz=B.pos.z+B.vel.z*0.3;
  // decide a coarse plan occasionally
  if(aiState.think<=0){aiState.think=0.25+Math.random()*0.2;
    const ballToOwn=Math.hypot(B.pos.x-0,ownZ-B.pos.z);
    const threat=(B.vel.z>3)&&(B.pos.z>0); // ball heading to CPU goal
    if(threat&&ballToOwn<34)aiState.plan="defend";
    else if(B.pos.z<6)aiState.plan="attack";
    else aiState.plan="chase";}
  let gx,gz;
  if(aiState.plan==="defend"){gx=clamp(B.pos.x*0.7,-GOAL_HW,GOAL_HW);gz=lerp(B.pos.z,ownZ-6,0.5);}
  else if(aiState.plan==="attack"){const dx=px-0,dz=pz-tgZ;const l=Math.hypot(dx,dz)||1;gx=px+ (dx/l)*4;gz=pz+(dz/l)*4;}
  else {gx=px;gz=pz;}
  let vx=gx-A.pos.x, vz=gz-A.pos.z;const dl=Math.hypot(vx,vz)||1;
  const far=Math.hypot(B.pos.x-A.pos.x,B.pos.z-A.pos.z);
  // boost usage scales with difficulty and distance
  const boostChance=[0.012,0.02,0.035][difficulty];
  const boost=A.boost>30&&far>10&&Math.random()<boostChance;
  // construct: defensive wall when threatened, bumper when attacking — but only if it has spare boost beyond a driving reserve
  if(aiState.buildCd<=0 && A.boost>BUILD_COST+25){
    const buildAggr=[0.004,0.009,0.016][difficulty];
    if(aiState.plan==="defend" && Math.abs(A.pos.x)<14 && A.pos.z>10 && Math.random()<buildAggr*1.4){
      const s=buildSpot(A);if(!spotBlocked(s.x,s.z,WALL_HW+BALL_R+0.3,WALL_HW+CAR_R+0.2)){A.boost-=BUILD_COST;buildWall(s.x,s.z,s.yaw);aiState.buildCd=2.2;}
    } else if(aiState.plan==="attack" && far<8 && Math.random()<buildAggr){
      const s=buildSpot(A);if(!spotBlocked(s.x,s.z,BUMP_R+BALL_R+0.3,BUMP_R+CAR_R+0.2)){A.boost-=BUILD_COST;buildBumper(s.x,s.z);aiState.buildCd=2.5;}
    }
  }
  const jump=A.grounded && B.pos.y>4 && far<6 && Math.random()<0.04;
  return {wx:vx/dl, wy:vz/dl, boost, jump};}
/* CPU also grabs pads */
function aiSeekPad(){let best=null,bd=1e9;for(const p of PADS){if(p.cd>0)continue;const d=Math.hypot(p.x-A.pos.x,p.z-A.pos.z);if(d<bd){bd=d;best=p;}}return best;}

function updCam(dt){tf.set(P.pos.x*0.5+B.pos.x*0.5,0,P.pos.z*0.5+B.pos.z*0.5);focus.lerp(tf,1-Math.pow(0.004,dt));
  const spread=P.pos.distanceTo(B.pos);const ownLine=-HL;const distOwn=Math.abs(P.pos.z-ownLine);const edge=clamp(1-distOwn/18,0,1);
  const wantH=clamp(24+spread*0.45+edge*15,24,50);const wantB=clamp(15+spread*0.32,12,28)*(1-edge*0.45);
  camH+=(wantH-camH)*(1-Math.pow(0.01,dt));camB+=(wantB-camB)*(1-Math.pow(0.01,dt));
  const fx=clamp(focus.x,-(HW-3),HW-3);let camZ=P.pos.z-camB;camZ=clamp(camZ,-(HL+6),HL+6);const lookZ=focus.z+camB*0.3;

function applyPreset(name){

    placeAt('bump',-6,12);placeAt('bump',6,-12);

let prev=performance.now(),acc=0;
const F=new THREE.Vector3();
function frame(now){requestAnimationFrame(frame);try{let dt=(now-prev)/1000;prev=now;if(dt>0.1)dt=0.1;
  if(state==="forge"){
    forgeOrbit+=forgeOrbitV;forgeOrbitV*=0.92;if(Math.abs(forgeOrbitV)<0.0002)forgeOrbitV=0;
    const rad=58, ang=forgeOrbit;
    camera.position.set(Math.sin(ang)*rad, 46, Math.cos(ang)*rad);
    camera.lookAt(0,0,0);
    wallNeg.material.opacity=1;trimNeg.material.opacity=1;
    B.pos.y=7+Math.sin(now*0.002)*0.4;ball.position.copy(B.pos);ball.rotation.y+=dt*0.3;ballEdge.position.copy(B.pos);ballEdge.rotation.copy(ball.rotation);
    ballSh.position.set(B.pos.x,0.02,B.pos.z);ballSh.scale.setScalar(0.5);ballSh.material.opacity=0.18;
    placeCars();
    updPartVisuals(dt);updPads(dt);updSelHalo();
    ghostBump.visible=ghostBumpRing.visible=ghostWall.visible=ghostWallEdge.visible=ghostRamp.visible=ghostRampEdge.visible=false;
    const pulse=0.18+Math.sin(now*0.003)*0.05;goalPos.glow.material.opacity=pulse;goalNeg.glow.material.opacity=pulse;
    updDebris(dt);updP(dt);renderer.render(scene,camera);return;
  }
  if(state==="play"||state==="celeb"){
    let meBoost=false;
    if(state==="play"){
      // player input
      let pwx,pwz;if(dId!==null){pwx=-driveX;pwz=driveY;}else{let kx=0,ky=0;if(keys.KeyA||keys.ArrowLeft)kx-=1;if(keys.KeyD||keys.ArrowRight)kx+=1;if(keys.KeyW||keys.ArrowUp)ky+=1;if(keys.KeyS||keys.ArrowDown)ky-=1;pwx=-kx;pwz=ky;}
      const boostNow=boostHeld||keys.ShiftLeft||keys.ShiftRight;meBoost=boostNow;
      let jump=jumpQ;jumpQ=false;
      // builds happen at frame granularity (not per-substep)
      if(buildBumpQ){tryBuild(P,'bump');buildBumpQ=false;}
      if(buildWallQ){tryBuild(P,'wall');buildWallQ=false;}
      if(buildRampQ){tryBuild(P,'ramp');buildRampQ=false;}
      // AI
      let ai={wx:0,wy:0,boost:false,jump:false};const hasOpp=(mode==="cpu");
      if(hasOpp)ai=aiTick(dt);
      // physics substeps
      acc+=dt;let steps=0;
      while(acc>=H&&steps<MAX_SUBSTEPS){
        const pB=driveCar(P,pwx,pwz,boostNow,jump,H);jump=false;
        let aB=false;if(hasOpp)aB=driveCar(A,ai.wx,ai.wy,ai.boost,ai.jump,H);ai.jump=false;
        ballStep(H);
        if(state!=="play"){acc=0;break;}
        if(hasOpp)sep(P,A);
        runParts();
        carBall(P,pB);if(hasOpp)carBall(A,aB);
        // boost trail
        if(pB){F.set(Math.sin(P.yaw),0,Math.cos(P.yaw));tmpv.copy(P.pos).addScaledVector(F,-2.0);tmpv.y=0.7;spark(tmpv,C_AMBER,0.5,1,1.2,0.2,2);}
        if(aB){F.set(Math.sin(A.yaw),0,Math.cos(A.yaw));tmpv.copy(A.pos).addScaledVector(F,-2.0);tmpv.y=0.7;spark(tmpv,C_CPU,0.5,1,1.2,0.2,2);}
        acc-=H;steps++;}
      if(steps>=MAX_SUBSTEPS)acc=0;
      updDemo(dt);
      checkPads(P);if(mode==="cpu")checkPads(A);
      // wind audio
      if(AC){const sn=P.vel.length()/BOOST_MAX;windGain.gain.setTargetAtTime(clamp(sn*0.05+(boostNow&&P.boost>0?0.03:0),0,0.08),AC.currentTime,0.1);}
      // clock
      if(mode==="cpu"){matchTime-=dt;if(matchTime<=0&&!sudden){matchTime=0;endMatch();}$("#clock").textContent=sudden?"SUDDEN DEATH":fmtTime(matchTime);}
    } else {
      // celeb : ball floats, sparks
      B.vel.y-=GRAV*dt;B.pos.addScaledVector(B.vel,dt);B.vel.x*=0.99;B.vel.z*=0.99;if(B.pos.y<BALL_R){B.pos.y=BALL_R;B.vel.y*=-0.4;}
      if(Math.random()<0.6)spark(B.pos.clone().setY(BALL_R+Math.random()*3),celebWho==="you"?C_AMBER:C_CPU,4,5,6,0.7,6);
      celeb-=dt;if(celeb<=0){if(pendingResult){const w=pendingResult.won;pendingResult=null;finishMatch(w);}else{if(mode==="practice"){B.pos.set(0,7,0);B.vel.set((Math.random()*2-1)*3,0,(Math.random()*2-1)*3);state="play";}else{resetPositions();state="play";}}}
    }
    if(meBoost&&!wasBoost)whoosh();wasBoost=meBoost;
    // drift skids
    const msp=Math.hypot(P.vel.x,P.vel.z);let slip=0;if(msp>0.5)slip=Math.abs(sa(Math.atan2(P.vel.x,P.vel.z),P.yaw));
    const drifting=state==="play"&&msp>9&&slip>0.5;
    if(drifting){const bx=Math.sin(P.yaw),bz=Math.cos(P.yaw),sx=Math.cos(P.yaw),sz=-Math.sin(P.yaw);skid(P.pos.x-bx*1.4+sx*1.35,P.pos.z-bz*1.4+sz*1.35);skid(P.pos.x-bx*1.4-sx*1.35,P.pos.z-bz*1.4-sz*1.35);}
    // mesh sync
    ball.position.copy(B.pos);ball.rotation.x+=B.vel.z*dt*0.4;ball.rotation.z-=B.vel.x*dt*0.4;ballEdge.position.copy(B.pos);ballEdge.rotation.copy(ball.rotation);
    ballSh.position.set(B.pos.x,0.02,B.pos.z);const bsc=clamp(1-(B.pos.y-BALL_R)*0.05,0.4,1);ballSh.scale.setScalar(bsc);ballSh.material.opacity=0.34*bsc;
    goalArrow.position.set(B.pos.x,3.0+Math.sin(now*0.005)*0.3,B.pos.z);
    placeCars();
    updPartVisuals(dt);updGhost();updPads(dt);
    const pulse=0.18+Math.sin(now*0.003)*0.05;goalPos.glow.material.opacity=pulse;goalNeg.glow.material.opacity=pulse;
    $("#boostbtn").style.setProperty("--f",(P.boost/BOOST_FUEL).toFixed(2));
  }
  updDebris(dt);updP(dt);updSkid(dt);updCam(dt);
  renderer.render(scene,camera);}catch(e){console.error(e);}}

$("#resumebtn").addEventListener("click",resumeGame);
$("#leavebtn").addEventListener("click",()=>{$("#pausepanel").classList.add("gone");toMenu();});
$("#menu").addEventListener("click",()=>{if(state==="play"||state==="pause"||state==="celeb")toMenu();});
document.querySelectorAll("#diffrow button").forEach(b=>b.addEventListener("click",()=>{document.querySelectorAll("#diffrow button").forEach(x=>x.classList.remove("sel"));b.classList.add("sel");difficulty=+b.dataset.d;}));

/* overlay fit-to-screen */
let _fitR=0;function fitOverlay(el){if(!el||el.classList.contains("gone"))return;el.style.transform="";const vh=window.innerHeight,need=el.scrollHeight;if(need>vh+1){const f=Math.max(0.5,(vh-2)/need);el.style.transform="scale("+f.toFixed(3)+")";}}
function fitAll(){document.querySelectorAll(".ov").forEach(fitOverlay);}
function fitQ(){cancelAnimationFrame(_fitR);_fitR=requestAnimationFrame(fitAll);}
new MutationObserver(fitQ).observe($("#start"),{attributes:true,attributeFilter:["class"]});
new MutationObserver(fitQ).observe($("#overpanel"),{attributes:true,attributeFilter:["class"],childList:true});
window.addEventListener("resize",()=>{camera.aspect=innerWidth/innerHeight;camera.updateProjectionMatrix();renderer.setSize(innerWidth,innerHeight);if(dId===null)defaultDrive();fitQ();});
window.addEventListener("orientationchange",fitQ);
setTimeout(fitAll,80);

defaultDrive();requestAnimationFrame(frame);
}
</script>
</body>
</html>
