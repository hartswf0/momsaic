<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover"/>
<title>FANTROL AR</title>
<style>
:root{--gold:#ffcf3f;--red:#ff4242;--green:#34ff6a}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;margin:0;background:#000;overflow:hidden;color:#fff;
  font-family:'IBM Plex Mono',ui-monospace,Menlo,monospace;user-select:none;-webkit-user-select:none}
button{font-family:inherit;border:0;cursor:pointer;background:none;color:inherit}
#ar{position:fixed;inset:0}
#ar canvas,#ar video{width:100%!important;height:100%!important;object-fit:cover}
.ui{position:fixed;inset:0;z-index:10;pointer-events:none}
.bar{position:absolute;top:14px;left:0;right:0;display:flex;align-items:center;justify-content:space-between;padding:0 16px}
.tally{display:flex;gap:8px}
.tally i{width:16px;height:16px;border:3px solid #fff;border-radius:50%}
.tally i.ok{background:var(--gold);border-color:var(--gold)}.tally i.no{background:var(--red);border-color:var(--red)}
.mode{font-size:12px;letter-spacing:2px;font-weight:800;color:var(--gold);text-shadow:0 2px 6px #000}
.score{position:absolute;top:44px;right:16px;font-size:26px;font-weight:800;color:var(--gold);text-shadow:0 2px 6px #000}
.find{position:absolute;bottom:30px;left:0;right:0;text-align:center;font-size:12px;letter-spacing:1px;text-shadow:0 2px 6px #000;transition:opacity .3s}
.find.hide{opacity:0}
.surface{position:absolute;inset:0;pointer-events:auto;touch-action:none}
.gate{position:fixed;inset:0;z-index:20;background:#0a0c0e;display:flex;flex-direction:column;justify-content:center;align-items:center;gap:18px;text-align:center;padding:28px;overflow:auto}
.gate.gone{display:none}
.eye{font-size:11px;letter-spacing:5px;color:var(--gold);font-weight:700}
h1{font-size:30px;line-height:1.05;font-weight:800;letter-spacing:-.5px}h1 em{color:var(--gold);font-style:normal}
p{font-size:12px;color:#9aa;line-height:1.6;max-width:32ch}
.start{border:3px solid var(--gold);color:var(--gold);border-radius:50%;width:104px;height:104px;display:grid;place-items:center;background:rgba(255,207,63,.08)}
.start:active{background:var(--gold);color:#000}.start svg{width:40px;height:40px}
.warn{font-size:11px;color:#ffb;max-width:32ch}
.banner{position:absolute;top:42%;left:0;right:0;text-align:center;font-size:40px;font-weight:800;text-shadow:0 3px 12px #000;opacity:0;transition:opacity .2s}
.banner.show{opacity:1}
.tag{position:absolute;bottom:8px;left:0;right:0;text-align:center;font-size:9px;letter-spacing:2px;color:#5a5f67}
</style>
<script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-three.prod.js"></script>
</head>
<body>
<div id="ar"></div>
<div class="ui">
  <div class="bar"><div class="tally" id="tally"></div><div class="mode" id="modeLbl">STRIKER</div></div>
  <div class="score" id="score">0</div>
  <div class="surface" id="surface"></div>
  <div class="banner" id="banner"></div>
  <div class="find" id="find">POINT AT YOUR CARD</div>
  <div class="tag">YOUR CARD TARGET EMBEDDED</div>
</div>
<div class="gate" id="gate">
  <div class="eye">FANTROL &middot; AR</div>
  <h1>Pitch on<br><em>your card.</em></h1>
  <p>Point at your World Cup card. Take 5 free kicks, then switch sides and save 5. Most goals + saves wins.</p>
  <button class="start" id="enter" aria-label="start"><svg viewBox="0 0 24 24"><polygon points="6,4 20,12 6,20" fill="currentColor"/></svg></button>
  <div class="warn" id="warn"></div>
</div>

<script>
/* Bind the button in a PLAIN script so it works even if the module/CDN fails. */
(function(){
  var btn=document.getElementById('enter');
  var warn=document.getElementById('warn');
  btn.addEventListener('click',function(){
    if(window.__fantrolEnter){ window.__fantrolEnter(); }
    else { warn.textContent='Engine still loading or blocked. Needs https + internet for the AR engine. Wait a moment and tap again.'; }
  });
  // surface load errors
  window.addEventListener('error',function(e){ if(warn&&/mind|three|import/i.test(e.message||'')) warn.textContent='Load error: '+e.message; });
})();
</script>
