<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0, viewport-fit=cover" />
<meta name="theme-color" content="#ffffff" />
<title>ORAMICS // GRANULAR VOID</title>
<style>
  :root {
    --bg: #ffffff;
    --ink: #000000;
    --safe-top: env(safe-area-inset-top, 0px);
    --safe-bottom: env(safe-area-inset-bottom, 0px);
    --line: 1px solid #000000;
    --fat: 2px solid #000000;
    --mono: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
    --sans: Arial, Helvetica, sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; border-radius: 0 !important; -webkit-tap-highlight-color: transparent; }
  
  html, body {
    position: fixed; top: 0; left: 0; right: 0; bottom: 0;
    width: 100vw; height: 100dvh;
    overflow: hidden; background: var(--bg); color: var(--ink);
    touch-action: none; overscroll-behavior: none;
    -webkit-user-select: none; user-select: none;
  }

  body { font-family: var(--mono); }
  button { appearance: none; -webkit-appearance: none; font: inherit; color: var(--ink); background: var(--bg); border: var(--line); cursor: pointer; }
  button:focus-visible { outline: 2px solid var(--ink); outline-offset: -4px; }

  .machine {
    width: 100%; height: 100%;
    display: flex; flex-direction: column;
    background: var(--bg); color: var(--ink); overflow: hidden;
  }

  .header {
    flex: 0 0 auto;
    padding: calc(6px + var(--safe-top)) 6px 5px; border-bottom: var(--fat);
    display: flex; align-items: stretch; justify-content: space-between;
  }
  .brand { display: flex; flex-direction: column; justify-content: center; min-width: 0; padding-right: 10px; }
  .title { font-family: var(--sans); font-weight: 900; font-size: clamp(20px, 6.5vw, 36px); line-height: 0.85; letter-spacing: -0.05em; text-transform: uppercase; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .subtitle { font-size: 10px; font-weight: 900; text-transform: uppercase; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

  .play-cell {
    flex: 0 0 110px; display: flex; align-items: center; justify-content: center;
    font-size: 18px; font-weight: 900; text-transform: uppercase;
    border: var(--fat); background: var(--bg); color: var(--ink); transition: 0.1s;
  }
  .play-cell.on { background: var(--ink); color: var(--bg); animation: pulsePlay 1.2s infinite alternate; }
  @keyframes pulsePlay { 0% { background: var(--ink); } 100% { background: #444; } }

  .film-deck { flex: 1 1 0; position: relative; width: 100%; min-height: 0; background: var(--bg); }
  canvas#film { position: absolute; inset: 0; width: 100%; height: 100%; display: block; image-rendering: pixelated; touch-action: none; }
  
  .bus { flex: 0 0 24px; display: flex; border-top: var(--fat); border-bottom: var(--line); background: var(--bg); }
  .bus-cell { display: flex; align-items: center; justify-content: center; border-right: var(--line); font-size: 10px; font-weight: 900; padding: 0 6px; }
  .bus-cell:last-child { border-right: none; flex: 1; justify-content: flex-end; }
  .bus-cell.live-on { background: var(--ink); color: var(--bg); }

  .ledger { flex: 0 0 34px; display: flex; background: var(--bg); cursor: pointer; border-bottom: var(--fat); }
  .ledger-tag { width: 56px; display: flex; align-items: center; justify-content: center; background: var(--ink); color: var(--bg); font-size: 10px; font-weight: 900; }
  .ledger-slip { flex: 1; display: flex; align-items: center; padding: 0 8px; font-size: 10px; font-weight: 900; text-transform: uppercase; border-left: var(--fat); overflow: hidden; white-space: nowrap; text-overflow: ellipsis; }
  .ledger-slip.engaged { background: var(--ink); color: var(--bg); }

  .commands {
    flex: 0 0 auto; display: grid; grid-template-columns: repeat(4, 1fr); gap: 4px;
    padding: 6px; padding-bottom: max(6px, var(--safe-bottom)); background: var(--bg);
  }
  .cmd {
    display: flex; flex-direction: column; align-items: flex-start; justify-content: center;
    padding: 4px; border: var(--fat); min-height: 48px; background: var(--bg); color: var(--ink);
  }
  .cmd b { font-size: clamp(10px, 3.5vw, 14px); font-weight: 900; text-transform: uppercase; line-height: 1.1; letter-spacing: -0.5px; }
  .cmd span { font-size: 8px; font-weight: 900; text-transform: uppercase; line-height: 1.1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; width: 100%; text-align: left; opacity: 0.8; }
  .cmd.active { background: var(--ink); color: var(--bg); }
  .cmd.recording { background: #ff0000; color: #ffffff; animation: pulseRec 1s infinite alternate; }
  @keyframes pulseRec { 0% { background: #ff0000; color: #ffffff; } 100% { background: #aa0000; color: #ffffff; } }
</style>
</head>
<body>
<div class="machine" id="machine">
  <header class="header">
    <div class="brand">
      <h1 class="title">ORAMICS OCTOPLEX</h1>
      <p class="subtitle">INFINITE GRANULAR SEQUENCER</p>
    </div>
    <button id="btnPlay" class="play-cell" type="button">► PLAY</button>
  </header>

  <main class="film-deck" id="filmDeck">
    <canvas id="film"></canvas>
  </main>

  <section class="bus">
    <div class="bus-cell" id="busLive">REALTIME</div>
    <div class="bus-cell" id="busIdx">ELAPSED 0:00.0</div>
    <div class="bus-cell" id="busVer">VER 000</div>
    <div class="bus-cell" id="busFault">OK</div>
  </section>

  <section class="ledger" id="ledgerRelay">
    <div class="ledger-tag" id="ledgerTag">DRAW</div>
    <div id="ledgerSlip" class="ledger-slip">SYSTEM IDLE. AWAITING AUDIO OR DRAWING.</div>
  </section>

  <nav class="commands">
    <!-- ROW 1: Edit Tools -->
    <button class="cmd active" data-cmd="DRAW" type="button"><b>DRAW</b><span>WRITE</span></button>
    <button class="cmd" data-cmd="CUT" type="button"><b>CUT</b><span>ERASE</span></button>
    <button class="cmd" data-cmd="LIFT" type="button"><b>LIFT</b><span>COPY</span></button>
    <button class="cmd" data-cmd="DROP" type="button"><b>DROP</b><span>PASTE</span></button>

    <!-- ROW 2: Nav & Memory -->
    <button class="cmd" data-cmd="SCRUB" type="button"><b>SCRUB</b><span>TIMELINE</span></button>
    <button class="cmd" data-cmd="ZOOM_IN" type="button"><b>ZOOM +</b><span>MAGNIFY</span></button>
    <button class="cmd" data-cmd="ZOOM_OUT" type="button"><b>ZOOM -</b><span>SHRINK</span></button>
    <button class="cmd" data-cmd="UNDO" type="button"><b>UNDO</b><span>REVERT</span></button>
    
    <!-- ROW 3: System I/O -->
    <button class="cmd" data-cmd="ARM" id="btnArm" type="button"><b>ARM</b><span id="armLabel">TIME</span></button>
    <button class="cmd" data-cmd="WIPE" type="button"><b>WIPE</b><span>CLEAR</span></button>
    <button class="cmd" data-cmd="IMPORT" type="button"><b>AUDIO</b><span>INJECT</span></button>
    <button class="cmd" data-cmd="BOUNCE" id="btnBounce" type="button"><b>REC</b><span>EXPORT</span></button>
  </nav>

  <input type="file" id="fileImport" accept=".bflix,.txt,.mp3,.wav,.ogg,.m4a,.flac" style="display: none;" />
</div>

<script>
(() => {
  'use strict';

  // --- 8-DIMENSION ARCHITECTURE CONSTANTS ---
  const FPS = 100; 
  
  // Baselines that represent "Clean" Audio
  const BASELINES = { TIME: 0.5, PITCH: 0.5, SHATTER: 1.0, WARP: 0.0, VOID: 1.0, VOLUME: 0.8, GATE: 1.0, REVERB: 0.0 };
  const STRIPS = [
    { id: 'TIME',    share: 0.125, baseline: BASELINES.TIME },    // Granular Playhead Speed
    { id: 'PITCH',   share: 0.125, baseline: BASELINES.PITCH },   // Granular Read Rate (Decoupled Pitch)
    { id: 'SHATTER', share: 0.125, baseline: BASELINES.SHATTER }, // Granular Stutter Window Size
    { id: 'WARP',    share: 0.125, baseline: BASELINES.WARP },    // Ring Modulation
    { id: 'VOID',    share: 0.125, baseline: BASELINES.VOID },    // Sample Rate Decimation
    { id: 'VOLUME',  share: 0.125, baseline: BASELINES.VOLUME },  // Main Thread VCA
    { id: 'GATE',    share: 0.125, baseline: BASELINES.GATE },    // Main Thread Hard Gate
    { id: 'REVERB',  share: 0.125, baseline: BASELINES.REVERB }   // Main Thread Tape Delay
  ];
  const STRIP_ORDER = STRIPS.map(s => s.id);

  const state = {
    mode: 'DRAW',
    activeStrip: 'TIME', 
    running: false, 
    currentTime: 0, 
    duration: 10.0, // Default 10 seconds empty canvas (Infinite Loop Mode)
    zoom: 150, // Pixels per second zoom level
    isRecording: false,
    mediaRecorder: null,
    audioChunks: [],
    scrub: { active: false, startX: 0, startTime: 0 },
    undoStack: [],
    versions: { TIME: 0, PITCH: 0, SHATTER: 0, WARP: 0, VOID: 0, VOLUME: 0, GATE: 0, REVERB: 0 },
    pen: { active: false, pointerId: null, x: 0, y: 0, lastIdx: -1, lastVal: -1, startX: -1, startIdx: -1 },
    clipboard: null,
    needsPaint: true, dpr: 1, w: 1, h: 1, lanes: [],
    lastScheduled: { VOLUME: -1, GATE: -1, REVERB: -1 } 
  };

  let bufferLength = Math.ceil(state.duration * FPS);
  const buffers = {};
  STRIPS.forEach(s => buffers[s.id] = new Float32Array(bufferLength).fill(s.baseline));

  const canvas = document.getElementById('film');
  const ctx = canvas.getContext('2d', { alpha: false, desynchronized: true });
  const ledgerSlip = document.getElementById('ledgerSlip');
  const ledgerTag = document.getElementById('ledgerTag');
  const busIdx = document.getElementById('busIdx');
  
  // --- CUSTOM GRANULAR AUDIO WORKLET ENGINE ---
  let audioCtx = null;
  let workletNode = null, gainNode = null, delayNode = null, feedbackGain = null, wetGain = null;
  let mediaDestNode = null;
  let decodedAudioL = new Float32Array(0);
  let decodedAudioR = new Float32Array(0);
  let startTime = 0, pauseTime = 0, raf = 0, lastFrameTime = performance.now();
  let isSynced = false;
  const strokeTrail = [];

  const workletCode = `
  class OramicsVoidEngine extends AudioWorkletProcessor {
      constructor() {
          super();
          this.bufL = null; this.bufR = null; this.len = 0;
          this.playhead = 0; this.run = false;
          this.fps = 100;
          
          this.laneT = new Float32Array(0); 
          this.laneP = new Float32Array(0); 
          this.laneS = new Float32Array(0); 
          this.laneW = new Float32Array(0); 
          this.laneV = new Float32Array(0); 

          this.stutterPhase = 0;
          this.stutterAnchor = 0;
          this.warpPhase = 0;
          
          this.oscPhase = 0;
          this.fmPhase = 0;
          this._samplesProcessed = 0;

          this.port.onmessage = (e) => {
              if (e.data.type === 'LOAD') {
                  this.bufL = e.data.L; this.bufR = e.data.R; 
                  this.len = this.bufL.length;
                  this.laneT = e.data.T; this.laneP = e.data.P; this.laneS = e.data.S;
                  this.laneW = e.data.W; this.laneV = e.data.V;
              } else if (e.data.type === 'RUN') {
                  this.run = e.data.run;
                  if(this.run && e.data.reset) {
                      this.playhead = e.data.startTime * sampleRate;
                      this._samplesProcessed = e.data.startTime * sampleRate;
                  }
              } else if (e.data.type === 'PATCH') {
                  let target = e.data.id === 'TIME' ? this.laneT : 
                               e.data.id === 'PITCH' ? this.laneP :
                               e.data.id === 'SHATTER' ? this.laneS : 
                               e.data.id === 'WARP' ? this.laneW : 
                               e.data.id === 'VOID' ? this.laneV : null;
                  if (target) {
                      for(let i=0; i<e.data.val.length; i++) {
                          if (e.data.start + i < target.length) target[e.data.start + i] = e.data.val[i];
                      }
                  }
              }
          };
      }

      process(inputs, outputs) {
          const outL = outputs[0][0]; const outR = outputs[0][1] || outL;
          if (!this.run || this.laneT.length === 0) return true;

          let hasAudio = this.len > 0;
          let maxSamples = Math.floor((this.laneT.length / this.fps) * sampleRate);

          for (let i = 0; i < outL.length; i++) {
              // Seamless Timeline Looping
              if (this._samplesProcessed >= maxSamples) {
                  this._samplesProcessed = this._samplesProcessed % maxSamples;
              }

              let autoIdx = Math.floor((this._samplesProcessed / sampleRate) * this.fps);
              autoIdx = Math.max(0, Math.min(this.laneT.length - 1, autoIdx));

              let t = this.laneT[autoIdx] ?? 0.5; 
              let p = this.laneP[autoIdx] ?? 0.5; 
              let s = this.laneS[autoIdx] ?? 1.0;
              let w = this.laneW[autoIdx] ?? 0.0; 
              let v = this.laneV[autoIdx] ?? 1.0;

              let smpL = 0, smpR = 0;

              if (hasAudio) {
                  // --- DECOUPLED GRANULAR AUDIO MODE ---
                  // TIME: -1x to +3x playhead speed. Baseline 0.5 = 1x Normal Speed
                  let speed = (t - 0.5) * 4.0 + 1.0;
                  
                  // PITCH: -2 octaves to +2 octaves read rate
                  let pitchRate = Math.pow(2, (p - 0.5) * 4.0);

                  let readPos = this.playhead;
                  
                  // SHATTER: 0.0 = 5ms window, 1.0 = 200ms window
                  let winLen = sampleRate * (0.005 + s * 0.195); 
                  
                  this.stutterPhase += pitchRate;
                  
                  if (this.stutterPhase >= winLen || this.stutterPhase < 0) {
                      this.stutterPhase = 0;
                      this.stutterAnchor = this.playhead;
                  }
                  
                  let grainEnv = 1.0;
                  let fadeSamples = Math.min(100, winLen * 0.25);
                  if (this.stutterPhase < fadeSamples) {
                      grainEnv = this.stutterPhase / fadeSamples;
                  } else if (this.stutterPhase > winLen - fadeSamples) {
                      grainEnv = (winLen - this.stutterPhase) / fadeSamples;
                  }

                  readPos = this.stutterAnchor + this.stutterPhase;

                  // Safely read buffer wrapping smoothly
                  while(readPos < 0) readPos += this.len;
                  while(readPos >= this.len) readPos -= this.len;
                  
                  let fp = Math.floor(readPos); let frac = readPos - fp;
                  let nextFp = (fp + 1) % this.len;
                  
                  smpL = (this.bufL[fp] * (1-frac) + this.bufL[nextFp] * frac) * grainEnv;
                  smpR = (this.bufR[fp] * (1-frac) + this.bufR[nextFp] * frac) * grainEnv;

                  // WARP: Ring Modulation
                  if (w > 0.01) {
                      let rmFreq = w * 3000; 
                      this.warpPhase += (rmFreq * 2 * Math.PI) / sampleRate;
                      if (this.warpPhase > Math.PI*2) this.warpPhase -= Math.PI*2;
                      let mod = Math.sin(this.warpPhase);
                      smpL = smpL * (1-w) + (smpL * mod) * w;
                      smpR = smpR * (1-w) + (smpR * mod) * w;
                  }

                  this.playhead += speed;
                  if (this.playhead < 0) this.playhead += this.len; 
                  if (this.playhead >= this.len) this.playhead -= this.len; 

              } else {
                  // --- VOID SYNTHESIS MODE ---
                  let freq = 32.7 * Math.pow(2, p * 6);
                  this.oscPhase += (freq * 2 * Math.PI) / sampleRate;
                  if (this.oscPhase > Math.PI*2) this.oscPhase -= Math.PI*2;
                  
                  let fmAmount = w * 800;
                  this.fmPhase += (freq * 2.5 * 2 * Math.PI) / sampleRate;
                  if (this.fmPhase > Math.PI*2) this.fmPhase -= Math.PI*2;
                  let fm = Math.sin(this.fmPhase) * fmAmount;
                  
                  let phaseWithFm = this.oscPhase + (fm / sampleRate);
                  
                  let rawSmp = (phaseWithFm / Math.PI) % 2 - 1;
                  
                  if (s < 1.0) {
                      let chopFreq = 5 + (1.0 - s) * 50; 
                      let chopMod = Math.sin(this._samplesProcessed * chopFreq * 2 * Math.PI / sampleRate);
                      rawSmp *= (chopMod > 0 ? 1 : 0);
                  }
                  
                  smpL = rawSmp; smpR = rawSmp;
              }

              // VOID (Global Decimation)
              if (v < 0.95) {
                  let steps = Math.max(2, Math.floor(v * 16));
                  smpL = Math.round(smpL * steps) / steps;
                  smpR = Math.round(smpR * steps) / steps;
              }

              outL[i] = smpL; outR[i] = smpR;
              this._samplesProcessed++;
          }
          return true;
      }
  }
  registerProcessor('oramics-void', OramicsVoidEngine);
  `;

  // --- SYSTEM BOOT ---
  async function bootAudioEngine() {
      if (audioCtx) return;
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      const blob = new Blob([workletCode], { type: 'application/javascript' });
      const url = URL.createObjectURL(blob);
      await audioCtx.audioWorklet.addModule(url);
      
      workletNode = new AudioWorkletNode(audioCtx, 'oramics-void', { outputChannelCount: [2] });
      gainNode = audioCtx.createGain(); gainNode.gain.value = 0; 
      delayNode = audioCtx.createDelay(2.0); delayNode.delayTime.value = 0.33; 
      feedbackGain = audioCtx.createGain(); feedbackGain.gain.value = 0.6; 
      wetGain = audioCtx.createGain(); wetGain.gain.value = 0;

      workletNode.connect(gainNode);
      gainNode.connect(audioCtx.destination);
      
      gainNode.connect(delayNode);
      delayNode.connect(feedbackGain);
      feedbackGain.connect(delayNode);
      delayNode.connect(wetGain);
      
      wetGain.connect(audioCtx.destination);
  }

  function clamp01(v) { return Math.max(0, Math.min(1, v)); }
  function padTime(timeSecs) { 
      const m = Math.floor(timeSecs / 60);
      const s = Math.floor(timeSecs % 60).toString().padStart(2, '0');
      const ms = Math.floor((timeSecs % 1) * 10).toString();
      return `${m}:${s}.${ms}`;
  }
  function now() { return performance.now(); }

  // --- MEMORY: UNDO SYSTEM ---
  function saveUndoState() {
      const snapshot = {};
      STRIPS.forEach(s => { snapshot[s.id] = new Float32Array(buffers[s.id]); });
      state.undoStack.push(snapshot);
      if (state.undoStack.length > 20) state.undoStack.shift();
  }

  function performUndo() {
      if (state.undoStack.length === 0) {
          updateLedger("NO MORE UNDO HISTORY.");
          return;
      }
      const snapshot = state.undoStack.pop();
      STRIPS.forEach(s => {
          buffers[s.id].set(snapshot[s.id]);
          patchWorkletBuffer(s.id, 0, Array.from(buffers[s.id]));
          state.versions[s.id]++;
      });
      state.needsPaint = true;
      updateLedger("UNDO: RESTORED PREVIOUS TIMELINE.");
  }

  // --- LAYOUT ENGINE ---
  function resize() {
    try {
      const rect = canvas.parentElement.getBoundingClientRect();
      if (rect.width === 0 || rect.height === 0) return; 
      
      state.dpr = Math.max(1, Math.min(2.5, window.devicePixelRatio || 1));
      state.w = Math.max(1, Math.floor(rect.width));
      state.h = Math.max(1, Math.floor(rect.height));
      canvas.width = Math.floor(state.w * state.dpr);
      canvas.height = Math.floor(state.h * state.dpr);
      ctx.setTransform(state.dpr, 0, 0, state.dpr, 0, 0);
      
      const padY = 7, gap = 7;
      let available = state.h - (padY * 2) - (gap * (STRIPS.length - 1));
      if (available < 50) available = 50;
      
      let y = padY;
      state.lanes = STRIPS.map((strip) => {
        const laneH = Math.max(8, Math.floor(available * strip.share));
        const lane = { id: strip.id, x: 7, y: y, w: state.w - 14, h: laneH, baseline: strip.baseline };
        y += laneH + gap;
        return lane;
      });
      state.needsPaint = true;
    } catch (err) {}
  }

  function getCanvasPoint(ev) {
    const rect = canvas.getBoundingClientRect();
    return { x: ev.clientX - rect.left, y: ev.clientY - rect.top };
  }

  function getVisibleIndexAtX(x, lane) {
    const rx = state.w / 2;
    const timeDiff = (x - rx) / state.zoom;
    const timeAtIdx = state.currentTime + timeDiff;
    const idx = Math.floor(timeAtIdx * FPS);
    return Math.max(0, Math.min(bufferLength - 1, idx));
  }

  function indexToVisibleX(idx, lane) {
    const rx = state.w / 2;
    const timeAtIdx = idx / FPS;
    const timeDiff = timeAtIdx - state.currentTime;
    return rx + (timeDiff * state.zoom);
  }

  function yToValue(y, lane, stripId) {
    const padding = 2;
    const raw = 1 - ((y - (lane.y + padding)) / Math.max(1, lane.h - padding * 2));
    if (stripId === 'GATE') return clamp01(raw) > 0.48 ? 1 : 0;
    if (stripId === 'VOID') return clamp01(raw) > 0.48 ? 1 : 0;
    return clamp01(raw);
  }

  function laneFor(id) { return state.lanes.find(l => l.id === id) || state.lanes[0]; }

  // --- DATA SYNC TO WORKLET ---
  function syncWorkletBuffers() {
      if (!workletNode) return;
      workletNode.port.postMessage({
          type: 'LOAD', 
          L: decodedAudioL, R: decodedAudioR,
          T: buffers.TIME, P: buffers.PITCH, S: buffers.SHATTER, 
          W: buffers.WARP, V: buffers.VOID
      });
      isSynced = true;
  }

  function patchWorkletBuffer(stripId, startIdx, values) {
      if (!workletNode) return;
      workletNode.port.postMessage({
          type: 'PATCH', id: stripId, start: startIdx, val: values
      });
  }

  // --- AUDIO IMPORT: LOAD AND INJECT ---
  async function decomposeAudio(file) {
    updateLedger(`INJECTING AUDIO SOURCE: ${file.name.substring(0, 15).toUpperCase()}...`);
    try {
      await bootAudioEngine();
      const arrayBuffer = await file.arrayBuffer();
      
      if (state.running) document.getElementById('btnPlay').click();
      pauseTime = 0; state.currentTime = 0;

      const decodedAudioBuffer = await audioCtx.decodeAudioData(arrayBuffer);
      decodedAudioL = decodedAudioBuffer.getChannelData(0);
      decodedAudioR = decodedAudioBuffer.numberOfChannels > 1 ? decodedAudioBuffer.getChannelData(1) : decodedAudioL;

      saveUndoState();

      state.duration = decodedAudioBuffer.duration;
      bufferLength = Math.ceil(state.duration * FPS);
      
      STRIPS.forEach(s => buffers[s.id] = new Float32Array(bufferLength).fill(s.baseline));

      const raw = decodedAudioL;
      const samplesPerFrame = audioCtx.sampleRate / FPS;
      let maxRms = 0;
      for (let i = 0; i < bufferLength; i++) {
        let start = Math.floor(i * samplesPerFrame);
        let end = Math.min(raw.length, Math.floor((i + 1) * samplesPerFrame));
        let sumSq = 0, hfSumSq = 0;
        for (let j = start; j < end - 1; j++) {
            sumSq += raw[j] * raw[j];
            let diff = raw[j+1] - raw[j];
            hfSumSq += diff * diff;
        }
        let rms = Math.sqrt(sumSq / (end - start));
        if (rms > maxRms) maxRms = rms;
        buffers.VOLUME[i] = rms; 
        
        let hfRms = Math.sqrt(hfSumSq / (end - start));
        let hfRatio = rms > 0.005 ? (hfRms / rms) : 0;
        buffers.REVERB[i] = Math.max(0, Math.min(1, hfRatio * 0.4));
      }
      let smoothVol = 0;
      for(let i = 0; i < bufferLength; i++) {
        let rawVol = maxRms > 0 ? (buffers.VOLUME[i] / maxRms) : 0;
        smoothVol += (rawVol - smoothVol) * 0.3; 
        buffers.VOLUME[i] = Math.pow(smoothVol, 0.6); 
        buffers.GATE[i] = smoothVol > 0.03 ? 1 : 0;   
      }

      syncWorkletBuffers();
      state.needsPaint = true;
      updateLedger(`AUDIO INJECTED. READY FOR GRANULAR MUTILATION. (${padTime(state.duration)})`);
    } catch (e) {
      updateLedger("IMPORT FAILED.");
    }
  }

  // --- TACTILE ENGINE ---
  function updateLedger(txt) {
    ledgerTag.textContent = state.mode;
    ledgerSlip.textContent = txt;
    ledgerSlip.classList.add('engaged');
    setTimeout(() => ledgerSlip.classList.remove('engaged'), 150);
    document.getElementById('busVer').textContent = 'VER ' + String(state.versions[state.activeStrip]).padStart(3, '0');
  }

  function setMode(mode) {
    if (mode === 'UNDO') {
        performUndo();
        return;
    }
    state.mode = mode;
    ledgerTag.textContent = mode;
    document.querySelectorAll('.cmd').forEach(btn => {
      if (btn.dataset.cmd === 'UNDO' || btn.dataset.cmd === 'BOUNCE' || btn.dataset.cmd === 'WIPE' || btn.dataset.cmd === 'IMPORT' || btn.dataset.cmd === 'ARM' || btn.dataset.cmd === 'ZOOM_IN' || btn.dataset.cmd === 'ZOOM_OUT') return;
      btn.classList.remove('active');
    });
    document.querySelector(`.cmd[data-cmd="${mode}"]`)?.classList.add('active');
    
    if(mode === 'DRAW') updateLedger(`HAND WRITES INTO ${state.activeStrip}.`);
    if(mode === 'CUT') updateLedger(`SCRUB TO ERASE MASS ON ${state.activeStrip}.`);
    if(mode === 'LIFT') updateLedger(`DRAG TO COPY MASS ON ${state.activeStrip}.`);
    if(mode === 'DROP') updateLedger(state.clipboard ? `TAP TO PASTE COPIED MASS.` : `CLIPBOARD EMPTY. LIFT FIRST.`);
  }

  function applyStrokeWrites(idxA, valA, idxB, valB, stripId) {
    const buf = buffers[stripId];
    const minI = Math.max(0, Math.min(idxA, idxB));
    const maxI = Math.min(bufferLength - 1, Math.max(idxA, idxB));
    
    const patchVals = new Float32Array((maxI - minI) + 1);

    if (minI === maxI) { 
        buf[minI] = valB; 
        patchVals[0] = valB;
        patchWorkletBuffer(stripId, minI, patchVals);
        return; 
    }

    for (let i = minI; i <= maxI; i++) {
      let t = 0;
      if (idxB !== idxA) t = (i - idxA) / (idxB - idxA);
      let v = valA + (valB - valA) * t;
      buf[i] = v;
      patchVals[i - minI] = v;
    }
    patchWorkletBuffer(stripId, minI, patchVals);
  }

  function recordPen(x, y) {
    const lane = laneFor(state.activeStrip);
    const currentIdx = getVisibleIndexAtX(x, lane);
    const currentVal = state.mode === 'CUT' ? lane.baseline : yToValue(y, lane, state.activeStrip);

    if (state.pen.lastIdx !== -1) {
      applyStrokeWrites(state.pen.lastIdx, state.pen.lastVal, currentIdx, currentVal, state.activeStrip);
    }

    state.pen.lastIdx = currentIdx;
    state.pen.lastVal = currentVal;
    strokeTrail.push({x: x, y: y, t: now()});
    state.needsPaint = true;
  }

  function pointerDown(ev) {
    if (state.pen.active || state.scrub.active) return; 
    ev.preventDefault(); 
    state.pointerId = ev.pointerId;
    try { canvas.setPointerCapture(ev.pointerId); } catch(e){}
    
    const p = getCanvasPoint(ev);

    // Enter Scrubbing mode
    if (state.mode === 'SCRUB') {
        state.scrub.active = true;
        state.scrub.startX = p.x;
        state.scrub.startTime = state.currentTime;
        return;
    }

    const lane = state.lanes.find(l => p.y >= l.y && p.y <= l.y + l.h) || laneFor(state.activeStrip);
    
    if (lane.id !== state.activeStrip) {
      state.activeStrip = lane.id;
      document.getElementById('armLabel').textContent = state.activeStrip;
      updateLedger(`DIMENSION BOUND TO ${state.activeStrip}.`);
    }
    
    state.pen.active = true;
    state.pen.startX = p.x; state.pen.x = p.x; state.pen.y = p.y;
    
    const currentIdx = getVisibleIndexAtX(p.x, lane);
    state.pen.startIdx = currentIdx;
    state.pen.lastIdx = currentIdx;
    state.pen.lastVal = state.mode === 'CUT' ? lane.baseline : yToValue(p.y, lane, state.activeStrip);

    if (state.mode === 'DRAW' || state.mode === 'CUT') {
      saveUndoState();
      recordPen(p.x, p.y);
    } else if (state.mode === 'DROP') {
      if (!state.clipboard) {
        updateLedger("NO MASS HELD. LIFT FIRST.");
      } else {
        saveUndoState();
        const buf = buffers[state.activeStrip];
        const patchVals = new Float32Array(state.clipboard.length);
        let patchCount = 0;
        for (let i = 0; i < state.clipboard.length; i++) {
          if (currentIdx + i < bufferLength) {
              buf[currentIdx + i] = state.clipboard[i];
              patchVals[i] = state.clipboard[i];
              patchCount++;
          }
        }
        patchWorkletBuffer(state.activeStrip, currentIdx, patchVals.subarray(0, patchCount));
        state.versions[state.activeStrip]++;
        updateLedger(`DROPPED ${patchCount} SAMPLES.`);
      }
      state.pen.active = false; state.pointerId = null;
      try { canvas.releasePointerCapture(ev.pointerId); } catch(e){}
      state.needsPaint = true;
    }
  }

  function pointerMove(ev) {
    if (ev.pointerId !== state.pointerId) return;
    ev.preventDefault();
    const pts = (ev.getCoalescedEvents && typeof ev.getCoalescedEvents === 'function') ? ev.getCoalescedEvents() : [ev];

    for (const evPt of pts) {
      const p = getCanvasPoint(evPt);
      
      if (state.scrub.active) {
          const deltaX = p.x - state.scrub.startX;
          state.currentTime = Math.max(0, Math.min(state.duration, state.scrub.startTime - (deltaX / state.zoom)));
          state.needsPaint = true;
          busIdx.textContent = 'ELAPSED ' + padTime(state.currentTime);
          continue;
      }

      if (!state.pen.active) continue;

      state.pen.x = p.x; state.pen.y = p.y;
      if (state.mode === 'DRAW' || state.mode === 'CUT') recordPen(p.x, p.y);
    }
  }

  function pointerUp(ev) {
    if(ev.pointerId !== state.pointerId) return;
    ev.preventDefault(); 
    
    if (state.scrub.active) {
        state.scrub.active = false;
        state.pointerId = null;
        try { canvas.releasePointerCapture(ev.pointerId); } catch(e){}
        return;
    }
    
    if (state.pen.active && state.mode === 'LIFT') {
      const lane = laneFor(state.activeStrip);
      const startX = indexToVisibleX(state.pen.startIdx, lane);
      const minX = Math.max(lane.x, Math.min(startX, state.pen.x));
      const maxX = Math.min(lane.x + lane.w, Math.max(startX, state.pen.x));
      
      const idxA = getVisibleIndexAtX(minX, lane);
      const idxB = getVisibleIndexAtX(maxX, lane);
      
      let dist = idxB - idxA;
      const copied = new Float32Array(dist + 1);
      for (let i = 0; i <= dist; i++) copied[i] = buffers[state.activeStrip][idxA + i];
      
      state.clipboard = copied;
      setMode('DROP');
      updateLedger(`LIFTED ${dist} SAMPLES.`);
    } else if (state.pen.active && (state.mode === 'DRAW' || state.mode === 'CUT')) {
      state.versions[state.activeStrip]++;
      updateLedger(`MODIFICATION COMPLETE.`);
    }

    state.pen.active = false; state.pointerId = null;
    try { canvas.releasePointerCapture(ev.pointerId); } catch(e){}
    state.needsPaint = true;
  }

  function importBflix(text) {
    saveUndoState();
    try {
      buffers.PITCH.fill(BASELINES.PITCH);
      buffers.VOLUME.fill(BASELINES.VOLUME);
      buffers.REVERB.fill(BASELINES.REVERB);
      buffers.GATE.fill(BASELINES.GATE);
      
      const lines = text.split('\n');

      for (let line of lines) {
        line = line.trim();
        if (line.startsWith('PNT')) {
          const parts = line.split(/\s+/);
          if (parts.length < 5) continue;
          
          const x = parseInt(parts[1], 10);
          const y = parseInt(parts[2], 10);
          const w = parseInt(parts[3], 10);
          
          let track = null, val = 0;
          if (y >= 8 && y <= 41) { track = 'PITCH'; val = Math.max(0, Math.min(1, 1 - (y - 10) / 31)); }
          else if (y >= 42 && y <= 60) { track = 'VOLUME'; val = Math.max(0, Math.min(1, 1 - (y - 42) / 18)); }
          else if (y >= 61 && y <= 85) { track = 'REVERB'; val = Math.max(0, Math.min(1, 1 - (y - 61) / 24)); }
          else if (y >= 86) { track = 'GATE'; val = 0.0; } 
          
          if (track) {
            for (let px = x; px < x + w; px++) {
              if (px < 10 || px > 128) continue;
              const normX = (px - 10) / 118.0; 
              let timeTarget = normX * 4.8;
              let idx = Math.floor(timeTarget * FPS);
              if (idx >= 0 && idx < bufferLength) {
                 buffers[track][idx] = val;
              }
            }
          }
        }
      }
      STRIP_ORDER.forEach(id => {
          patchWorkletBuffer(id, 0, Array.from(buffers[id]));
          state.versions[id]++;
      });
      state.needsPaint = true;
      updateLedger("BFLIX SCRIPT APPLIED TO TIMELINE.");
    } catch (err) {
      updateLedger("IMPORT ERROR: " + err.message);
    }
  }

  // --- UI COMMAND BINDINGS & AUDIO PLAYBACK ---
  document.getElementById('btnPlay').addEventListener('click', async (ev) => {
    ev.preventDefault();
    try {
      await bootAudioEngine();
      if (audioCtx.state === 'suspended') await audioCtx.resume();

      if (state.running) {
        // PAUSE
        pauseTime = state.currentTime;
        workletNode.port.postMessage({ type: 'RUN', run: false });
        state.running = false;
        state.lastScheduled = { VOLUME: -1, GATE: -1, REVERB: -1 };
        ev.target.textContent = "► PLAY";
        ev.target.classList.remove('on');
        updateLedger("PLAYBACK HALTED.");

        // Stop Recording if armed
        if (state.isRecording && state.mediaRecorder && state.mediaRecorder.state !== 'inactive') {
            state.mediaRecorder.stop();
            updateLedger("RECORDING SAVED TO DISK.");
            state.isRecording = false;
            document.getElementById('btnBounce').classList.remove('recording');
            if (mediaDestNode) {
                try { gainNode.disconnect(mediaDestNode); } catch(e){}
                try { wetGain.disconnect(mediaDestNode); } catch(e){}
            }
        }
      } else {
        // PLAY
        if (!isSynced) syncWorkletBuffers();
        
        startTime = performance.now() / 1000 - pauseTime;
        
        workletNode.port.postMessage({ type: 'RUN', run: true, reset: true, startTime: pauseTime });

        if (state.isRecording) {
            if (!mediaDestNode) mediaDestNode = audioCtx.createMediaStreamDestination();
            try { gainNode.connect(mediaDestNode); } catch(e){}
            try { wetGain.connect(mediaDestNode); } catch(e){}

            state.audioChunks = [];
            state.mediaRecorder = new MediaRecorder(mediaDestNode.stream);
            state.mediaRecorder.ondataavailable = e => { if (e.data.size > 0) state.audioChunks.push(e.data); };
            state.mediaRecorder.onstop = () => {
                const blob = new Blob(state.audioChunks, { type: 'audio/webm' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url; a.download = `oramics_bounce_${Date.now()}.webm`;
                a.click();
            };
            state.mediaRecorder.start();
            updateLedger("RECORDING LIVE TO TAPE...");
        } else {
            if (decodedAudioL.length === 0) {
                updateLedger("INFINITE SYNTHESIS ACTIVE (NO AUDIO INJECTED).");
            } else {
                updateLedger("GRANULAR ENGINE ENGAGED.");
            }
        }

        state.running = true;
        ev.target.textContent = "■ STOP";
        ev.target.classList.add('on');
      }
    } catch (err) {
      updateLedger(`AUDIO ERROR: ${err.message}`);
    }
  });

  document.querySelectorAll('.cmd').forEach(btn => {
    btn.addEventListener('pointerdown', ev => {
      ev.preventDefault();
      const cmd = btn.dataset.cmd;
      if (['DRAW', 'CUT', 'LIFT', 'DROP', 'SCRUB', 'UNDO'].includes(cmd)) {
        setMode(cmd);
      } else if (cmd === 'ARM') {
        state.activeStrip = STRIP_ORDER[(STRIP_ORDER.indexOf(state.activeStrip) + 1) % STRIP_ORDER.length];
        document.getElementById('armLabel').textContent = state.activeStrip;
        updateLedger(`ARMED: ${state.activeStrip}`);
        state.needsPaint = true;
      } else if (cmd === 'ZOOM_IN') {
        state.zoom = Math.min(1000, state.zoom * 1.5);
        state.needsPaint = true;
        updateLedger(`MAGNIFICATION INCREASED.`);
      } else if (cmd === 'ZOOM_OUT') {
        state.zoom = Math.max(10, state.zoom / 1.5);
        state.needsPaint = true;
        updateLedger(`MAGNIFICATION DECREASED.`);
      } else if (cmd === 'BOUNCE') {
        state.isRecording = !state.isRecording;
        btn.classList.toggle('recording', state.isRecording);
        updateLedger(state.isRecording ? `REC ARMED: HIT PLAY TO CAPTURE AUDIO.` : `REC DISARMED.`);
      } else if (cmd === 'WIPE') {
        saveUndoState();
        const bl = STRIPS.find(s=>s.id===state.activeStrip).baseline;
        buffers[state.activeStrip].fill(bl);
        patchWorkletBuffer(state.activeStrip, 0, Array.from(buffers[state.activeStrip]));
        state.versions[state.activeStrip]++;
        updateLedger(`${state.activeStrip} WIPED TO BASELINE.`);
        state.needsPaint = true;
      } else if (cmd === 'IMPORT') {
        document.getElementById('fileImport').click();
      }
    });
  });

  document.getElementById('fileImport').addEventListener('change', async (ev) => {
    const file = ev.target.files[0];
    if (!file) return;
    const isAudio = file.type.startsWith('audio') || file.name.match(/\.(mp3|wav|ogg|m4a|flac)$/i);
    if (isAudio) {
        await decomposeAudio(file);
    } else {
        const reader = new FileReader();
        reader.onload = (e) => importBflix(e.target.result);
        reader.readAsText(file);
    }
    ev.target.value = ''; 
  });

  // --- CORE RENDER PIPELINE & MAIN THREAD AUTOMATION ---
  function draw() {
    const t = now(); 
    if (!lastFrameTime) lastFrameTime = t;
    lastFrameTime = t;
    
    if (state.running) {
        state.currentTime = (performance.now() / 1000) - startTime;
        
        // --- INFINITE LOOP MANAGER ---
        if (state.currentTime >= state.duration) {
            state.currentTime = state.currentTime % state.duration;
            startTime = (performance.now() / 1000) - state.currentTime;
        }

        if (state.pen.active && (state.mode === 'DRAW' || state.mode === 'CUT')) {
            recordPen(state.pen.x, state.pen.y);
        }
    }

    busIdx.textContent = 'ELAPSED ' + padTime(state.currentTime);

    // Main Thread Web Audio Automation (Volume, Gate, Reverb)
    if (state.running && gainNode && wetGain) {
        let idx = Math.floor(state.currentTime * FPS);
        if (idx < bufferLength) {
            let v = buffers.VOLUME[idx];
            let g = buffers.GATE[idx] > 0.48 ? 1 : 0;
            let r = buffers.REVERB[idx];
            const syncTime = audioCtx.currentTime + 0.03; 

            if (v !== state.lastScheduled.VOLUME || g !== state.lastScheduled.GATE) {
                let targetGain = (v * v) * g; 
                gainNode.gain.cancelScheduledValues(audioCtx.currentTime);
                gainNode.gain.setValueAtTime(gainNode.gain.value, audioCtx.currentTime);
                gainNode.gain.setTargetAtTime(targetGain, syncTime, 0.015);
                state.lastScheduled.VOLUME = v;
                state.lastScheduled.GATE = g;
            }
            if (r !== state.lastScheduled.REVERB) {
                wetGain.gain.cancelScheduledValues(audioCtx.currentTime);
                wetGain.gain.setValueAtTime(wetGain.gain.value, audioCtx.currentTime);
                wetGain.gain.setTargetAtTime(r * 0.8, syncTime, 0.02); 
                state.lastScheduled.REVERB = r;
            }
        }
    }

    if (!state.needsPaint && !state.running && strokeTrail.length === 0 && !state.pen.active) {
      raf = requestAnimationFrame(draw); return;
    }
    state.needsPaint = false;

    ctx.fillStyle = '#fff'; ctx.fillRect(0,0,state.w,state.h);
    ctx.strokeStyle = '#000'; ctx.lineWidth = 2; ctx.strokeRect(1,1,state.w-2,state.h-2);
    
    for(const lane of state.lanes){
      if (!lane) continue;
      const active = lane.id === state.activeStrip;
      ctx.strokeStyle = '#000'; ctx.lineWidth = active ? 3 : 2;
      ctx.strokeRect(lane.x, lane.y, lane.w, lane.h);
      
      ctx.fillStyle = '#000';
      const dx = Math.max(10, Math.floor(lane.w / 28)), dy = Math.max(10, Math.floor(lane.h / 7));
      const gridOffset = (state.currentTime * state.zoom) % dx;
      for(let y = lane.y+8; y < lane.y+lane.h-4; y+=dy){
        for(let x = lane.x+8-gridOffset; x < lane.x+lane.w-4; x+=dx){
          ctx.fillRect(Math.round(x), Math.round(y), 2, 2);
        }
      }

      if (lane.id !== 'VOID' && lane.id !== 'GATE') {
        ctx.beginPath();
        const arr = buffers[lane.id];
        if (arr) {
          let started = false;
          const padH = 2;
          for(let x=0; x<=Math.floor(lane.w); x+=2){
            const vx = lane.x + x;
            const idx = getVisibleIndexAtX(vx, lane); 
            let val = arr[idx];
            if (isNaN(val)) val = lane.baseline;
            const y = lane.y + padH + (1 - val) * (lane.h - padH * 2);
            if(!started) { ctx.moveTo(vx, y); started = true; } 
            else { ctx.lineTo(vx, y); }
          }
          ctx.lineWidth = active ? 4 : 2; ctx.lineJoin = 'round'; ctx.stroke();
        }
      } else {
        ctx.fillStyle = '#000';
        const arr = buffers[lane.id];
        if (arr) {
          for(let c=0; c<72; c++){
            const x = lane.x + (c/72)*lane.w;
            const idx = getVisibleIndexAtX(x, lane);
            if(arr[idx] < 0.5) ctx.fillRect(Math.floor(x), lane.y+2, Math.ceil(lane.w/72)+1, lane.h-4);
          }
        }
      }

      if (state.mode === 'LIFT' && state.pen.active && active) {
        const startX = indexToVisibleX(state.pen.startIdx, lane);
        const minX = Math.max(lane.x, Math.min(startX, state.pen.x));
        const maxX = Math.min(lane.x + lane.w, Math.max(startX, state.pen.x));
        ctx.fillStyle = 'rgba(0,0,0,0.15)';
        ctx.fillRect(minX, lane.y, Math.max(1, maxX - minX), lane.h);
        ctx.strokeStyle = '#000'; ctx.lineWidth = 1; ctx.setLineDash([4, 4]);
        ctx.strokeRect(minX, lane.y, Math.max(1, maxX - minX), lane.h);
        ctx.setLineDash([]);
      }

      let labelH = Math.min(22, lane.h);
      let lw = Math.min(118, Math.max(64, lane.w*.28));
      ctx.fillStyle = active ? '#000' : '#fff'; ctx.fillRect(lane.x, lane.y, lw, labelH);
      ctx.strokeStyle = '#000'; ctx.lineWidth = 1; ctx.strokeRect(lane.x, lane.y, lw, labelH);
      ctx.fillStyle = active ? '#fff' : '#000'; ctx.font = '900 11px ui-monospace, monospace';
      ctx.textBaseline = 'middle'; ctx.fillText(lane.id, lane.x+6, lane.y + labelH/2);
    }

    const rx = Math.floor(state.w / 2) + .5;
    ctx.strokeStyle = '#000'; ctx.lineWidth = 4;
    ctx.beginPath(); ctx.moveTo(rx, 0); ctx.lineTo(rx, state.h); ctx.stroke();

    while(strokeTrail.length && t - strokeTrail[0].t > 400) strokeTrail.shift();
    ctx.fillStyle = '#000';
    for(const p of strokeTrail){
      const age = t - p.t;
      const size = age < 100 ? 10 : age < 200 ? 6 : 3;
      ctx.fillRect(p.x - size/2, p.y - size/2, size, size);
    }
    
    raf = requestAnimationFrame(draw);
  }

  canvas.addEventListener('pointerdown', pointerDown, { passive:false });
  canvas.addEventListener('pointermove', pointerMove, { passive:false });
  window.addEventListener('pointerup', pointerUp, { passive:false });
  window.addEventListener('pointercancel', pointerUp, { passive:false });

  document.addEventListener('touchmove', e => { if (e.target.tagName !== 'TEXTAREA') e.preventDefault(); }, { passive:false });
  document.addEventListener('gesturestart', e => e.preventDefault());
  window.addEventListener('resize', resize);
  
  setTimeout(() => { resize(); raf = requestAnimationFrame(draw); }, 50);
})();
</script>
</body>
</html>
