<!DOCTYPE html>

  <!-- Tailwind Config -->
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            teal: '#0E6B66',
            amber: '#E3A21A',
            red: '#B23A2E',
            black: '#111111',
            parchment: '#F5F1E6',

            sans: ['Inter', 'system-ui', 'sans-serif'],

  <style>
    /* Base Styles */
    body { background-color: #18181b; color: #111111; overscroll-behavior-y: none; }
    .perspective-1000 { perspective: 1000px; }
    .transform-style-3d { transform-style: preserve-3d; }
    .backface-hidden { backface-visibility: hidden; }
    .rotate-y-180 { transform: rotateY(180deg); }
    .no-scrollbar::-webkit-scrollbar { display: none; }
    .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

    /* Noise Texture */
    .bg-noise {
      background-image: url("data:image/svg+xml,%3Csvg width='100' height='100' viewBox='0 0 100 100' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100' height='100' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    }

    /* Print Styles */
    @media print {
      body { background-color: white !important; padding: 0 !important; margin: 0 !important; }
      #app-container { display: none !important; } /* Hide the mobile simulator */
      #print-container { display: block !important; width: 100%; }
      
      .print-page {
        width: 210mm;
        height: 297mm;
        padding: 10mm;
        margin: 0 auto;
        page-break-after: always;
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        grid-template-rows: repeat(4, 1fr);
        gap: 10mm;
        box-sizing: border-box;
      }
      
      .print-card {
        border: 3px solid #111;
        border-radius: 12px;
        padding: 15px;
        display: flex;
        flex-direction: column;
        justify-content: space-between;
        background-color: #F5F1E6;
        break-inside: avoid;
        position: relative;
      }

      .print-card-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 10px; }
      .print-card-type { font-size: 10px; font-family: 'Space Mono', monospace; font-weight: bold; text-transform: uppercase; letter-spacing: 1px; }
      .print-card-id { font-size: 10px; font-family: 'Space Mono', monospace; opacity: 0.5; }
      .print-card-title { font-size: 20px; font-family: 'Playfair Display', serif; font-weight: 900; text-transform: uppercase; line-height: 1.1; text-align: center; margin: auto 0; }
      .print-card-desc { font-size: 12px; font-family: 'Inter', sans-serif; text-align: center; border-top: 2px solid #ddd; padding-top: 10px; opacity: 0.8; }
    }
    
    @media screen {
      #print-container { display: none !important; }
    }
  </style>
</head>

    };

    // --- SYSTEM LOGIC ---
    const app = {
      view: 'onboarding',
      savedPitches: JSON.parse(localStorage.getItem('sankofa_archive')) || [],
      isFastMode: false,
      isMenuOpen: false,
      round: 1,
      cardsFlipped: [false, false, false, false],
      currentDeck: { problem: null, practice: null, func: null, artifact: null },
      currentPitch: null,
      archiveTab: 'ALL',
      searchQuery: '',
      isEditing: false,
      isPlaying: false,
      audioProgress: 0,
      utterance: null,
      
      // New state for prompt previewing
      previewPrompt: null, 

      init() {
        this.render();
      },
      navigate(newView) {
        if(this.view === 'result' && newView !== 'result') this.handleStopSpeak();
        this.view = newView;
        this.isMenuOpen = false;
        this.searchQuery = '';
        this.isEditing = false;
        this.previewPrompt = null;
        this.render();
      },

      getRandomItem(arr) { return arr[Math.floor(Math.random() * arr.length)]; },
      getRandomTags(count = 3) {
        const shuffled = [...DATABASE.tags].sort(() => 0.5 - Math.random());
        return shuffled.slice(0, count);
      },
      generateNewDeck() {
        return {
          problem: this.getRandomItem(DATABASE.problems),
          practice: this.getRandomItem(DATABASE.practices),
          func: this.getRandomItem(DATABASE.functions),
          artifact: this.getRandomItem(DATABASE.artifacts)
        };
      },

      startNewRound() {
        this.currentDeck = this.generateNewDeck();
        this.cardsFlipped = this.isFastMode ? [true, true, true, true] : [false, false, false, false];
        this.round += 1;
        this.navigate('play');
      },
      toggleFastMode() {
        this.isFastMode = !this.isFastMode;
        this.render();
      },
      toggleMenu() {
        this.isMenuOpen = !this.isMenuOpen;
        this.renderMenu();
      },
      clearArchive() {
        if (confirm("Are you sure you want to clear your archive? This cannot be undone.")) {
          this.savedPitches = [];
          localStorage.removeItem('sankofa_archive');
          this.render();
        }
      },
      handleCardClick(index, category) {
        if (!this.cardsFlipped[index]) {
          this.cardsFlipped[index] = true;
          this.renderPlayCards();
          this.renderPlayActions();
        } else {
          this.cardsFlipped[index] = false;
          this.renderPlayCards();
          this.renderPlayActions();
          setTimeout(() => {
            this.currentDeck[category] = this.getRandomItem(DATABASE[category === 'func' ? 'functions' : category + 's']);
            setTimeout(() => {
              this.cardsFlipped[index] = true;
              this.renderPlayCards();
              this.renderPlayActions();
            }, 100);
          }, 300);
        }
      },
      shuffleDeck() {
        this.cardsFlipped = [false, false, false, false];
        this.renderPlayCards();
        this.renderPlayActions();
        setTimeout(() => {
          this.currentDeck = this.generateNewDeck();
          if (this.isFastMode) {
            setTimeout(() => {
              this.cardsFlipped = [true, true, true, true];
              this.renderPlayCards();
              this.renderPlayActions();
            }, 100);
          } else {
            this.renderPlayCards();
          }
        }, 300);
      },
      
      generatePitch() {
        const p = this.currentDeck;
        const summary = `A ${p.artifact.title.toLowerCase()} that revives the tradition of the ${p.practice.title.toLowerCase()} to cut through ${p.problem.title.toLowerCase()}. It restores ${p.func.title.toLowerCase()} so communities can rebuild trust and resilience.`;
        const prefixes = ["The", "Project", "Operation", "Community", "Local", "Shadow", "Rogue", "Neo", "Quantum"];
        const title = `${prefixes[Math.floor(Math.random() * prefixes.length)]} ${p.artifact.title.split(' ')[0]} ${p.artifact.title.split(' ')[1] || 'System'}`;
        
        const whyMatters = `Because ${p.problem.title.toLowerCase()} is eroding our social fabric. By focusing on ${p.func.title.toLowerCase()}, we shift from a model of extraction to a model of deeply rooted connection, making heritage usable and future-ready.`;
        
        this.currentPitch = {
          id: Date.now().toString(),
          title, summary, whyMatters, 
          tags: this.getRandomTags(),
          date: new Date().toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' }),
          rating: 0,
          elements: p
        };
        this.navigate('result');
      },
      
      savePitch(pitchToSave = this.currentPitch) {
        if (!this.savedPitches.find(p => p.id === pitchToSave.id)) {
          this.savedPitches = [pitchToSave, ...this.savedPitches];
        } else {
          this.savedPitches = this.savedPitches.map(p => p.id === pitchToSave.id ? pitchToSave : p);
        }
        localStorage.setItem('sankofa_archive', JSON.stringify(this.savedPitches));
      },
      ratePitch(id, rating) {
        this.savedPitches = this.savedPitches.map(p => p.id === id ? { ...p, rating } : p);
        if (this.currentPitch && this.currentPitch.id === id) {
          this.currentPitch.rating = rating;
        }
        localStorage.setItem('sankofa_archive', JSON.stringify(this.savedPitches));
        if(this.view === 'detail') this.render();
      },
      deletePitch(id) {
        if(confirm("Delete this pitch?")) {
          this.savedPitches = this.savedPitches.filter(p => p.id !== id);
          localStorage.setItem('sankofa_archive', JSON.stringify(this.savedPitches));
          this.navigate('archive');
        }
      },
      copyToClipboard(text) {
        const textArea = document.createElement("textarea");
        textArea.value = text;
        textArea.style.position = "fixed";
        textArea.style.top = "0";
        textArea.style.left = "0";
        document.body.appendChild(textArea);
        textArea.focus();
        textArea.select();
        try { document.execCommand('copy'); alert('Copied to clipboard!'); } catch (err) { console.error('Copy failed'); }
        document.body.removeChild(textArea);
      },
      
      // DESIGN FICTION & ARTIFACT PROMPT GENERATORS
      getPromptText(type) {
        if (!this.currentPitch) return "";
        
        const p = this.currentPitch.elements;
        const art = this.currentPitch.title;

        // Force injection of the exact drawn elements at the top of every generated prompt
        const header = `[ SANKOFA EXCAVATION ELEMENTS ]\n` +
                       `• Artifact Title: ${art}\n` +
                       `• Target Problem: ${p.problem.title} (${p.problem.desc})\n` +
                       `• Ancestral Practice: ${p.practice.title} (${p.practice.desc})\n` +
                       `• Restored Function: ${p.func.title} (${p.func.desc})\n` +
                       `• Artifact Base Form: ${p.artifact.title} (${p.artifact.desc})\n` +
                       `--------------------------------------------------\n\n`;

        let prompt = "";

        switch(type) {
          case 'build':
            prompt = `Prompt Operator: SINGLE-FILE APP GENERATOR\n\nCreate a fully functional, self-contained single-file HTML/CSS/JS web application for "${art}".\n\nSTRICT EXECUTION REQUIREMENTS:\n1. DO NOT use React, Angular, Vue, or any build tools.\n2. The entire application must be contained within ONE single 'index.html' file.\n3. Use vanilla JavaScript and Tailwind CSS (via CDN) for styling.\n4. Use Lucide Icons (via CDN).\n5. Use a Mobile-first, immersive, vintage blueprint aesthetic (Teal, Amber, Stamp Red, Ink Black, Parchment).\n\nCONTEXT & LOGIC:\nBuild the core MVP interface for this artifact. It must directly facilitate [${p.func.title}], functioning as a digital/modern [${p.practice.title}] to solve the crisis of [${p.problem.title}]. Include functional mock data, interactive UI elements, and a clear onboarding state.\n\nOUTPUT:\nProvide ONLY the complete, runnable HTML code.`;
            break;
          case 'image':
            prompt = `Prompt Operator: PRODUCT PHOTOGRAPHY GENERATION\n\nGenerate a high-end, photorealistic product shot of the "${art}".\n\nCONTEXT:\nIt is a physical/digital artifact designed to solve the problem of [${p.problem.title}] by functioning like a modern-day [${p.practice.title}].\n\nSTYLE & EXECUTION:\nCommercial product photography, 8k resolution, cinematic studio lighting (key light, rim light), shallow depth of field (85mm lens). Modern industrial design with premium, warm, textured Afro-futurist accents (subtle teal, amber, and stamp red details, matte black finishes). The artifact must look tangible, sophisticated, heavily used, and ready for market. Show it in active use in a realistic, mundane setting (e.g., resting on a cluttered desk, mounted on a brick wall).`;
            break;
          case 'diegetic':
            prompt = `Prompt Operator: DIEGETIC PROMPT (Film Idiom)\n\nGenerate a cinematic screenplay snippet and set design notes for a "${art}".\n\nAXIOM: The future cannot be theorized; it must be rendered as a physical artifact within a scene. The technology must visibly conflict with human behavior.\n\nSCENARIO: Describe the physical looking and functioning of the object in a specific, mundane scene solving the problem of [${p.problem.title}] via the methodology of a [${p.practice.title}]. Focus entirely on the human friction.\n\nOUTPUT FORMAT:\n1. Scene Heading (Slugline)\n2. 1 Paragraph of Action/Description focusing on the physical sound, weight, and wear-and-tear of the artifact.\n3. A short dialogue exchange demonstrating how ordinary people interact with the restored function of [${p.func.title}].`;
            break;
          case 'repair':
            prompt = `Prompt Operator: REPAIR MANUAL (Shadow Infrastructure Idiom)\n\nGenerate a grease-stained, iFixit-style repair manual excerpt for a "${art}".\n\nAXIOM: Entropy is the baseline condition. The reality of this speculative object is authenticated exclusively by its capacity to break.\n\nSCENARIO: The artifact is meant to ensure [${p.func.title}], but the central mechanism (inspired by a [${p.practice.title}]) has failed or degraded due to the systemic problem of [${p.problem.title}].\n\nOUTPUT FORMAT:\n1. Error Code / Symptom Description.\n2. Diagnostic Log (Why it failed).\n3. Supply Chain Failure Note (Why you can't just buy a replacement part).\n4. Rogue Local Hack (How to fix it using household items, voiding the warranty in the process).`;
            break;
          case 'qsg':
            prompt = `Prompt Operator: QUICK START GUIDE (Sterile Protocol Idiom)\n\nCreate a banal, sterile Quick Start Guide for the "${art}".\n\nAXIOM: The complexity of a hypothetical system is anchored by the banality of its onboarding.\n\nSCENARIO: The artifact acts as a modern [${p.practice.title}] to fix the problem of [${p.problem.title}].\n\nOUTPUT FORMAT:\n1. "What's in the Box" list.\n2. Steps 1-3 for initial setup and connection.\n3. LED Indicator Status Meanings (include one alarming warning light).\n4. Anticipate and codify 2 mundane human failures.\n5. A harsh Corporate Liability Shield / Warning label.`;
            break;
          case 'catalog':
            prompt = `Prompt Operator: PRODUCT CATALOG (Hyper-Commodity Idiom)\n\nCreate a SkyMall/IKEA style discount retail catalog entry for the "${art}".\n\nAXIOM: The terminal velocity of all innovation is hyper-commodification. The future is authenticated by its exact economic equivalence to a cheap flashlight.\n\nSCENARIO: It is being sold cheap to solve [${p.problem.title}] by restoring [${p.func.title}].\n\nOUTPUT FORMAT:\n1. The Glossy Marketing Pitch (exaggerated, bold claims).\n2. Grey Market Price & SKU.\n3. Cheap Material Specs (plastic, fake wood, etc).\n4. A cynical, 3-star "Customer Review" from someone who misunderstood the product.`;
            break;
          case 'octavia':
            prompt = `Prompt Operator: OCTAVIA STRUCTURAL PRESSURE SIMULATOR\n\nRun the 7-step Octavia Systemic Loop on the concept of a "${art}".\n\nEXECUTION: Process the combination of [${p.problem.title}] and [${p.practice.title}].\n\n1. Locate the exact Systemic Pressure.\n2. Insert an Irreversible Constraint (money, physics, or time).\n3. Map the dependency chain.\n4. Calculate the devastating Exit Cost for the user.\n5. Force Adaptation: Explain how [${p.practice.title}] provides a messy, imperfect survival mechanism.\n6. Track 2nd-Order Effects: How does restoring [${p.func.title}] actually backfire?\n7. Deny Catharsis: Conclude with a brutal, unsentimental reality. No chosen ones. No clean villains.`;
            break;
          case 'ripple':
            prompt = `Prompt Operator: RIPPLE ARCHITECT ORCHESTRATION\n\nGenerate a 4-layer recursive consequence model for the "${art}".\n\nPREMISE: A system built to restore [${p.func.title}] using the logic of a [${p.practice.title}].\n\nEXECUTE THE 4 LAYERS:\n1. Biological/Physical Ripple (immediate physical consequence).\n2. Infrastructure Ripple (how the city/network bends to accommodate it).\n3. Sociopolitical Ripple (how power structures try to outlaw or monetize it).\n4. Psychological Ripple (how the original problem of [${p.problem.title}] mutates into a new, stranger neurosis).\n\nOUTPUT: Conclude by extracting the ultimate "Friction Point" where systemic power crushes the individual. Write the final paragraph using a "panicky cacophony" sensory filter.`;
            break;
        }

        return header + prompt;
      },

      // TTS
      toggleTTS() {
        if (this.isPlaying) this.handleStopSpeak();
        else if (this.currentPitch) this.handleSpeak(this.currentPitch.summary);
      },
      handleSpeak(text) {
        if ('speechSynthesis' in window) {
          window.speechSynthesis.cancel();
          this.utterance = new SpeechSynthesisUtterance(text);
          this.utterance.onboundary = (e) => {
            if (e.name === 'word') this.updateAudioProgress((e.charIndex / text.length) * 100);
          };
          this.utterance.onend = () => {
            this.isPlaying = false;
            this.updateAudioProgress(100);
            setTimeout(() => this.updateAudioProgress(0), 1000);
            this.renderTTSControls();
          };
          this.utterance.onerror = () => {
            this.isPlaying = false;
            this.updateAudioProgress(0);
            this.renderTTSControls();
          };
          this.isPlaying = true;
          this.updateAudioProgress(0);
          this.renderTTSControls();
          window.speechSynthesis.speak(this.utterance);
        }
      },
      handleStopSpeak() {
        if ('speechSynthesis' in window) {
          window.speechSynthesis.cancel();
          this.isPlaying = false;
          this.updateAudioProgress(0);
          if(this.view === 'result') this.renderTTSControls();
        }
      },
      updateAudioProgress(percent) {
        this.audioProgress = percent;
        const bar = document.getElementById('audio-progress-bar');
        if (bar) bar.style.width = `${percent}%`;
      },

      // Search & Print
      setArchiveTab(tab) { this.archiveTab = tab; this.renderArchiveList(); },
      handleSearch(e) { this.searchQuery = e.target.value; this.renderArchiveList(); },
      clearSearch() { this.searchQuery = ''; document.getElementById('archive-search-input').value = ''; this.renderArchiveList(); },
      
      printDeck() {
        const pContainer = document.getElementById('print-container');
        let html = '';
        
        const renderPrintCard = (category, item, color) => `
          <div class="print-card" style="border-color: ${color}">
            <div class="print-card-header">
              <span class="print-card-type" style="color: ${color}">${category}</span>
              <span class="print-card-id">${item.id.toUpperCase()}</span>
            </div>
            <h3 class="print-card-title">${item.title}</h3>
            <p class="print-card-desc">${item.desc}</p>
          </div>
        `;

        const renderPage = (cards) => `
          <div class="print-page">
            ${cards.join('')}
          </div>
        `;

        let allPrintCards = [];
        DATABASE.problems.forEach(i => allPrintCards.push(renderPrintCard('Problem', i, '#B23A2E')));
        DATABASE.practices.forEach(i => allPrintCards.push(renderPrintCard('Practice', i, '#E3A21A')));
        DATABASE.functions.forEach(i => allPrintCards.push(renderPrintCard('Function', i, '#0E6B66')));
        DATABASE.artifacts.forEach(i => allPrintCards.push(renderPrintCard('Artifact', i, '#111111')));

        // Chunk into 8 cards per page (A4 grid)
        for (let i = 0; i < allPrintCards.length; i += 8) {
          html += renderPage(allPrintCards.slice(i, i + 8));
        }

        pContainer.innerHTML = html;
        window.print();
      },

              <div id="play-actions-container" class="mt-auto flex flex-col gap-3 shrink-0">${this.htmlPlayActions()}</div>
            </div>
          </div>
        `;
      },
      htmlPlayCards() {
        return `
          ${this.flipCardHTML("Present Problem", "zap", "#B23A2E", "#F5F1E6", this.currentDeck.problem, this.cardsFlipped[0], 0, 'problem')}
          ${this.flipCardHTML("Forgotten Practice", "refresh-cw", "#E3A21A", "#F5F1E6", this.currentDeck.practice, this.cardsFlipped[1], 1, 'practice')}
          ${this.flipCardHTML("Function To Recover", "target", "#0E6B66", "#F5F1E6", this.currentDeck.func, this.cardsFlipped[2], 2, 'func')}
          ${this.flipCardHTML("Artifact Direction", "box", "#111111", "#F5F1E6", this.currentDeck.artifact, this.cardsFlipped[3], 3, 'artifact')}
        `;
      },
      htmlPlayActions() {
        const allFlipped = this.cardsFlipped.every(Boolean);
        return `
          <button onclick="${allFlipped ? 'app.generatePitch()' : ''}" class="w-full py-4 rounded-xl text-lg font-black uppercase tracking-widest font-mono flex items-center justify-center transition-all border-[3px] border-black bg-[#F5F1E6] text-black ${allFlipped ? 'shadow-[0_6px_0_rgb(17,17,17)] active:translate-y-[2px] active:shadow-[0_4px_0_rgb(17,17,17)] opacity-100' : 'opacity-50 grayscale'}" ${allFlipped ? '' : 'disabled'}>
             Synthesize <i data-lucide="chevron-right" class="w-5 h-5 ml-2"></i>
          </button>
          <button onclick="app.shuffleDeck()" class="w-full py-3 rounded-xl text-xs font-bold uppercase tracking-widest font-mono flex items-center justify-center transition-transform active:scale-95 border-[2px] border-dashed border-black/30 text-black/60 hover:bg-black/5">
            <i data-lucide="rotate-ccw" class="w-3.5 h-3.5 mr-2"></i> ${allFlipped ? 'Flush & Reset' : 'Shuffle Deck'}
          </button>
        `;
      },

      htmlResult() {
        const p = this.currentPitch;
        if(!p) return '';
        return `
          <div class="flex flex-col h-full bg-[#F5F1E6]">
            <div class="flex justify-between items-center p-4 border-b-[3px] border-black bg-white shrink-0">
              <button onclick="app.navigate('play')" class="flex items-center text-xs font-black uppercase tracking-widest font-mono hover:text-[#E3A21A] transition-colors">
                <i data-lucide="chevron-left" class="w-4 h-4 mr-1"></i> Back
              </button>
              <button onclick="app.savePitch(); app.navigate('detail');" class="flex items-center text-xs font-black uppercase tracking-widest font-mono hover:text-[#0E6B66] transition-colors">
                Forge Idioms <i data-lucide="hammer" class="w-3.5 h-3.5 ml-1"></i>
              </button>
            </div>
            <div class="flex-1 overflow-y-auto p-5 pb-24">
              <div class="text-center mb-6">
                <div class="flex items-center justify-center gap-4 mb-4 opacity-50">
                   <span class="h-[2px] w-8 bg-black"></span>
                   <span class="text-[10px] font-black uppercase tracking-widest font-mono">Diegetic Extraction</span>
                   <span class="h-[2px] w-8 bg-black"></span>
                </div>
                <h1 class="text-4xl font-black uppercase leading-[0.9] mb-4 font-serif text-black">${p.title}</h1>
                <p class="text-sm font-bold uppercase tracking-widest leading-relaxed opacity-80 max-w-[90%] mx-auto font-mono">
                  A ${p.elements.artifact.title.toLowerCase()} that turns ${p.elements.problem.title.toLowerCase()} into ${p.elements.func.title.toLowerCase()}.
                </p>
              </div>
              <div class="border-[3px] border-black rounded-xl bg-white mb-6 relative shadow-[4px_4px_0_rgb(17,17,17)]">
                 <div class="absolute -top-3 left-4 bg-white px-2 text-[10px] font-black uppercase tracking-widest border-[3px] border-black font-mono">
                    System Narrative
                 </div>
                 <div class="p-4 pt-6 text-sm font-medium leading-relaxed font-serif text-gray-800">
                    ${p.summary}
                 </div>
                 <div id="tts-controls-container">${this.htmlTTSControls()}</div>
              </div>
              
              <button onclick="app.savePitch(); app.navigate('detail');" class="w-full py-4 border-[3px] border-black bg-black text-[#F5F1E6] rounded-xl font-black uppercase font-mono shadow-[0_4px_0_rgb(227,162,26)] active:translate-y-[2px] active:shadow-none transition-all flex items-center justify-center">
                 Open Design Fiction Forge <i data-lucide="chevron-right" class="w-5 h-5 ml-2"></i>
              </button>
            </div>
          </div>
        `;
      },
      htmlTTSControls() {
         return `
           <div class="bg-zinc-100 border-t-[3px] border-black p-3 flex flex-col gap-2 rounded-b-lg">
              <div class="flex items-center gap-2">
                 <div class="text-[10px] font-mono font-bold w-6 text-right opacity-50">T</div>
                 <div class="flex-1 h-2 bg-black/10 rounded-full overflow-hidden relative">
                    <div id="audio-progress-bar" class="absolute top-0 left-0 h-full bg-[#E3A21A] transition-all duration-75 ease-linear" style="width: ${this.audioProgress}%"></div>
                 </div>
                 <div class="text-[10px] font-mono font-bold w-6 text-left opacity-50">T</div>
              </div>
              <div class="flex justify-between gap-2 mt-1">
                <button onclick="app.toggleTTS()" class="flex-1 py-2 rounded border-2 border-black flex items-center justify-center text-xs font-black uppercase font-mono active:translate-y-1 transition-transform ${this.isPlaying ? 'bg-[#B23A2E]' : 'bg-[#0E6B66]'} text-[#F5F1E6]">
                  <i data-lucide="${this.isPlaying ? 'square' : 'play'}" class="w-3.5 h-3.5 mr-2 fill-current"></i>
                  ${this.isPlaying ? 'Halt' : 'Vocalize'}
                </button>
              </div>
           </div>
         `;
      },

      htmlArchive() {
        const avgRating = this.savedPitches.length ? (this.savedPitches.reduce((acc, p) => acc + p.rating, 0) / this.savedPitches.length).toFixed(1) : "0.0";
        return `
          <div class="flex flex-col h-full bg-[#F5F1E6]">
            <div class="p-4 pt-6 bg-white border-b-[3px] border-black shrink-0">
               <div class="flex justify-between items-center mb-6">
                  <div class="flex flex-col">
                     <h1 class="text-3xl font-black uppercase tracking-tighter text-[#B23A2E] font-serif">Excavations</h1>
                     <div class="text-[10px] font-black uppercase tracking-widest opacity-60 font-mono">Crate Architecture</div>
                  </div>
                  <div class="w-12 h-12 rounded-full border-[3px] border-black flex items-center justify-center p-1">
                     <div class="w-full h-full border-2 border-black border-dashed rounded-full flex items-center justify-center text-[8px] font-black font-mono text-center leading-none">DIR<br/>LOG</div>
                  </div>
               </div>
               <div class="flex border-[3px] border-black rounded-lg overflow-hidden bg-[#F5F1E6] mb-4">
                  <div class="flex-1 p-2 text-center border-r-[3px] border-black">
                     <div class="text-[8px] font-black uppercase tracking-widest opacity-60 mb-1 font-mono">Logged</div>
                     <div class="text-xl font-black font-serif">${this.savedPitches.length}</div>
                  </div>
                  <div class="flex-1 p-2 text-center">
                     <div class="text-[8px] font-black uppercase tracking-widest opacity-60 mb-1 font-mono">Avg Signal</div>
                     <div class="text-xl font-black flex items-center justify-center gap-1 font-serif">
                       ${avgRating} <i data-lucide="star" class="w-2.5 h-2.5 fill-[#E3A21A] text-[#E3A21A]"></i>
                     </div>
                  </div>
               </div>
               <div class="relative border-2 border-black rounded-lg overflow-hidden flex items-center bg-white">
                  <i data-lucide="search" class="w-4 h-4 absolute left-3 text-gray-400"></i>
                  <input id="archive-search-input" type="text" placeholder="Filter strata..." oninput="app.handleSearch(event)" value="${this.searchQuery.replace(/"/g, '&quot;')}" class="w-full py-2 pl-9 pr-8 text-sm font-medium focus:outline-none placeholder:text-gray-400 bg-white font-mono">
               </div>
            </div>
            <div id="archive-list-container" class="flex-1 overflow-y-auto p-4 space-y-3 pb-24">
              ${this.htmlArchiveList()}
            </div>
          </div>
        `;
      },
      htmlArchiveList() {
        let disp = this.archiveTab === 'ALL' ? this.savedPitches : this.savedPitches.filter(p => p.rating >= 4);
        if (this.searchQuery) disp = disp.filter(p => p.title.toLowerCase().includes(this.searchQuery.toLowerCase()) || p.elements.artifact.title.toLowerCase().includes(this.searchQuery.toLowerCase()));
        if(disp.length === 0) return `<div class="text-center p-12 opacity-30 font-black uppercase tracking-widest font-mono border-2 border-dashed border-black rounded-xl">Empty Stratum.</div>`;
        
        return disp.map(p => `
          <div onclick="app.currentPitch = app.savedPitches.find(x=>x.id==='${p.id}'); app.navigate('detail');" class="flex items-center p-3 border-[3px] border-black rounded-xl bg-white cursor-pointer hover:bg-[#E5E0D8] active:scale-95 transition-all shadow-sm">
            <div class="flex-1 min-w-0 pr-4">
              <h3 class="font-black text-sm uppercase truncate mb-1 font-serif">${p.title}</h3>
              <div class="text-[10px] font-mono opacity-60 truncate">${p.elements.artifact.title}</div>
            </div>
            <div class="flex flex-col items-end gap-1 shrink-0">
              <div class="flex items-center">${this.smallStarsHTML(p.rating)}</div>
              <div class="text-[9px] font-bold uppercase tracking-widest opacity-40 font-mono">${p.date}</div>
            </div>
          </div>
        `).join('');
      },

      htmlPromptModal() {
        if (!this.previewPrompt) return '';
        return `
          <div class="absolute inset-0 z-[60] flex flex-col bg-black/60 backdrop-blur-sm animate-[fadeIn_0.2s_ease-out]">
            <div class="flex-1" onclick="app.closePromptPreview()"></div>
            <div class="bg-[#F5F1E6] border-t-[4px] border-black h-[85%] rounded-t-3xl flex flex-col overflow-hidden transform transition-transform shadow-[0_-10px_40px_rgba(0,0,0,0.5)]">
              <div class="flex justify-between items-center p-4 border-b-[3px] border-black shrink-0 bg-white">
                <h3 class="text-sm font-black uppercase tracking-widest font-mono flex items-center">
                  <i data-lucide="terminal" class="w-4 h-4 mr-2"></i> ${this.previewPrompt.title}
                </h3>
                <button onclick="app.closePromptPreview()" class="p-1 hover:bg-gray-200 rounded-full transition-colors"><i data-lucide="x" class="w-5 h-5"></i></button>
              </div>
              <div class="flex-1 overflow-y-auto p-4 bg-zinc-50 relative">
                <textarea id="preview-prompt-text" class="w-full h-full p-4 border-2 border-dashed border-gray-300 bg-white text-xs font-mono leading-relaxed focus:outline-none focus:border-[#0E6B66] rounded resize-none" spellcheck="false">${this.previewPrompt.text}</textarea>
              </div>
              <div class="p-4 border-t-[3px] border-black bg-white shrink-0">
                <button onclick="app.copyToClipboard(document.getElementById('preview-prompt-text').value)" class="w-full py-4 border-[3px] border-black bg-[#E3A21A] text-black rounded-xl font-black uppercase font-mono shadow-[0_4px_0_rgb(17,17,17)] active:translate-y-[2px] active:shadow-none transition-all flex items-center justify-center">
                  <i data-lucide="copy" class="w-5 h-5 mr-2"></i> Copy Prompt to Clipboard
                </button>
              </div>
            </div>
          </div>
        `;
      },

      htmlDetail() {
        const p = this.currentPitch;
        if(!p) return '';
        return `
          <div class="flex flex-col h-full bg-[#E5E0D8] relative">
            <div class="flex justify-between items-center p-3 border-b-[3px] border-black bg-[#F5F1E6] shrink-0 z-10">
              <button onclick="app.navigate('archive')" class="flex items-center text-[10px] font-black uppercase tracking-widest font-mono hover:text-[#E3A21A] transition-colors">
                <i data-lucide="chevron-left" class="w-4 h-4 mr-1"></i> Back
              </button>
              <div class="flex items-center gap-4">
                <button onclick="app.deletePitch('${p.id}')" class="opacity-50 hover:text-[#B23A2E] transition-colors"><i data-lucide="trash-2" class="w-4 h-4"></i></button>
              </div>
            </div>

            <div class="flex-1 overflow-y-auto p-4 pb-24 z-0">
               <div class="border-b-[3px] border-black pb-4 mb-4">
                  <div class="flex justify-between items-start mb-2">
                    <h1 class="text-3xl font-black uppercase leading-none max-w-[80%] font-serif">${p.title}</h1>
                  </div>
                  <p class="text-xs font-bold uppercase tracking-widest opacity-80 font-mono mb-3">
                    [ ${p.elements.artifact.title} ]
                  </p>
                  <div class="flex items-center gap-3 mb-3">
                     <div class="flex gap-1 items-center z-10">${this.starsHTML(p.rating, p.id)}</div>
                     <span class="text-[10px] font-mono opacity-50">${p.rating > 0 ? p.rating + '.0' : 'Unrated'}</span>
                  </div>
               </div>

               <div class="mb-6 font-serif border-l-[4px] border-[#0E6B66] pl-4 py-1">
                  <p class="text-sm font-medium leading-relaxed text-gray-800">${p.summary}</p>
               </div>

               <!-- Build & Visual Artifact Prompts -->
               <div class="mb-6">
                  <h3 class="text-[10px] font-black uppercase tracking-widest mb-3 opacity-60 font-mono text-[#0E6B66]">Artifact Execution</h3>
                  <div class="grid grid-cols-2 gap-2 mb-2">
                     <button onclick="app.openPromptPreview('Product Image Generator', 'image')" class="p-3 border-[2px] border-[#0E6B66] bg-white rounded flex flex-col items-start hover:bg-[#0E6B66] hover:text-white transition-colors text-left group">
                        <i data-lucide="image" class="w-4 h-4 mb-2 group-hover:animate-pulse"></i>
                        <span class="text-[10px] font-black uppercase font-mono">Product Image</span>
                        <span class="text-[8px] opacity-60 font-mono mt-1">Midjourney / DALL-E</span>
                     </button>
                     <button onclick="app.openPromptPreview('Single-File Code App', 'build')" class="p-3 border-[2px] border-[#0E6B66] bg-white rounded flex flex-col items-start hover:bg-[#0E6B66] hover:text-white transition-colors text-left group">
                        <i data-lucide="code" class="w-4 h-4 mb-2 group-hover:animate-pulse"></i>
                        <span class="text-[10px] font-black uppercase font-mono">HTML Artifact</span>
                        <span class="text-[8px] opacity-60 font-mono mt-1">Vanilla JS / Tailwind</span>
                     </button>
                  </div>
               </div>

               <!-- Design Fiction Idiom Forges -->
               <div class="mb-6 border-t-2 border-dashed border-gray-400 pt-4">
                  <h3 class="text-[10px] font-black uppercase tracking-widest mb-3 opacity-60 font-mono">Design Fiction Idioms</h3>
                  <div class="grid grid-cols-2 gap-2 mb-2">
                     <button onclick="app.openPromptPreview('Diegetic Prototype', 'diegetic')" class="p-3 border-[2px] border-black bg-white rounded flex flex-col items-start hover:bg-black hover:text-white transition-colors text-left">
                        <i data-lucide="film" class="w-4 h-4 mb-2"></i>
                        <span class="text-[10px] font-black uppercase font-mono">Diegetic Script</span>
                        <span class="text-[8px] opacity-60 font-mono mt-1">Scene Friction</span>
                     </button>
                     <button onclick="app.openPromptPreview('Repair Manual', 'repair')" class="p-3 border-[2px] border-black bg-white rounded flex flex-col items-start hover:bg-black hover:text-white transition-colors text-left">
                        <i data-lucide="wrench" class="w-4 h-4 mb-2"></i>
                        <span class="text-[10px] font-black uppercase font-mono">Repair Manual</span>
                        <span class="text-[8px] opacity-60 font-mono mt-1">Shadow Infrastructure</span>
                     </button>
                     <button onclick="app.openPromptPreview('Quick Start Guide', 'qsg')" class="p-3 border-[2px] border-black bg-white rounded flex flex-col items-start hover:bg-black hover:text-white transition-colors text-left">
                        <i data-lucide="clipboard-list" class="w-4 h-4 mb-2"></i>
                        <span class="text-[10px] font-black uppercase font-mono">Quick Start Guide</span>
                        <span class="text-[8px] opacity-60 font-mono mt-1">Banal Onboarding</span>
                     </button>
                     <button onclick="app.openPromptPreview('Product Catalog', 'catalog')" class="p-3 border-[2px] border-black bg-white rounded flex flex-col items-start hover:bg-black hover:text-white transition-colors text-left">
                        <i data-lucide="shopping-cart" class="w-4 h-4 mb-2"></i>
                        <span class="text-[10px] font-black uppercase font-mono">Product Catalog</span>
                        <span class="text-[8px] opacity-60 font-mono mt-1">Hyper-Commodity</span>
                     </button>
                  </div>
               </div>

               <!-- Advanced Operators -->
               <div class="mb-4 border-t-2 border-dashed border-gray-400 pt-4">
                  <h3 class="text-[10px] font-black uppercase tracking-widest mb-3 opacity-60 font-mono text-[#B23A2E]">Advanced Operators</h3>
                  <div class="space-y-2">
                     <button onclick="app.openPromptPreview('Octavia Simulator', 'octavia')" class="w-full p-3 border-[2px] border-[#B23A2E] bg-white rounded flex justify-between items-center hover:bg-[#B23A2E] hover:text-white transition-colors">
                        <span class="text-[10px] font-black uppercase font-mono">Octavia Pressure Sim</span>
                        <i data-lucide="cpu" class="w-4 h-4"></i>
                     </button>
                     <button onclick="app.openPromptPreview('Ripple Orchestrator', 'ripple')" class="w-full p-3 border-[2px] border-[#B23A2E] bg-white rounded flex justify-between items-center hover:bg-[#B23A2E] hover:text-white transition-colors">
                        <span class="text-[10px] font-black uppercase font-mono">Ripple Orchestrator</span>
                        <i data-lucide="waves" class="w-4 h-4"></i>
                     </button>
                  </div>
               </div>
            </div>

            <!-- Inject Modal here -->
            ${this.htmlPromptModal()}

          </div>
        `;
      },

      // Initialization Hook
      render() {
        const root = document.getElementById('app-root');
        if (this.view === 'onboarding') root.innerHTML = this.htmlOnboarding();
        else if (this.view === 'play') root.innerHTML = this.htmlPlay();
        else if (this.view === 'result') root.innerHTML = this.htmlResult();
        else if (this.view === 'archive') root.innerHTML = this.htmlArchive();
        else if (this.view === 'detail') root.innerHTML = this.htmlDetail();

        this.renderNav();
        this.renderMenu();
        lucide.createIcons();
      },
      renderNav() { document.getElementById('nav-root').innerHTML = this.view === 'onboarding' ? '' : this.htmlNavBar(); lucide.createIcons(); },
      renderMenu() { document.getElementById('side-menu-root').innerHTML = this.htmlSideMenu(); lucide.createIcons(); },
      renderPlayCards() { const c = document.getElementById('play-cards-container'); if(c) { c.innerHTML = this.htmlPlayCards(); lucide.createIcons(); } },
      renderPlayActions() { const c = document.getElementById('play-actions-container'); if(c) { c.innerHTML = this.htmlPlayActions(); lucide.createIcons(); } },
      renderArchiveList() { const c = document.getElementById('archive-list-container'); if(c) { c.innerHTML = this.htmlArchiveList(); lucide.createIcons(); } },
      renderTTSControls() { const c = document.getElementById('tts-controls-container'); if(c) { c.innerHTML = this.htmlTTSControls(); lucide.createIcons(); } }
    };

    window.onload = () => app.init();
  </script>
</body>
</html>
