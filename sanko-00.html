          this.savedPitches = [];
          localStorage.removeItem('sankofa_archive');
          this.render();
        }
      },
      handleCardClick(index, category) {
        if (!this.cardsFlipped[index]) {
          this.cardsFlipped[index] = true;
          this.renderPlayCards(); // Update only cards
          this.renderPlayActions(); // Check if all flipped
        } else {
          // Unflip animation
          this.cardsFlipped[index] = false;
          this.renderPlayCards();
          this.renderPlayActions();

            this.currentDeck[category] = this.getRandomItem(DATABASE[category === 'func' ? 'functions' : category + 's']);

              this.renderPlayCards();
              this.renderPlayActions();
            }, 100);
          }, 300);
        }

        const prefixes = ["The", "Project", "Operation", "Community", "Local", "Shadow", "Rogue", "Neo", "Quantum"];
        const title = `${prefixes[Math.floor(Math.random() * prefixes.length)]} ${p.artifact.title.split(' ')[0]} ${p.artifact.title.split(' ')[1] || 'System'}`;
        
        const whyMatters = `Because ${p.problem.title.toLowerCase()} is eroding our social fabric. By focusing on ${p.func.title.toLowerCase()}, we shift from a model of extraction to a model of deeply rooted connection, making heritage usable and future-ready.`;

        const imagePrompt = `A high-end, photorealistic product shot of a final, production-ready "${title}".\n\nContext: It is a modern physical or digital artifact designed to solve the problem of ${p.problem.title.toLowerCase()} by functioning like a modern-day ${p.practice.title.toLowerCase()}.\n\nStyle: Commercial product photography, highly detailed, 8k resolution, cinematic studio lighting, shallow depth of field. Modern industrial design with premium, warm, textured Afro-futurist accents (subtle teal, amber, and stamp red details). The artifact feels tangible, sophisticated, and ready for market. Shown in active use in a realistic setting.`;

        this.currentPitch = {
          id: Date.now().toString(),
          title, summary, whyMatters, buildPrompt, imagePrompt,
          tags: this.getRandomTags(),
          date: new Date().toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' }),
          rating: 0,
          elements: p
        };
        this.navigate('result');
      },
      savePitch(pitchToSave = this.currentPitch) {
        if (!this.savedPitches.find(p => p.id === pitchToSave.id)) {
          this.savedPitches = [pitchToSave, ...this.savedPitches];
        } else {
          this.savedPitches = this.savedPitches.map(p => p.id === pitchToSave.id ? pitchToSave : p);
        }
        localStorage.setItem('sankofa_archive', JSON.stringify(this.savedPitches));
      },
      ratePitch(id, rating) {
        this.savedPitches = this.savedPitches.map(p => p.id === id ? { ...p, rating } : p);
        if (this.currentPitch && this.currentPitch.id === id) {
          this.currentPitch.rating = rating;
        }
        localStorage.setItem('sankofa_archive', JSON.stringify(this.savedPitches));
        
        // Target render to avoid losing scroll position if in detail view
        if(this.view === 'detail') this.render();
      },
      deletePitch(id) {
        if(confirm("Delete this pitch?")) {
          this.savedPitches = this.savedPitches.filter(p => p.id !== id);
          localStorage.setItem('sankofa_archive', JSON.stringify(this.savedPitches));
          this.navigate('archive');
        }
      },
      copyToClipboard(text) {
        const textArea = document.createElement("textarea");
        textArea.value = text;
        document.body.appendChild(textArea);
        textArea.select();
        try { document.execCommand('copy'); } catch (err) {}
        document.body.removeChild(textArea);
      },
      handleShare(pitch) {
        if (navigator.share) {
          navigator.share({ title: pitch.title, text: pitch.summary }).catch(()=>{});
        } else {
          this.copyToClipboard(`${pitch.title}\n\n${pitch.summary}`);
          alert("Copied to clipboard!");
        }
      },
      setArchiveTab(tab) {
        this.archiveTab = tab;
        this.renderArchiveList(); // Partial render
      },
      handleSearch(e) {
        this.searchQuery = e.target.value;
        this.renderArchiveList(); // Partial render
      },
      clearSearch() {
        this.searchQuery = '';
        document.getElementById('archive-search-input').value = '';
        this.renderArchiveList();
      },
      toggleEdit() {
        this.isEditing = !this.isEditing;
        this.render();
      },
      saveEdit() {
        const title = document.getElementById('edit-title').value;
        const summary = document.getElementById('edit-summary').value;
        this.currentPitch.title = title;
        this.currentPitch.summary = summary;
        this.savePitch();
        this.isEditing = false;
        this.render();
      },

      // TTS
      handleSpeak(text) {
        if ('speechSynthesis' in window) {
          window.speechSynthesis.cancel();
          this.utterance = new SpeechSynthesisUtterance(text);
          
          this.utterance.onboundary = (event) => {
            if (event.name === 'word') {
              const percent = (event.charIndex / text.length) * 100;
              this.updateAudioProgress(percent);
            }
          };
          this.utterance.onend = () => {
            this.isPlaying = false;
            this.updateAudioProgress(100);
            setTimeout(() => this.updateAudioProgress(0), 1000);
            this.renderTTSControls();
          };
          this.utterance.onerror = () => {
            this.isPlaying = false;
            this.updateAudioProgress(0);
            this.renderTTSControls();
          };
          
          this.isPlaying = true;
          this.updateAudioProgress(0);
          this.renderTTSControls();
          window.speechSynthesis.speak(this.utterance);
        }
      },
      handleStopSpeak() {
        if ('speechSynthesis' in window) {
          window.speechSynthesis.cancel();
          this.isPlaying = false;
          this.updateAudioProgress(0);
          if(this.view === 'result') this.renderTTSControls();
        }
      },
      updateAudioProgress(percent) {
        this.audioProgress = percent;
        const bar = document.getElementById('audio-progress-bar');
        if (bar) bar.style.width = `${percent}%`;
      },

      // Export
      downloadData(type) {
        let content = '';
        let mimeType = '';
        let filename = `sankofa-archive-${new Date().toISOString().split('T')[0]}`;
        const data = this.savedPitches;

        if (type === 'JSON') {
          content = JSON.stringify(data, null, 2);
          mimeType = 'application/json';
          filename += '.json';
        } else if (type === 'CSV') {
          const headers = ['ID', 'Title', 'Date', 'Rating', 'Problem', 'Practice', 'Function', 'Artifact', 'Summary'];
          const rows = data.map(p => [
            p.id, `"${p.title.replace(/"/g, '""')}"`, p.date, p.rating, 
            `"${p.elements.problem.title}"`, `"${p.elements.practice.title}"`, 
            `"${p.elements.func.title}"`, `"${p.elements.artifact.title}"`, `"${p.summary.replace(/"/g, '""')}"`
          ]);
          content = [headers.join(','), ...rows.map(r => r.join(','))].join('\n');
          mimeType = 'text/csv';
          filename += '.csv';
        }

        const blob = new Blob([content], { type: mimeType });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = filename;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
      },

                <div class="flex items-center justify-center gap-4 mb-4 opacity-50">
                   <span class="h-[2px] w-8 bg-black"></span>
                   <span class="text-[10px] font-black uppercase tracking-widest">Your Sankofa Pitch</span>
                   <span class="h-[2px] w-8 bg-black"></span>
                </div>
                <h1 class="text-4xl font-black uppercase leading-[0.9] mb-4 font-serif text-black">${p.title}</h1>
                <p class="text-sm font-bold uppercase tracking-widest leading-relaxed opacity-80 max-w-[90%] mx-auto">
                  A ${p.elements.artifact.title.toLowerCase()} that turns ${p.elements.problem.title.toLowerCase()} into ${p.elements.func.title.toLowerCase()}.
                </p>
              </div>

              <!-- Pitch Summary Box -->
              <div class="border-[3px] border-black rounded-xl bg-white mb-6 relative shadow-[4px_4px_0_rgb(17,17,17)]">
                 <div class="absolute -top-3 left-4 bg-white px-2 text-[10px] font-black uppercase tracking-widest border-[3px] border-black">
                    Spoken Pitch (TTS)
                 </div>
                 <div class="p-4 pt-6 text-sm font-medium leading-relaxed font-serif text-gray-800">
                    ${p.summary}
                 </div>
                 <div id="tts-controls-container">
                    ${this.htmlTTSControls()}
                 </div>
              </div>

              <!-- Prompts Quick View -->
              <div class="grid grid-cols-2 gap-4">
                 <div class="border-[3px] border-black bg-[#F5F1E6] p-3 rounded-xl flex flex-col items-start">
                    <div class="text-[10px] font-black uppercase tracking-widest mb-2 flex items-center gap-1 opacity-60">
                       <i data-lucide="code" class="w-3 h-3"></i> Build Prompt
                    </div>
                    <p class="text-[10px] font-medium leading-tight mb-3 flex-1 opacity-80">
                       Generate a step-by-step MVP plan, tech stack, and data model for this idea.
                    </p>
                    <button onclick="app.savePitch(); app.navigate('detail');" class="text-[10px] font-black uppercase text-[#0E6B66] flex items-center hover:underline">
                       View Prompt <i data-lucide="chevron-right" class="w-3 h-3"></i>
                    </button>
                 </div>
                 <div class="border-[3px] border-black bg-[#F5F1E6] p-3 rounded-xl flex flex-col items-start">
                    <div class="text-[10px] font-black uppercase tracking-widest mb-2 flex items-center gap-1 opacity-60">
                       <i data-lucide="image" class="w-3 h-3"></i> Image Prompt
                    </div>
                    <p class="text-[10px] font-medium leading-tight mb-3 flex-1 opacity-80">
                       Generate a blueprint or concept image for the artifact.
                    </p>
                    <button onclick="app.savePitch(); app.navigate('detail');" class="text-[10px] font-black uppercase text-[#0E6B66] flex items-center hover:underline">
                       View Prompt <i data-lucide="chevron-right" class="w-3 h-3"></i>
                    </button>
                 </div>
              </div>
            </div>
          </div>
        `;
      },

      htmlTTSControls() {
         const p = this.currentPitch;
         return `
           <div class="bg-zinc-100 border-t-[3px] border-black p-3 flex flex-col gap-2 rounded-b-lg">
              <div class="flex items-center gap-2">
                 <div class="text-[10px] font-mono font-bold w-6 text-right opacity-50">T</div>
                 <div class="flex-1 h-2 bg-black/10 rounded-full overflow-hidden relative">
                    <div id="audio-progress-bar" class="absolute top-0 left-0 h-full bg-amber-500 transition-all duration-75 ease-linear" style="width: ${this.audioProgress}%"></div>
                 </div>
                 <div class="text-[10px] font-mono font-bold w-6 text-left opacity-50">T</div>
              </div>
              <div class="flex justify-between gap-2 mt-1">
                <button onclick="${this.isPlaying ? 'app.handleStopSpeak()' : `app.handleSpeak('${p.summary.replace(/'/g, "\\'")}')`}" class="flex-1 py-2 rounded border-2 border-black flex items-center justify-center text-xs font-black uppercase active:translate-y-1 transition-transform ${this.isPlaying ? 'bg-[#B23A2E]' : 'bg-[#0E6B66]'} text-[#F5F1E6]">
                  <i data-lucide="${this.isPlaying ? 'square' : 'play'}" class="w-3.5 h-3.5 mr-2 fill-current"></i>
                  ${this.isPlaying ? 'Stop' : 'Speak'}
                </button>
                <button onclick="app.copyToClipboard('${p.summary.replace(/'/g, "\\'")}')" class="px-4 py-2 rounded border-2 border-black flex items-center justify-center text-xs font-black uppercase active:translate-y-1 transition-transform bg-white hover:bg-black/5 text-black">
                  <i data-lucide="copy" class="w-3.5 h-3.5 mr-1"></i> Copy
                </button>
              </div>
           </div>
         `;
      },

      htmlArchive() {
        const avgRating = this.savedPitches.length ? (this.savedPitches.reduce((acc, p) => acc + p.rating, 0) / this.savedPitches.length).toFixed(1) : "0.0";
        const topIdeas = this.savedPitches.filter(p => p.rating >= 4).length;
        
        return `
          <div class="flex flex-col h-full bg-[#F5F1E6]">
            <!-- Header -->
            <div class="p-4 pt-6 bg-white border-b-[3px] border-black shrink-0">
               <div class="flex justify-between items-center mb-6">
                  <div class="flex flex-col">
                     <h1 class="text-3xl font-black uppercase tracking-tighter text-[#B23A2E]">Archive</h1>
                     <div class="text-[10px] font-black uppercase tracking-widest opacity-60">Your Saved Pitches</div>
                  </div>
                  <div class="w-12 h-12 rounded-full border-[3px] border-black flex items-center justify-center p-1">
                     <div class="w-full h-full border-2 border-black border-dashed rounded-full flex items-center justify-center text-[8px] font-black text-center leading-none">
                        DESIGN<br/>LAB
                     </div>
                  </div>
               </div>
               <!-- Stats Board -->
               <div class="flex border-[3px] border-black rounded-lg overflow-hidden bg-[#F5F1E6] mb-4">
                  <div class="flex-1 p-2 text-center border-r-[3px] border-black">
                     <div class="text-[8px] font-black uppercase tracking-widest opacity-60 mb-1">Total Saved</div>
                     <div class="text-xl font-black">${this.savedPitches.length}</div>
                  </div>
                  <div class="flex-1 p-2 text-center border-r-[3px] border-black">
                     <div class="text-[8px] font-black uppercase tracking-widest opacity-60 mb-1">Avg Rating</div>
                     <div class="text-xl font-black flex items-center justify-center gap-1">
                       ${avgRating} <i data-lucide="star" class="w-2.5 h-2.5 fill-[#E3A21A] text-[#E3A21A]"></i>
                     </div>
                  </div>
                  <div class="flex-1 p-2 text-center">
                     <div class="text-[8px] font-black uppercase tracking-widest opacity-60 mb-1">4★+ Ideas</div>
                     <div class="text-xl font-black">${topIdeas}</div>
                  </div>
               </div>
               <!-- Search Bar -->
               <div class="relative border-2 border-black rounded-lg overflow-hidden flex items-center bg-white">
                  <i data-lucide="search" class="w-4 h-4 absolute left-3 text-gray-400"></i>
                  <input id="archive-search-input" type="text" placeholder="Search pitches or artifacts..." oninput="app.handleSearch(event)" value="${this.searchQuery}" class="w-full py-2 pl-9 pr-8 text-sm font-medium focus:outline-none placeholder:text-gray-400 bg-white">
                  <button onclick="app.clearSearch()" class="absolute right-3 text-gray-400 hover:text-black focus:outline-none">
                    <i data-lucide="x" class="w-3.5 h-3.5"></i>
                  </button>
               </div>
            </div>
            <!-- Tabs -->
            <div class="flex border-b-[3px] border-black bg-white shrink-0">
               <button id="tab-ALL" onclick="app.setArchiveTab('ALL')" class="flex-1 py-3 text-xs font-black uppercase tracking-widest transition-colors ${this.archiveTab === 'ALL' ? 'bg-black text-white' : 'text-black/60 hover:bg-black/5'}">All</button>
               <button id="tab-FAVORITES" onclick="app.setArchiveTab('FAVORITES')" class="flex-1 py-3 text-xs font-black uppercase tracking-widest transition-colors border-l-[3px] border-black ${this.archiveTab === 'FAVORITES' ? 'bg-black text-white' : 'text-black/60 hover:bg-black/5'}">Favorites</button>
            </div>
            <!-- List -->
            <div id="archive-list-container" class="flex-1 overflow-y-auto p-4 space-y-3 pb-24">
              ${this.htmlArchiveList()}
            </div>
            <!-- Export Footer -->
            <div class="p-4 border-t-[3px] border-black bg-white shrink-0 mb-[64px]">
              <div class="text-[10px] text-center font-black uppercase tracking-widest mb-2 opacity-50">Export Archive</div>
              <div class="flex gap-2">
                <button onclick="app.downloadData('JSON')" class="flex-1 py-2 border-[2px] rounded border-black text-[10px] font-black uppercase hover:bg-black hover:text-white transition-colors flex items-center justify-center gap-1"><i data-lucide="code" class="w-3 h-3"></i> JSON</button>
                <button onclick="app.downloadData('CSV')" class="flex-1 py-2 border-[2px] rounded border-black text-[10px] font-black uppercase hover:bg-black hover:text-white transition-colors flex items-center justify-center gap-1"><i data-lucide="file-text" class="w-3 h-3"></i> CSV</button>
              </div>
            </div>
          </div>
        `;
      },
      htmlArchiveList() {
        let displayedPitches = this.archiveTab === 'ALL' ? this.savedPitches : this.savedPitches.filter(p => p.rating >= 4);
        const q = this.searchQuery.toLowerCase();
        if (q) {
          displayedPitches = displayedPitches.filter(p => 
            p.title.toLowerCase().includes(q) || 
            p.summary.toLowerCase().includes(q) ||
            p.elements.artifact.title.toLowerCase().includes(q)
          );
        }

        if(displayedPitches.length === 0) {
           return `<div class="text-center p-12 opacity-30 font-black uppercase tracking-widest border-2 border-dashed border-black rounded-xl">
               ${q ? 'No matching ideas found.' : `No ${this.archiveTab.toLowerCase()} pitches.`}
            </div>`;
        }

        return displayedPitches.map(pitch => `
          <div onclick="app.currentPitch = app.savedPitches.find(p=>p.id==='${pitch.id}'); app.navigate('detail');" class="flex items-center p-3 border-[3px] border-black rounded-xl bg-white cursor-pointer hover:bg-black/5 active:scale-95 transition-all shadow-sm">
            <div class="flex-1 min-w-0 pr-4">
              <h3 class="font-black text-sm uppercase truncate mb-1 font-serif">${pitch.title}</h3>
              <div class="text-[10px] font-mono opacity-60 truncate">${pitch.elements.artifact.title}</div>
            </div>
            <div class="flex flex-col items-end gap-1 shrink-0">
              <div class="flex items-center">
                ${this.smallStarsHTML(pitch.rating)}
              </div>
              <div class="text-[9px] font-bold uppercase tracking-widest opacity-40">${pitch.date}</div>
            </div>
            <i data-lucide="chevron-right" class="w-4 h-4 ml-2 opacity-30"></i>
          </div>
        `).join('');
      },

      htmlDetail() {
        const p = this.currentPitch;
        if(!p) return '';
        
        return `
          <div class="flex flex-col h-full bg-[#E5E0D8]">
            <!-- Header -->
            <div class="flex justify-between items-center p-3 border-b-[3px] border-black bg-[#F5F1E6] shrink-0">
              <button onclick="app.navigate('archive')" class="flex items-center text-[10px] font-black uppercase tracking-widest hover:text-[#E3A21A] transition-colors">
                <i data-lucide="chevron-left" class="w-4 h-4 mr-1"></i> Back
              </button>
              <div class="flex items-center gap-4">
                <button onclick="app.toggleEdit()" class="opacity-50 hover:opacity-100 transition-opacity"><i data-lucide="edit-3" class="w-4 h-4"></i></button>
                <button onclick="app.handleShare(app.currentPitch)" class="opacity-50 hover:opacity-100 transition-opacity"><i data-lucide="share" class="w-4 h-4"></i></button>
                <button onclick="app.deletePitch('${p.id}')" class="opacity-50 hover:text-[#B23A2E] transition-colors"><i data-lucide="trash-2" class="w-4 h-4"></i></button>
              </div>
            </div>

            <div class="flex-1 overflow-y-auto p-4 pb-24 font-serif">
               <!-- Document Header -->
               <div class="border-b-[3px] border-black pb-4 mb-4">
                  ${this.isEditing ? `
                     <div class="mb-4 bg-white p-3 border-[2px] border-black rounded-lg shadow-sm font-sans">
                        <label class="text-[10px] font-black uppercase tracking-widest opacity-50 mb-1 block">Edit Title</label>
                        <input id="edit-title" type="text" value="${p.title}" class="w-full text-2xl font-black uppercase mb-3 border-b-2 border-dashed border-gray-300 focus:border-amber-500 focus:outline-none pb-1 font-serif bg-transparent">
                        <label class="text-[10px] font-black uppercase tracking-widest opacity-50 mb-1 block">Edit Pitch</label>
                        <textarea id="edit-summary" class="w-full h-24 text-sm font-medium border-2 border-gray-200 rounded p-2 focus:border-amber-500 focus:outline-none font-serif mb-3">${p.summary}</textarea>
                        <div class="flex gap-2">
                           <button onclick="app.saveEdit()" class="flex-1 bg-black text-white py-2 rounded text-[10px] font-black uppercase flex justify-center items-center gap-1"><i data-lucide="check" class="w-3 h-3"></i> Save</button>
                           <button onclick="app.toggleEdit()" class="flex-1 border-2 border-black py-2 rounded text-[10px] font-black uppercase flex justify-center items-center gap-1"><i data-lucide="x" class="w-3 h-3"></i> Cancel</button>
                        </div>
                     </div>
                  ` : `
                     <div class="flex justify-between items-start mb-2">
                        <h1 class="text-3xl font-black uppercase leading-none max-w-[80%]">${p.title}</h1>
                        <div class="border-2 border-red-800 text-red-800 text-[8px] font-black uppercase p-1 text-center transform rotate-3 shrink-0">
                            Saved<br/>${p.date}
                        </div>
                     </div>
                     <p class="text-xs font-bold uppercase tracking-widest opacity-80 font-sans mb-3">
                        A ${p.elements.artifact.title.toLowerCase()} that turns ${p.elements.problem.title.toLowerCase()} into ${p.elements.func.title.toLowerCase()}.
                     </p>
                  `}
                  
                  <div class="flex items-center gap-3 mb-3">
                     <div class="flex gap-1 items-center z-10">
                        ${this.starsHTML(p.rating, p.id)}
                     </div>
                     <span class="text-[10px] font-mono opacity-50">${p.rating > 0 ? p.rating + '.0 Rating' : 'Unrated'}</span>
                  </div>
                  <div class="flex flex-wrap gap-2">
                     ${p.tags.map(t => `<span class="bg-[#0E6B66] text-white px-2 py-0.5 text-[8px] font-black tracking-widest rounded-sm font-sans">${t}</span>`).join('')}
                  </div>
               </div>

               <!-- Core Breakdown Grid -->
               <div class="grid grid-cols-2 gap-4 mb-6 font-sans">
                  <div class="border-[2px] border-black p-3 bg-white/50">
                     <div class="text-[8px] font-black uppercase tracking-widest opacity-60 mb-1 flex items-center gap-1"><i data-lucide="target" class="w-2.5 h-2.5"></i> Pitch Text</div>
                     <p class="text-[10px] font-medium leading-relaxed break-words">${p.summary}</p>
                  </div>
                  <div class="border-[2px] border-black p-3 bg-white/50">
                     <div class="text-[8px] font-black uppercase tracking-widest opacity-60 mb-1 flex items-center gap-1"><i data-lucide="box" class="w-2.5 h-2.5"></i> Artifact Direction</div>
                     <h4 class="text-xs font-black uppercase mb-1">${p.elements.artifact.title}</h4>
                     <p class="text-[10px] font-medium leading-relaxed opacity-80">${p.elements.artifact.desc}</p>
                  </div>
               </div>

               <!-- Why it matters -->
               <div class="mb-6 font-sans border-l-[4px] border-[#E3A21A] pl-4 py-1">
                  <h3 class="text-[10px] font-black uppercase tracking-widest mb-1">Why This Matters</h3>
                  <p class="text-sm font-medium leading-relaxed text-gray-800">${p.whyMatters}</p>
               </div>

               <!-- Prompts Section -->
               <div class="space-y-4 font-sans border-t-[3px] border-black pt-4">
                  <div class="border-[2px] border-black rounded-lg bg-white overflow-hidden shadow-sm">
                     <div class="bg-black text-white p-2 flex justify-between items-center">
                        <h3 class="text-[10px] font-black uppercase tracking-widest flex items-center gap-2"><i data-lucide="image" class="w-3 h-3"></i> Image Generation Prompt</h3>
                        <button onclick="app.copyToClipboard('${p.imagePrompt.replace(/'/g, "\\'")}')" class="hover:text-[#E3A21A] transition-colors"><i data-lucide="copy" class="w-3 h-3"></i></button>
                     </div>
                     <div class="p-3 text-[10px] font-mono leading-relaxed bg-black/5 select-all">${p.imagePrompt.replace(/\n/g, '<br>')}</div>
                  </div>

                  <div class="border-[2px] border-black rounded-lg bg-white overflow-hidden shadow-sm">
                     <div class="bg-black text-white p-2 flex justify-between items-center">
                        <h3 class="text-[10px] font-black uppercase tracking-widest flex items-center gap-2"><i data-lucide="code" class="w-3 h-3"></i> Single-File Build Prompt</h3>
                        <button onclick="app.copyToClipboard('${p.buildPrompt.replace(/'/g, "\\'")}')" class="hover:text-[#E3A21A] transition-colors"><i data-lucide="copy" class="w-3 h-3"></i></button>
                     </div>
                     <div class="p-3 text-[10px] font-mono leading-relaxed bg-black/5 whitespace-pre-wrap select-all">${p.buildPrompt}</div>
                  </div>
               </div>
            </div>
          </div>
        `;
      }
    };

    // Initialization
    window.onload = () => {
      app.init();
    };
  </script>
</body>
</html>
