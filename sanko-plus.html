<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Sankofa Futures Lab</title>
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- Lucide Icons -->
  <script src="https://unpkg.com/lucide@latest"></script>
  
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;900&family=Playfair+Display:wght@700;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">

  <!-- Tailwind Config -->
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            teal: '#0E6B66',
            amber: '#E3A21A',
            red: '#B23A2E',
            black: '#111111',
            parchment: '#F5F1E6',
            darkParchment: '#E5E0D8',
          },
          fontFamily: {
            sans: ['Inter', 'system-ui', 'sans-serif'],
            serif: ['"Playfair Display"', 'Georgia', 'serif'],
            mono: ['"Space Mono"', 'ui-monospace', 'SFMono-Regular', 'monospace'],
          }
        }
      }
    }
  </script>
  
  <style>
    /* ABSOLUTE NO SCROLL LOCK for all browsers (Chrome, Safari, iOS) */
    html, body { 
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100dvh;
      margin: 0;
      padding: 0;
      overflow: hidden; 
      background-color: #18181b; 
      color: #111111; 
      overscroll-behavior: none;
      touch-action: none;
    }

    /* Allowed internal scrolling elements */
    .scrollable {
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      overscroll-behavior-y: contain;
      touch-action: pan-y;
    }

    .perspective-1000 { perspective: 1000px; }
    .transform-style-3d { transform-style: preserve-3d; }
    .backface-hidden { backface-visibility: hidden; }
    .rotate-y-180 { transform: rotateY(180deg); }
    
    /* Hide scrollbar completely to prevent layout shifts */
    .no-scrollbar::-webkit-scrollbar { display: none; }
    .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

    /* Noise Texture */
    .bg-noise {
      background-image: url("data:image/svg+xml,%3Csvg width='100' height='100' viewBox='0 0 100 100' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100' height='100' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    }

    /* Print Styles for Perfect Card Cutting & Ink Saving */
    @media print {
      @page { margin: 0.25in; }
      
      html, body { 
        position: static !important; 
        overflow: visible !important; 
        background-color: white !important; 
        -webkit-print-color-adjust: exact; 
        color: #000 !important; 
        touch-action: auto !important; 
        height: auto !important;
        width: auto !important;
      }
      
      #wrapper { display: none !important; }
      #print-container { display: block !important; width: 100%; }
      
      .print-page {
        height: 10in; 
        width: 100%;
        margin: 0 auto;
        page-break-after: always;
        break-after: page;
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        grid-template-rows: repeat(4, 1fr);
        gap: 0;
        box-sizing: border-box;
      }
      
      .print-cut-zone {
        border: 1px dashed #ccc; 
        padding: 0.25in;
        display: flex;
        box-sizing: border-box;
        height: 100%;
        width: 100%;
        page-break-inside: avoid;
        break-inside: avoid;
      }

      .print-card {
        border: 2px solid #111;
        border-radius: 8px;
        padding: 12px;
        display: flex;
        flex-direction: column;
        justify-content: space-between;
        background-color: white !important;
        width: 100%;
        height: 100%;
        box-sizing: border-box;
        position: relative;
      }

      .print-card-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 4px; }
      .print-card-suit { display: flex; align-items: center; gap: 6px; font-size: 10px; font-family: 'Space Mono', monospace; font-weight: bold; text-transform: uppercase; color: #111 !important; }
      .print-card-id { font-size: 10px; font-family: 'Space Mono', monospace; color: #666 !important; }
      .print-card-title { font-size: 14px; font-family: 'Playfair Display', serif; font-weight: 900; text-transform: uppercase; line-height: 1.1; text-align: center; margin: auto 0; color: #000 !important;}
      .print-card-desc { font-size: 9px; font-family: 'Inter', sans-serif; text-align: center; border-top: 1px solid #ccc; padding-top: 6px; color: #333 !important; }
    }
    
    @media screen {
      #print-container { display: none !important; }
    }
  </style>
</head>
<body class="font-sans text-black">

  <!-- Structural Wrapper -->
  <div id="wrapper" class="fixed inset-0 w-full h-[100dvh] bg-[#18181b] flex justify-center items-center sm:p-6 md:p-12 overflow-hidden pointer-events-none z-0">
    
    <!-- App Container -->
    <div id="app-container" class="pointer-events-auto w-full h-full sm:max-h-[95vh] sm:max-w-[480px] lg:max-w-[720px] sm:rounded-[2.5rem] overflow-hidden flex flex-col relative shadow-[0_20px_50px_rgba(0,0,0,0.8)] border-0 sm:border-[8px] border-zinc-800 bg-parchment bg-noise text-black min-h-0">
      
      <!-- Main Content Area -->
      <div id="app-root" class="flex-1 overflow-hidden relative flex flex-col min-h-0"></div>
      
      <!-- Bottom Nav -->
      <div id="nav-root" class="shrink-0 z-40 bg-white relative"></div>
      
      <!-- Side Menu -->
      <div id="side-menu-root"></div>
    </div>
  </div>

  <!-- Print Container -->
  <div id="print-container"></div>

  <!-- Application Logic -->
  <script>
    // --- MASSIVE SYLLABUS-ALIGNED DATABASE ---
    const DATABASE = {
      failures: [
        { id: 'f1', title: 'Enshittification of Feeds', desc: 'Platforms intentionally degrading user experience to extract surplus value, prioritizing algorithmic slop over organic connection (Doctorow).' },
        { id: 'f2', title: 'Algorithmic Isolation', desc: 'Recommendation engines optimizing for engagement over shared reality, creating customized echo chambers that erode the public sphere.' },
        { id: 'f3', title: 'Biased Machine Vision', desc: 'Encoding historic racial and gender biases into operational facial recognition and autonomous surveillance systems (Buolamwini).' },
        { id: 'f4', title: 'Attention Economy Crash', desc: 'Interfaces designed to capture, hold, and monetize human focus, resulting in a systemic exhaustion of the human nervous system (Crary).' },
        { id: 'f5', title: 'Loss of Deep Time Memory', desc: 'Digital media collapsing history into a perpetual present, erasing 10,000-year endurance for ephemeral, scrollable posts (Innis).' },
        { id: 'f6', title: 'The IRL Fetish', desc: 'The false dichotomy that physical presence is "real" and digital is "fake," obscuring how algorithms actively structure offline life (Jurgenson).' },
        { id: 'f7', title: 'Automated Deskilling', desc: 'Generative AI treating human cognition and creativity as an API, offloading critical thinking and labor to stochastic parrots (Hayles).' },
        { id: 'f8', title: 'Collapse of Auratic Art', desc: 'Infinite algorithmic reproduction stripping context, friction, and historical presence from cultural artifacts (Benjamin).' },
        { id: 'f9', title: 'Context Collapse', desc: 'Social media flattening multiple distinct social spheres (family, work, public) into a single broadcast feed, leading to identity paralysis.' },
        { id: 'f10', title: 'Platform Paternalism', desc: 'Corporate custodians making invisible, algorithmic moderation decisions that sanitize culture and suppress marginalized voices (Gillespie).' },
        { id: 'f11', title: 'The Dead Internet', desc: 'The web filling up with synthetic, bot-generated "slop" interacting primarily with other bots, squeezing out human signal.' },
        { id: 'f12', title: 'Techno-Solutionism', desc: 'The ideological belief that deeply rooted social problems (bias, poverty, structural racism) can be solved purely through software patches.' }
      ],
      recoveries: [
        { id: 'r1', title: 'Associative Trail-Blazing', desc: 'Creating curated, personalized paths through vast information rather than relying on algorithmic search or static indexes. (Bush / The Memex)' },
        { id: 'r2', title: 'High-Friction Samizdat', desc: 'Bypassing central censors through high-effort, low-scale physical copying passed exclusively through trusted human networks. (Resistance)' },
        { id: 'r3', title: 'Sympathetic Memento Mori', desc: 'Preserving the physical "aura" of a subject using the magical law of contagion, grounding memory in the tactile. (Frazer / Benjamin)' },
        { id: 'r4', title: 'The Cybernetic Feedback Loop', desc: 'A system that regulates itself not by top-down command, but by constantly sensing and adjusting to its immediate environment. (Wiener)' },
        { id: 'r5', title: 'Public Access Demystification', desc: 'Revealing the literal wires, scripts, and labor behind media production to break the illusion of corporate objectivity. (Hall / Paper Tiger TV)' },
        { id: 'r6', title: 'Tactile Non-Alphabetic Ledgers', desc: 'Encoding complex administrative or narrative data into physical materials (like Incan Khipu knots) that require somatic knowledge to read. (Innis)' },
        { id: 'r7', title: 'Ritual Public Oration', desc: 'Gathering in a physical space not just to transmit news, but to actively maintain the shared reality and boundaries of the community. (Carey)' },
        { id: 'r8', title: 'Method of Loci (Memory Palace)', desc: 'Spatializing information within the human mind by attaching facts to imagined architecture, protecting memory from external erosion. (Ong)' },
        { id: 'r9', title: 'Textual World-Execution', desc: 'Using pure, descriptive language to instantly generate and navigate shared spatial realities. (Early MUDs / Bolter)' },
        { id: 'r10', title: 'The Decentralized Phone Tree', desc: 'A high-trust, human-routed alert system where the message only survives if every node takes responsibility for passing it on.' },
        { id: 'r11', title: 'Offshore Pirate Broadcasting', desc: 'Exploiting geographical and jurisdictional loopholes to broadcast unapproved signals into tightly controlled environments.' },
        { id: 'r12', title: 'Algorithmic Subversion (Gaze)', desc: 'Intentionally looking away, or creating visual noise, to break the mechanized "program" of the camera or the feed. (Flusser / Mulvey)' },
        { id: 'r13', title: 'The Commons Manifesto', desc: 'A collective, publicly visible agreement that dictates how a shared resource will be governed without private enclosure.' },
        { id: 'r14', title: 'Epistolary Delay', desc: 'Enforcing a strict time-gap between sending and receiving a message to mandate reflection and prevent reactive hostility.' },
        { id: 'r15', title: 'Diegetic Myth-Making', desc: 'Encoding survival instructions, ecological warnings, or civic duties into compelling cultural folklore so it outlasts technological collapse.' },
        { id: 'r16', title: 'Détournement (Culture Jamming)', desc: 'Hijacking and rerouting capitalist media messages or advertisements to communicate subversive, anti-capitalist meanings. (Debord)' },
        { id: 'r17', title: 'The "Slow Media" Protocol', desc: 'Intentionally throttling the speed of information transmission to force deeper cognitive engagement and reduce reactive anxiety.' },
        { id: 'r18', title: 'Acoustic Phreaking', desc: 'Exploring and mapping closed, proprietary networks (like the old Bell telephone system) through unauthorized sonic manipulation.' }
      ],
      artifacts: [
        { id: 'a1', title: 'Diegetic Hardware Wearable', desc: 'A physical device worn on the body that disrupts or alters the wearer\'s interaction with a specific technical system or surveillance apparatus.' },
        { id: 'a2', title: 'Community Rule Set / Charter', desc: 'A written protocol dictating how a specific local group governs data, interaction, and moderation completely outside of corporate ToS.' },
        { id: 'a3', title: 'Localized Mesh Network App', desc: 'Software operating strictly over peer-to-peer bluetooth/wifi, completely disconnected from the broader, centralized internet.' },
        { id: 'a4', title: 'Procedural Rhetoric Simulator', desc: 'A playable ruleset (analog board game or digital) that makes a systemic argument through its specific mechanics and constraints. (Bogost)' },
        { id: 'a5', title: 'Adversarial Design Object', desc: 'A functional product designed specifically to provoke, frustrate, or highlight the absurdity of a dominant technological paradigm. (DiSalvo)' },
        { id: 'a6', title: 'Audio/Soundscape Interface', desc: 'A system relying entirely on acoustic ecology and listening rules, removing visual UI entirely to alter cognitive processing. (Schafer)' },
        { id: 'a7', title: 'DOM Manipulator Extension', desc: 'A browser plugin that actively rewrites, obfuscates, or deletes the HTML of a dominant platform to alter its logic (e.g., hiding all engagement metrics).' },
        { id: 'a8', title: 'Zine / Manifesto', desc: 'A low-cost, easily reproducible physical document establishing the ideological foundation and operational instructions for a counter-practice.' },
        { id: 'a9', title: 'Physical "Dead Drop" Node', desc: 'An offline file-sharing USB cemented into a public brick wall, requiring absolute geographic presence and physical touch to access.' },
        { id: 'a10', title: 'Friction-Inducing Peripheral', desc: 'A custom piece of hardware (like a heavy mechanical crank) physically required to perform otherwise instantaneous, frictionless digital actions.' },
        { id: 'a11', title: 'Analog Public Dashboard', desc: 'An e-ink screen or mechanical split-flap display in a public square that tracks a hidden systemic metric for the community to witness together.' },
        { id: 'a12', title: 'Autonomous Bot Script', desc: 'A small, self-executing program designed to purposefully pollute data-harvesting efforts or autonomously intervene in digital spaces.' }
      ],
      barriers: [
        { id: 'b1', title: 'Platform Profit Incentives', desc: 'The proposed system directly contradicts the engagement and behavioral data-extraction models strictly required by venture capital.' },
        { id: 'b2', title: 'Legal & IP Frameworks', desc: 'Current copyright, DRM, and platform Terms of Service make the practice legally hazardous or grounds for immediate, algorithmic banning.' },
        { id: 'b3', title: 'User Habituation', desc: 'The public is deeply conditioned by the frictionless convenience of the current paradigm, intensely resisting the friction required by the alternative.' },
        { id: 'b4', title: 'Infrastructure Costs', desc: 'Deploying the physical hardware or network architecture requires localized capital and maintenance that marginalized communities often lack.' },
        { id: 'b5', title: 'Institutional Gatekeeping', desc: 'Academic, corporate, or governmental bodies actively suppressing the practice to maintain their centralized authority and narrative control.' },
        { id: 'b6', title: 'State Surveillance Apparatus', desc: 'Law enforcement and intelligence agencies viewing decentralized, obscured, or encrypted practices as inherent, actionable security threats.' },
        { id: 'b7', title: 'The "Network Effect" Lock-in', desc: 'The sheer critical mass of users on dominant platforms makes it socially or economically fatal for individuals to migrate to alternatives.' },
        { id: 'b8', title: 'Cognitive Labor Deficit', desc: 'Maintaining decentralized, high-friction systems requires massive amounts of uncompensated volunteer labor and emotional bandwidth to moderate.' },
        { id: 'b9', title: 'Supply Chain Monopoly', desc: 'The inability to source ethical, repairable, or non-proprietary physical components required to build hardware alternatives at scale.' }
      ],
      readings: [
        "Benjamin, 'The Work of Art in the Age of Mechanical Reproduction'",
        "Flusser, 'Towards a Philosophy of Photography'",
        "Hall, 'Encoding/Decoding in TV Discourse'",
        "Ong, 'Orality and Literacy'",
        "Bush, 'As We May Think'",
        "Gillespie, 'Custodians of the Internet'",
        "Doctorow, 'The Enshittification of TikTok'",
        "Bogost, 'Procedural Rhetoric'",
        "Hayles, 'How We Think (Technogenesis)'",
        "Dunne & Raby, 'Speculative Everything'",
        "Fisher, 'The Metaphysics of Crackle'",
        "Haraway, 'A Cyborg Manifesto'",
        "Buolamwini, 'Gender Shades / Coded Bias'",
        "Carey, 'A Cultural Approach to Communication'",
        "Mulvey, 'Visual Pleasure and Narrative Cinema'",
        "Sterne, 'The Audible Past'",
        "Innis, 'The Bias of Communication'"
      ],
      tags: ['REMEDIATION', 'RESISTANCE', 'COLLECTIVE', 'AFROFUTURISM', 'CYBERNETICS', 'ECOLOGY', 'INFRASTRUCTURE', 'HAUNTOLOGY', 'MEMORY', 'ALGORITHMS']
    };

    // --- SYSTEM LOGIC ---
    const app = {
      view: 'onboarding',
      savedPitches: JSON.parse(localStorage.getItem('sankofa_archive')) || [],
      isFastMode: false,
      isMenuOpen: false,
      round: 1,
      cardsFlipped: [false, false, false, false],
      currentDeck: { failure: null, recovery: null, artifact: null, barrier: null },
      currentPitch: null,
      archiveTab: 'ALL',
      searchQuery: '',
      previewPrompt: null, 

      init() {
        this.render();
      },
      navigate(newView) {
        this.view = newView;
        this.isMenuOpen = false;
        this.searchQuery = '';
        this.previewPrompt = null;
        this.render();
      },

      getRandomItem(arr) { return arr[Math.floor(Math.random() * arr.length)]; },
      getRandomReadings(count = 3) {
        const shuffled = [...DATABASE.readings].sort(() => 0.5 - Math.random());
        return shuffled.slice(0, count);
      },
      generateNewDeck() {
        return {
          failure: this.getRandomItem(DATABASE.failures),
          recovery: this.getRandomItem(DATABASE.recoveries),
          artifact: this.getRandomItem(DATABASE.artifacts),
          barrier: this.getRandomItem(DATABASE.barriers)
        };
      },

      startNewRound() {
        this.currentDeck = this.generateNewDeck();
        this.cardsFlipped = this.isFastMode ? [true, true, true, true] : [false, false, false, false];
        this.round += 1;
        this.navigate('play');
      },
      toggleFastMode() {
        this.isFastMode = !this.isFastMode;
        this.render();
      },
      toggleMenu() {
        this.isMenuOpen = !this.isMenuOpen;
        this.renderMenu();
      },
      clearArchive() {
        if (confirm("Are you sure you want to clear your archive? This cannot be undone.")) {
          this.savedPitches = [];
          localStorage.removeItem('sankofa_archive');
          this.render();
        }
      },
      handleCardClick(index, category) {
        if (!this.cardsFlipped[index]) {
          this.cardsFlipped[index] = true;
          this.renderPlayCards();
          this.renderPlayActions();
        } else {
          this.cardsFlipped[index] = false;
          this.renderPlayCards();
          this.renderPlayActions();
          setTimeout(() => {
            let dbKey = category + 's';
            if (category === 'recovery') dbKey = 'recoveries';
            this.currentDeck[category] = this.getRandomItem(DATABASE[dbKey]);
            setTimeout(() => {
              this.cardsFlipped[index] = true;
              this.renderPlayCards();
              this.renderPlayActions();
            }, 100);
          }, 300);
        }
      },
      shuffleDeck() {
        this.cardsFlipped = [false, false, false, false];
        this.renderPlayCards();
        this.renderPlayActions();
        setTimeout(() => {
          this.currentDeck = this.generateNewDeck();
          if (this.isFastMode) {
            setTimeout(() => {
              this.cardsFlipped = [true, true, true, true];
              this.renderPlayCards();
              this.renderPlayActions();
            }, 100);
          } else {
            this.renderPlayCards();
          }
        }, 300);
      },
      
      generatePitch() {
        const p = this.currentDeck;
        const prefixes = ["The", "Project", "Operation", "Community", "Local", "Shadow", "Rogue", "Neo", "Quantum", "Protocol"];
        // Extract the first meaningful word from the recovery title for a cool codename
        let coreWord = p.recovery.title.split(' ')[0];
        if (coreWord.toLowerCase() === 'the' || coreWord.toLowerCase() === 'a') coreWord = p.recovery.title.split(' ')[1];
        
        const title = `${prefixes[Math.floor(Math.random() * prefixes.length)]} ${coreWord}`;
        
        // Structured for the LMC 2400 Analytical Memo
        this.currentPitch = {
          id: Date.now().toString(),
          title,
          readings: this.getRandomReadings(3),
          date: new Date().toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' }),
          rating: 0,
          elements: p
        };
        this.navigate('result');
      },
      
      savePitch(pitchToSave = this.currentPitch) {
        if (!this.savedPitches.find(p => p.id === pitchToSave.id)) {
          this.savedPitches = [pitchToSave, ...this.savedPitches];
        } else {
          this.savedPitches = this.savedPitches.map(p => p.id === pitchToSave.id ? pitchToSave : p);
        }
        localStorage.setItem('sankofa_archive', JSON.stringify(this.savedPitches));
      },
      ratePitch(id, rating) {
        this.savedPitches = this.savedPitches.map(p => p.id === id ? { ...p, rating } : p);
        if (this.currentPitch && this.currentPitch.id === id) {
          this.currentPitch.rating = rating;
        }
        localStorage.setItem('sankofa_archive', JSON.stringify(this.savedPitches));
        if(this.view === 'detail') this.render();
      },
      deletePitch(id) {
        if(confirm("Delete this draft?")) {
          this.savedPitches = this.savedPitches.filter(p => p.id !== id);
          localStorage.setItem('sankofa_archive', JSON.stringify(this.savedPitches));
          this.navigate('archive');
        }
      },
      copyToClipboard(text, btnElement) {
        const textArea = document.createElement("textarea");
        textArea.value = text;
        textArea.style.position = "fixed";
        textArea.style.top = "0";
        textArea.style.left = "0";
        document.body.appendChild(textArea);
        textArea.focus();
        textArea.select();
        try { 
            document.execCommand('copy'); 
            if(btnElement) {
                const origHTML = btnElement.innerHTML;
                btnElement.innerHTML = `<i data-lucide="check" class="w-4 h-4 mr-2"></i> Copied!`;
                lucide.createIcons();
                setTimeout(() => {
                    btnElement.innerHTML = origHTML;
                    lucide.createIcons();
                }, 2000);
            }
        } catch (err) { console.error('Copy failed'); }
        document.body.removeChild(textArea);
      },
      
      // SYLLABUS ANALYTICAL MEMO GENERATOR
      getMemoDraftText() {
        if (!this.currentPitch) return "";
        const p = this.currentPitch.elements;
        const reads = this.currentPitch.readings;

        return `Analytical Memo Draft: ${this.currentPitch.title}

A. Identify the Recovery
Historical Practice: ${p.recovery.title}
${p.recovery.desc} This practice mattered because it established communal ties, trust mechanisms, and knowledge transfer outside of centralized, top-down power structures. It was pushed aside and marginalized by the drive for frictionless, scalable, and monetizable digital environments that view human friction as an error rather than a feature.

B. Identify the Present Failure
Current Media Problem: ${p.failure.title}
${p.failure.desc} The current system forces users into passive, mechanized consumption, isolating the individual while relentlessly extracting behavioral surplus. Centralized platforms and venture capital benefit from this arrangement via ad-revenue and data harvesting, while the cost is borne by the public sphere through the collapse of shared reality and cognitive exhaustion.

C. Explain the Design
Speculative Artifact: ${p.artifact.title}
${p.artifact.desc} By utilizing this specific form factor, the artifact actively carries the operative logic of [${p.recovery.title}] into the present to circumvent the crisis of [${p.failure.title}]. It explicitly changes the rule of engagement from frictionless consumption to intentional, high-friction participation, forcing users to consciously rebuild local relations.

D. Name the Barriers
Structural Obstacle: ${p.barrier.title}
${p.barrier.desc} For this proposal to be viable, there must be a fundamental shift away from optimization-metrics toward public-utility frameworks. Adoption requires organizing community trust networks capable of absorbing the labor and friction required to bypass these entrenched structural constraints.

E. Connect to the Course
Potential Analytical Interlocks (Use these to frame the history, diagnose the problem, or justify the design):
1. ${reads[0]}
2. ${reads[1]}
3. ${reads[2]}`;
      },

      // DESIGN FICTION PROMPT GENERATORS
      getPromptText(type) {
        if (!this.currentPitch) return "";
        const p = this.currentPitch.elements;
        const art = this.currentPitch.title;

        const header = `[ SANKOFA LAB: DESIGN FICTION FORGE ]\n` +
                       `• Target Problem: ${p.failure.title}\n` +
                       `• Historical Recovery / Mechanism: ${p.recovery.title}\n` +
                       `• Artifact Base Form: ${p.artifact.title}\n` +
                       `--------------------------------------------------\n\n`;

        let prompt = "";
        switch(type) {
          case 'image':
            prompt = `Prompt Operator: PRODUCT PHOTOGRAPHY GENERATION\nGenerate a high-end, photorealistic product shot of a [${p.artifact.title}].\n\nCONTEXT:\nIt is a physical artifact designed to solve the problem of [${p.failure.title}] by functioning like a modern-day [${p.recovery.title}].\n\nSTYLE & EXECUTION:\nCommercial product photography, 8k resolution, cinematic studio lighting. Modern industrial design with premium, warm, textured accents (matte black, amber, teal). Show it in active use in a realistic, mundane setting.`;
            break;
          case 'diegetic':
            prompt = `Prompt Operator: DIEGETIC PROTOTYPE (FILM IDIOM)\nGenerate a cinematic screenplay snippet and set design notes for a [${p.artifact.title}].\n\nAXIOM: The future cannot be theorized; it must be rendered as a physical artifact within a scene. The technology must visibly conflict with human behavior.\n\nSCENARIO:\nDescribe the physical looking and functioning of the object in a specific, mundane scene. It is solving the problem of [${p.failure.title}] via the methodology of [${p.recovery.title}]. Focus entirely on the human friction and the structural barrier of [${p.barrier.title}].`;
            break;
          case 'catalog':

      printDeck() {
        const pContainer = document.getElementById('print-container');
        let html = '';
        
        // Print-safe SVG suits
        const getSuitSvg = (cat, color) => {
           if(cat === 'FAILURE') return `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="${color}" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3Z"></path><line x1="12" y1="9" x2="12" y2="13"></line><line x1="12" y1="17" x2="12.01" y2="17"></line></svg>`;
           if(cat === 'RECOVERY') return `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="${color}" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"></path><polyline points="3 3 3 8 8 8"></polyline></svg>`;

           if(cat === 'BARRIER') return `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="${color}" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="m12 14 4-4"></path><path d="M3.34 19a10 10 0 1 1 17.32 0"></path></svg>`;
           return '';
        };

        const renderPrintCard = (category, item, color) => `
          <div class="print-cut-zone">
            <div class="print-card" style="border-color: ${color}">
              <div class="print-card-header">
                <span class="print-card-suit" style="color: ${color}">${getSuitSvg(category, color)} ${category}</span>
                <span class="print-card-id">${item.id ? item.id.toUpperCase() : ''}</span>
              </div>
              <h3 class="print-card-title">${item.title}</h3>
              <p class="print-card-desc">${item.desc}</p>
            </div>
          </div>
        `;

        const rulesCard = `
          <div class="print-cut-zone">
            <div class="print-card" style="border-color: #111; background-color: #fff !important;">
              <div class="print-card-header">
                <span class="print-card-suit" style="color: #111">GAME RULES</span>
                <span class="print-card-id">LMC 2400</span>
              </div>
              <h3 class="print-card-title" style="font-size:18px;">SANKOFA FUTURES</h3>
              <div style="font-size:11px; font-family:'Space Mono', monospace; text-align:left; margin-top:10px; line-height:1.4;">
                1. Separate cards into 4 decks.<br><br>
                2. Draw 1 card from each deck.<br><br>
                3. Develop a proposal: Recover the <b>[Historical Practice]</b> to address the <b>[Present Failure]</b>, built as a <b>[Speculative Artifact]</b> that encounters a <b>[Structural Barrier]</b>.<br><br>
                4. Draft the Analytical Memo.
              </div>
            </div>
          </div>
        `;

        const blankCard = `
          <div class="print-cut-zone">
            <div class="print-card" style="border-color: #aaa; border-style: dashed; background-color: #fff !important;">
              <div class="print-card-header">
                <span class="print-card-suit" style="color: #aaa">WILDCARD</span>
              </div>
              <h3 class="print-card-title" style="color: #ccc;">WRITE IDEA</h3>
              <p class="print-card-desc" style="border-color: transparent;"></p>
            </div>
          </div>
        `;

        const renderPage = (cards) => `
          <div class="print-page">
            ${cards.join('')}
          </div>
        `;

        let allPrintCards = [rulesCard]; 
        DATABASE.failures.forEach(i => allPrintCards.push(renderPrintCard('FAILURE', i, '#B23A2E')));
        DATABASE.recoveries.forEach(i => allPrintCards.push(renderPrintCard('RECOVERY', i, '#E3A21A')));
        DATABASE.artifacts.forEach(i => allPrintCards.push(renderPrintCard('ARTIFACT', i, '#111111')));
        DATABASE.barriers.forEach(i => allPrintCards.push(renderPrintCard('BARRIER', i, '#0E6B66')));

        // Pad to exactly fill A4 pages (multiples of 8)
        while (allPrintCards.length % 8 !== 0) {
          allPrintCards.push(blankCard);
        }

        let htmlFull = '';
        for (let i = 0; i < allPrintCards.length; i += 8) {
          htmlFull += renderPage(allPrintCards.slice(i, i + 8));
        }

        pContainer.innerHTML = htmlFull;
        window.print();
      },

              </div>
              
              <button onclick="app.savePitch(); app.navigate('detail');" class="w-full mt-4 py-4 border-[3px] border-black bg-black text-[#F5F1E6] rounded-xl font-black uppercase font-mono shadow-[0_4px_0_rgb(227,162,26)] active:translate-y-[2px] active:shadow-none transition-all flex items-center justify-center">
                 View Analytical Memo Draft <i data-lucide="chevron-right" class="w-5 h-5 ml-2"></i>
              </button>
            </div>
          </div>
        `;
      },

      htmlArchive() {
        return `
          <div class="flex flex-col h-full bg-[#F5F1E6] overflow-hidden min-h-0">
            <div class="p-4 pt-6 bg-white border-b-[3px] border-black shrink-0">
               <div class="flex justify-between items-center mb-6">
                  <div class="flex flex-col">
                     <h1 class="text-3xl font-black uppercase tracking-tighter text-[#B23A2E] font-serif">Archive</h1>
                     <div class="text-[10px] font-black uppercase tracking-widest opacity-60 font-mono">Saved Proposals</div>
                  </div>
                  <div class="w-12 h-12 rounded-full border-[3px] border-black flex items-center justify-center p-1">
                     <div class="w-full h-full border-2 border-black border-dashed rounded-full flex items-center justify-center text-[8px] font-black font-mono text-center leading-none">DIR<br/>LOG</div>
                  </div>
               </div>
               
               <div class="relative border-2 border-black rounded-lg overflow-hidden flex items-center bg-[#F5F1E6]">
                  <i data-lucide="search" class="w-4 h-4 absolute left-3 text-gray-500"></i>
                  <input id="archive-search-input" type="text" placeholder="Filter proposals..." oninput="app.handleSearch(event)" value="${this.searchQuery.replace(/"/g, '&quot;')}" class="w-full py-2 pl-9 pr-8 text-sm font-medium focus:outline-none bg-transparent placeholder:text-gray-500 font-mono">
               </div>
            </div>
            <div id="archive-list-container" class="flex-1 scrollable no-scrollbar p-4 space-y-3 pb-8 min-h-0">
              ${this.htmlArchiveList()}
            </div>
          </div>
        `;
      },
      htmlArchiveList() {
        let disp = this.savedPitches;
        if (this.searchQuery) disp = disp.filter(p => p.title.toLowerCase().includes(this.searchQuery.toLowerCase()) || p.elements.artifact.title.toLowerCase().includes(this.searchQuery.toLowerCase()));
        if(disp.length === 0) return `<div class="text-center p-12 opacity-30 font-black uppercase tracking-widest font-mono border-2 border-dashed border-black rounded-xl">Empty Directory.</div>`;
        
        return disp.map(p => `
          <div onclick="app.currentPitch = app.savedPitches.find(x=>x.id==='${p.id}'); app.navigate('detail');" class="flex items-center p-3 border-[3px] border-black rounded-xl bg-white cursor-pointer hover:bg-[#E5E0D8] active:scale-95 transition-all shadow-[2px_2px_0_rgb(17,17,17)]">
            <div class="flex-1 min-w-0 pr-4">
              <h3 class="font-black text-sm uppercase truncate mb-1 font-serif">${p.title}</h3>
              <div class="text-[10px] font-mono opacity-60 truncate">${p.elements.artifact.title}</div>
            </div>
            <div class="flex flex-col items-end gap-1 shrink-0">
              <div class="flex items-center">${this.smallStarsHTML(p.rating)}</div>
              <div class="text-[9px] font-bold uppercase tracking-widest opacity-40 font-mono">${p.date}</div>
            </div>
          </div>
        `).join('');
      },

      htmlPromptModal() {
        if (!this.previewPrompt) return '';
        return `
          <div class="absolute inset-0 z-[60] flex flex-col bg-black/60 backdrop-blur-sm animate-[fadeIn_0.2s_ease-out]">
            <div class="flex-1" onclick="app.closePromptPreview()"></div>
            <div class="bg-[#F5F1E6] border-t-[4px] border-black h-[85%] rounded-t-3xl flex flex-col overflow-hidden transform transition-transform shadow-[0_-10px_40px_rgba(0,0,0,0.5)]">
              <div class="flex justify-between items-center p-4 border-b-[3px] border-black shrink-0 bg-white">
                <h3 class="text-sm font-black uppercase tracking-widest font-mono flex items-center">
                  <i data-lucide="file-text" class="w-4 h-4 mr-2 text-[#0E6B66]"></i> ${this.previewPrompt.title}
                </h3>
                <button onclick="app.closePromptPreview()" class="p-1 hover:bg-gray-200 rounded-full transition-colors"><i data-lucide="x" class="w-5 h-5"></i></button>
              </div>
              <div class="flex-1 scrollable no-scrollbar p-4 bg-zinc-50 relative min-h-0">
                <textarea id="preview-prompt-text" class="w-full h-full p-4 border-2 border-dashed border-gray-300 bg-white text-[10px] sm:text-xs font-mono leading-relaxed focus:outline-none focus:border-[#0E6B66] rounded resize-none" spellcheck="false">${this.previewPrompt.text}</textarea>
              </div>
              <div class="p-4 border-t-[3px] border-black bg-white shrink-0">
                <button onclick="app.copyToClipboard(document.getElementById('preview-prompt-text').value, this)" class="w-full py-4 border-[3px] border-black bg-[#E3A21A] text-black rounded-xl font-black uppercase font-mono shadow-[0_4px_0_rgb(17,17,17)] active:translate-y-[2px] active:shadow-none transition-all flex items-center justify-center">
                  <i data-lucide="copy" class="w-5 h-5 mr-2"></i> Copy Text to Clipboard
                </button>
              </div>
            </div>
          </div>
        `;
      },

      htmlDetail() {
        const p = this.currentPitch;
        if(!p) return '';
        return `
          <div class="flex flex-col h-full bg-[#E5E0D8] relative overflow-hidden min-h-0">
            <div class="flex justify-between items-center p-3 border-b-[3px] border-black bg-[#F5F1E6] shrink-0 z-10">
              <button onclick="app.navigate('archive')" class="flex items-center text-[10px] font-black uppercase tracking-widest font-mono hover:text-[#E3A21A] transition-colors">
                <i data-lucide="chevron-left" class="w-4 h-4 mr-1"></i> Back
              </button>
              <div class="flex items-center gap-4">
                <button onclick="app.deletePitch('${p.id}')" class="opacity-50 hover:text-[#B23A2E] transition-colors"><i data-lucide="trash-2" class="w-4 h-4"></i></button>
              </div>
            </div>

            <div class="flex-1 scrollable no-scrollbar p-4 pb-8 z-0 min-h-0">
               <div class="border-b-[3px] border-black pb-4 mb-4">
                  <div class="flex justify-between items-start mb-2">
                    <h1 class="text-3xl font-black uppercase leading-none max-w-[80%] font-serif">${p.title}</h1>
                  </div>
                  <p class="text-xs font-bold uppercase tracking-widest opacity-80 font-mono mb-3 text-[#B23A2E]">
                    [ ${p.elements.artifact.title} ]
                  </p>
                  <div class="flex items-center gap-3 mb-3">
                     <div class="flex gap-1 items-center z-10">${this.starsHTML(p.rating, p.id)}</div>
                     <span class="text-[10px] font-mono opacity-50">${p.rating > 0 ? p.rating + '.0' : 'Rate Concept'}</span>
                  </div>
               </div>

               <!-- Primary Syllabus Output -->
               <div class="mb-6">
                  <button onclick="app.openPromptPreview('Analytical Memo Draft', 'memo')" class="w-full py-4 border-[3px] border-black bg-white text-black rounded-xl font-black uppercase font-mono shadow-[4px_4px_0_rgb(17,17,17)] active:translate-y-[2px] active:shadow-[2px_2px_0_rgb(17,17,17)] transition-all flex items-center justify-center">
                    <i data-lucide="file-text" class="w-5 h-5 mr-2 text-[#0E6B66]"></i> Generate Analytical Memo
                  </button>
                  <p class="text-[10px] text-center mt-2 opacity-60 font-mono">Copies a pre-structured draft matching Part A, B, C, D of the rubric.</p>
               </div>

               <!-- Design Fiction Idiom Forges -->
               <div class="mb-6 border-t-2 border-dashed border-gray-400 pt-4">
                  <h3 class="text-[10px] font-black uppercase tracking-widest mb-3 opacity-60 font-mono text-[#E3A21A]">Visual / Fiction Prompts</h3>
                  <div class="grid grid-cols-2 gap-2 mb-2">
                     <button onclick="app.openPromptPreview('Product Image', 'image')" class="p-3 border-[2px] border-black bg-white rounded flex flex-col items-start hover:bg-black hover:text-white transition-colors text-left group">
                        <i data-lucide="image" class="w-4 h-4 mb-2 group-hover:text-[#E3A21A]"></i>
                        <span class="text-[10px] font-black uppercase font-mono">Product Image</span>
                        <span class="text-[8px] opacity-60 font-mono mt-1">Midjourney prompt</span>
                     </button>
                     <button onclick="app.openPromptPreview('Diegetic Prototype', 'diegetic')" class="p-3 border-[2px] border-black bg-white rounded flex flex-col items-start hover:bg-black hover:text-white transition-colors text-left group">
                        <i data-lucide="film" class="w-4 h-4 mb-2 group-hover:text-[#E3A21A]"></i>
                        <span class="text-[10px] font-black uppercase font-mono">Diegetic Script</span>
                        <span class="text-[8px] opacity-60 font-mono mt-1">Scene Friction</span>
                     </button>
                     <button onclick="app.openPromptPreview('Product Catalog', 'catalog')" class="p-3 border-[2px] border-black bg-white rounded flex flex-col items-start hover:bg-black hover:text-white transition-colors text-left group">
                        <i data-lucide="shopping-cart" class="w-4 h-4 mb-2 group-hover:text-[#E3A21A]"></i>
                        <span class="text-[10px] font-black uppercase font-mono">Product Catalog</span>
                        <span class="text-[8px] opacity-60 font-mono mt-1">Hyper-Commodity</span>
                     </button>
                  </div>
               </div>

               <!-- Syllabus Readings -->
               <div class="mb-4 border-t-2 border-dashed border-gray-400 pt-4">
                  <h3 class="text-[10px] font-black uppercase tracking-widest mb-3 opacity-60 font-mono">Course Interlocks</h3>
                  <div class="flex flex-col gap-2">
                     ${p.readings.map(r => `
                        <div class="text-[10px] p-2 border-[2px] border-black bg-[#F5F1E6] font-mono leading-tight">
                           <i data-lucide="book" class="w-3 h-3 inline mr-1 opacity-50"></i> ${r}
                        </div>
                     `).join('')}
                  </div>
               </div>

            </div>

            <!-- Inject Modal here -->
            ${this.htmlPromptModal()}

          </div>
        `;
      },

      // Initialization Hook
      render() {
        const root = document.getElementById('app-root');
        if (this.view === 'onboarding') root.innerHTML = this.htmlOnboarding();
        else if (this.view === 'play') root.innerHTML = this.htmlPlay();
        else if (this.view === 'result') root.innerHTML = this.htmlResult();
        else if (this.view === 'archive') root.innerHTML = this.htmlArchive();
        else if (this.view === 'detail') root.innerHTML = this.htmlDetail();

        this.renderNav();
        this.renderMenu();
        lucide.createIcons();
      },
      renderNav() { document.getElementById('nav-root').innerHTML = this.view === 'onboarding' ? '' : this.htmlNavBar(); lucide.createIcons(); },
      renderMenu() { document.getElementById('side-menu-root').innerHTML = this.htmlSideMenu(); lucide.createIcons(); },
      renderPlayCards() { const c = document.getElementById('play-cards-container'); if(c) { c.innerHTML = this.htmlPlayCards(); lucide.createIcons(); } },
      renderPlayActions() { const c = document.getElementById('play-actions-container'); if(c) { c.innerHTML = this.htmlPlayActions(); lucide.createIcons(); } },
      renderArchiveList() { const c = document.getElementById('archive-list-container'); if(c) { c.innerHTML = this.htmlArchiveList(); lucide.createIcons(); } },
    };

    window.onload = () => app.init();
  </script>
</body>
</html>
