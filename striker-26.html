<script>
"use strict";

function main(){
const HW=20,HL=30,CEIL=14, GOAL_HW=7,GOAL_H=5, CAR_R=1.7,BALL_R=1.6,SUM=CAR_R+BALL_R, REST_Y=0.7, PEN_Z=HL-11;

const BALL_REST=0.6,BALL_FRIC=0.985,MAXBALL=42, H=1/120;
const C_YOU=0x27d3c4,C_CPU=0xff8a3d,C_AMBER=0xffd23f,C_TEAL=0x27d3c4;

const renderer=new THREE.WebGLRenderer({canvas:$("#gl"),antialias:true,alpha:true});
renderer.setPixelRatio(Math.min(devicePixelRatio,2));renderer.setSize(innerWidth,innerHeight);
const scene=new THREE.Scene();

const sun=new THREE.DirectionalLight(0xffffff,0.65);sun.position.set(15,40,5);scene.add(sun);

function pitchTex(){const c=document.createElement("canvas");c.width=c.height=1024;const x=c.getContext("2d");
  x.fillStyle="#123a1c";x.fillRect(0,0,1024,1024);for(let i=0;i<16;i++){x.fillStyle=i%2?"#15441f":"#103619";x.fillRect(0,i*64,1024,64);}
  x.fillStyle="rgba(255,210,63,.16)";x.fillRect(0,0,1024,150);x.fillStyle="rgba(39,211,196,.14)";x.fillRect(0,874,1024,150);
  x.strokeStyle="rgba(255,255,255,.5)";x.lineWidth=5;x.strokeRect(40,40,944,944);x.beginPath();x.moveTo(40,512);x.lineTo(984,512);x.stroke();
  x.beginPath();x.arc(512,512,120,0,7);x.stroke();x.beginPath();x.arc(512,512,7,0,7);x.fillStyle="#fff";x.fill();x.strokeRect(330,40,364,150);x.strokeRect(330,834,364,150);const t=new THREE.CanvasTexture(c);t.anisotropy=4;return t;}
const floorMat=new THREE.MeshLambertMaterial({map:pitchTex(),transparent:true});
const floor=new THREE.Mesh(new THREE.PlaneGeometry(HW*2,HL*2),floorMat);floor.rotation.x=-Math.PI/2;scene.add(floor);
const wallMat=new THREE.MeshLambertMaterial({color:0x0c1220,transparent:true});
function wall(w,h,d,x,y,z){const m=new THREE.Mesh(new THREE.BoxGeometry(w,h,d),wallMat);m.position.set(x,y,z);scene.add(m);}
wall(HW*2+2,8,1,0,4,-HL-0.5);wall(HW*2+2,8,1,0,4,HL+0.5);wall(1,8,HL*2,-HW-0.5,4,0);wall(1,8,HL*2,HW+0.5,4,0);

trim(HW*2,1,0,-HL-0.5,C_AMBER);trim(HW*2,1,0,HL+0.5,C_TEAL);trim(1,HL*2,-HW-0.5,0,0x2a3550);trim(1,HL*2,HW+0.5,0,0x2a3550);
function goal(z,col){const g=new THREE.Group();const pm=new THREE.MeshBasicMaterial({color:col});const post=x=>{const p=new THREE.Mesh(new THREE.BoxGeometry(0.4,GOAL_H,0.4),pm);p.position.set(x,GOAL_H/2,z);g.add(p);};post(-GOAL_HW);post(GOAL_HW);const bar=new THREE.Mesh(new THREE.BoxGeometry(GOAL_HW*2+0.4,0.4,0.4),pm);bar.position.set(0,GOAL_H,z);g.add(bar);const glow=new THREE.Mesh(new THREE.PlaneGeometry(GOAL_HW*2,GOAL_H),new THREE.MeshBasicMaterial({color:col,transparent:true,opacity:0.18,blending:THREE.AdditiveBlending,depthWrite:false}));glow.position.set(0,GOAL_H/2,z);g.add(glow);scene.add(g);return glow;}
const glowT=goal(HL,C_AMBER),glowO=goal(-HL,C_TEAL);
function blob(r){const m=new THREE.Mesh(new THREE.CircleGeometry(r,20),new THREE.MeshBasicMaterial({color:0,transparent:true,opacity:0.32,depthWrite:false}));m.rotation.x=-Math.PI/2;m.position.y=0.02;scene.add(m);return m;}
function buildCar(col){const g=new THREE.Group();const body=new THREE.Mesh(new THREE.BoxGeometry(2.4,0.8,3.4),new THREE.MeshLambertMaterial({color:col}));body.position.y=0.7;g.add(body);const cab=new THREE.Mesh(new THREE.BoxGeometry(1.7,0.7,1.7),new THREE.MeshLambertMaterial({color:0x0a0d12}));cab.position.set(0,1.25,-0.2);g.add(cab);const nose=new THREE.Mesh(new THREE.BoxGeometry(2.0,0.5,0.8),new THREE.MeshBasicMaterial({color:col}));nose.position.set(0,0.6,1.8);g.add(nose);const wM=new THREE.MeshLambertMaterial({color:0x05070a});[[1.25,1.2],[-1.25,1.2],[1.25,-1.2],[-1.25,-1.2]].forEach(([x,z])=>{const w=new THREE.Mesh(new THREE.CylinderGeometry(0.55,0.55,0.45,14),wM);w.rotation.z=Math.PI/2;w.position.set(x,0.45,z);g.add(w);});scene.add(g);return g;}
const youCar=buildCar(C_YOU),cpuCar=buildCar(C_CPU),youSh=blob(1.8),cpuSh=blob(1.8);
const keeperMesh=new THREE.Mesh(new THREE.BoxGeometry(3.8,2.2,0.7),new THREE.MeshLambertMaterial({color:C_CPU}));keeperMesh.position.set(0,1.1,HL-0.8);keeperMesh.visible=false;scene.add(keeperMesh);
function ballTex(){const c=document.createElement("canvas");c.width=c.height=512;const x=c.getContext("2d");x.fillStyle="#fff";x.fillRect(0,0,512,512);x.fillStyle="#0a0d12";for(let i=0;i<6;i++)for(let j=0;j<3;j++){x.beginPath();x.arc(60+i*80+(j%2)*40,90+j*160,22,0,7);x.fill();}return new THREE.CanvasTexture(c);}
const ball=new THREE.Mesh(new THREE.SphereGeometry(BALL_R,28,20),new THREE.MeshLambertMaterial({map:ballTex()}));scene.add(ball);const ballSh=blob(BALL_R);
function sparkTex(){const c=document.createElement("canvas");c.width=c.height=64;const x=c.getContext("2d");const g=x.createRadialGradient(32,32,0,32,32,32);g.addColorStop(0,"#fff");g.addColorStop(.4,"#fff8");g.addColorStop(1,"#fff0");x.fillStyle=g;x.fillRect(0,0,64,64);return new THREE.CanvasTexture(c);}
const SPK=sparkTex();const POOL=[];for(let i=0;i<200;i++){const m=new THREE.SpriteMaterial({map:SPK,blending:THREE.AdditiveBlending,depthWrite:false,transparent:true});const s=new THREE.Sprite(m);s.visible=false;scene.add(s);POOL.push({s,vel:new THREE.Vector3(),life:0,max:1,g:0});}
let pi=0;function spark(p,col,sp,n,up,life,grav){for(let k=0;k<n;k++){const o=POOL[pi=(pi+1)%POOL.length];o.s.visible=true;o.s.position.copy(p);o.s.material.color.setHex(col);o.vel.set((Math.random()*2-1)*sp,Math.random()*up,(Math.random()*2-1)*sp);o.life=o.max=life*(0.6+Math.random()*0.6);o.g=grav;o.s.scale.setScalar(0.6+Math.random());}}
function updP(dt){for(const o of POOL){if(!o.s.visible)continue;o.life-=dt;if(o.life<=0){o.s.visible=false;continue;}o.vel.y-=o.g*dt;o.s.position.addScaledVector(o.vel,dt);const t=o.life/o.max;o.s.material.opacity=t;o.s.scale.setScalar((0.6+t)*1.1);}}

/* ambient (Eno) */
let AC=null,verb,dry,padGain,windGain,pad=[];
const PENT=[0,2,4,7,9];const NOTES=[];for(let oct=3;oct<=5;oct++)for(const p of PENT)NOTES.push(12*oct+p);
const hz=m=>440*Math.pow(2,(m-69)/12);
function impulse(sec,decay){const len=Math.floor(AC.sampleRate*sec);const b=AC.createBuffer(2,len,AC.sampleRate);for(let ch=0;ch<2;ch++){const d=b.getChannelData(ch);for(let i=0;i<len;i++)d[i]=(Math.random()*2-1)*Math.pow(1-i/len,decay);}return b;}
function audioInit(){if(AC)return;try{AC=new(window.AudioContext||window.webkitAudioContext)();const master=AC.createGain();master.gain.value=0;master.connect(AC.destination);master.gain.linearRampToValueAtTime(0.8,AC.currentTime+2.5);verb=AC.createConvolver();verb.buffer=impulse(4,2.4);const vg=AC.createGain();vg.gain.value=0.95;verb.connect(vg);vg.connect(master);dry=AC.createGain();dry.gain.value=0.45;dry.connect(master);const send=n=>{n.connect(verb);n.connect(dry);};padGain=AC.createGain();padGain.gain.value=0;send(padGain);padGain.gain.linearRampToValueAtTime(0.16,AC.currentTime+5);[NOTES[2],NOTES[5],NOTES[8]].forEach((m,i)=>{const o=AC.createOscillator();o.type=i?"sine":"triangle";o.frequency.value=hz(m);const g=AC.createGain();g.gain.value=0.06;o.connect(g);g.connect(padGain);o.start();const lfo=AC.createOscillator();lfo.frequency.value=0.04+Math.random()*0.05;const la=AC.createGain();la.gain.value=5;lfo.connect(la);la.connect(o.detune);lfo.start();pad.push({o,m});});const nb=AC.createBuffer(1,AC.sampleRate*2,AC.sampleRate);const nd=nb.getChannelData(0);for(let i=0;i<nd.length;i++)nd[i]=Math.random()*2-1;const w=AC.createBufferSource();w.buffer=nb;w.loop=true;const lp=AC.createBiquadFilter();lp.type="lowpass";lp.frequency.value=480;windGain=AC.createGain();windGain.gain.value=0;w.connect(lp);lp.connect(windGain);send(windGain);w.start();setInterval(drift,7000);chime();}catch(e){AC=null;}}
function drift(){if(!AC)return;const v=pad[Math.floor(Math.random()*pad.length)];const i=NOTES.indexOf(v.m);const ni=clamp(i+(Math.random()<0.5?-1:1),0,NOTES.length-1);v.m=NOTES[ni];v.o.frequency.linearRampToValueAtTime(hz(v.m),AC.currentTime+3.5);}
function bell(m,vel,dec){if(!AC)return;const f=hz(m),t=AC.currentTime,d=dec||2.8;const o=AC.createOscillator();o.type="sine";o.frequency.value=f;const o2=AC.createOscillator();o2.type="sine";o2.frequency.value=f*2.01;const g2=AC.createGain();g2.gain.value=vel*0.28;o2.connect(g2);const g=AC.createGain();g.gain.value=0;o.connect(g);g2.connect(g);g.connect(verb);g.connect(dry);g.gain.linearRampToValueAtTime(vel,t+0.012);g.gain.exponentialRampToValueAtTime(0.0008,t+d);o.start(t);o2.start(t);o.stop(t+d+0.1);o2.stop(t+d+0.1);}

const buzz=p=>{if(navigator.vibrate)navigator.vibrate(p);};

/* ---- DRIVE PAD input ---- */
let driveX=0,driveY=0,boostHeld=false,jumpQ=false;

const dz=$("#drivezone"),dBase=$("#driveBase"),dKnob=$("#driveKnob"),dLbl=$("#driveLbl");
const MAXR=66;let dcx=120,dcy=innerHeight-130,dId=null;

/* state */
const P={pos:new THREE.Vector3(),vel:new THREE.Vector3(),yaw:0,vy:0,boost:BOOST_FUEL,grounded:true,touch:false,maxMul:1,accMul:1,canBoost:true};
const A={pos:new THREE.Vector3(),vel:new THREE.Vector3(),yaw:Math.PI,vy:0,boost:BOOST_FUEL,grounded:true,touch:false,maxMul:0.68,accMul:0.82,canBoost:false};
const B={pos:new THREE.Vector3(0,BALL_R,0),vel:new THREE.Vector3()};
let mode="match",sYou=0,sCpu=0,practiceGoals=0,state="menu",celeb=0,shake=0;
const keeper={x:0};let pk={shot:0,results:[],phase:"ready",committed:false,diveTarget:0,t:0},pkBusy=false;

/* car physics : direction + throttle */
const F=new THREE.Vector3(),side=new THREE.Vector3();
function driveCar(car,wx,wy,boost,jump,dt){
  const mag=clamp(Math.hypot(wx,wy),0,1);let boosting=false;let dx=0,dz=0;if(mag>0.001){const inv=1/Math.hypot(wx,wy);dx=wx*inv;dz=wy*inv;}
  const acc=ACCEL*car.accMul;
  if(mag>0.12){car.vel.x+=dx*acc*mag*dt;car.vel.z+=dz*acc*mag*dt;}
  if(boost&&car.canBoost&&car.boost>0&&mag>0.12){car.vel.x+=dx*BOOST_ACC*dt;car.vel.z+=dz*BOOST_ACC*dt;car.boost-=BOOST_DRAIN*dt;boosting=true;}else car.boost=Math.min(BOOST_FUEL,car.boost+BOOST_REGEN*dt);
  const drag=(mag<0.12)?COAST:DRIVE_DRAG;car.vel.x*=Math.exp(-drag*dt);car.vel.z*=Math.exp(-drag*dt);
  const planar=Math.hypot(car.vel.x,car.vel.z),max=(boosting?BOOST_MAX:MAXSPD)*car.maxMul;if(planar>max){const s=max/planar;car.vel.x*=s;car.vel.z*=s;}
  car.pos.x+=car.vel.x*dt;car.pos.z+=car.vel.z*dt;
  if(planar>0.4){const ty=Math.atan2(car.vel.x,car.vel.z);car.yaw+=clamp(sa(ty,car.yaw),-12*dt,12*dt);}
  if(jump&&car.grounded){car.vy=JUMP_V;car.grounded=false;}car.vy-=GRAV*dt;car.pos.y+=car.vy*dt;if(car.pos.y<=REST_Y){car.pos.y=REST_Y;car.vy=0;car.grounded=true;}
  if(car.pos.x>HW-1){car.pos.x=HW-1;car.vel.x*=-0.2;}if(car.pos.x<-(HW-1)){car.pos.x=-(HW-1);car.vel.x*=-0.2;}
  if(car.pos.z>HL-1){car.pos.z=HL-1;car.vel.z*=-0.2;}if(car.pos.z<-(HL-1)){car.pos.z=-(HL-1);car.vel.z*=-0.2;}
  return boosting;}
function ballStep(dt){B.vel.y-=GRAV*dt;if(B.vel.length()>MAXBALL)B.vel.setLength(MAXBALL);B.pos.addScaledVector(B.vel,dt);
  if(B.pos.y<BALL_R){B.pos.y=BALL_R;B.vel.y*=-BALL_REST;B.vel.x*=BALL_FRIC;B.vel.z*=BALL_FRIC;if(Math.abs(B.vel.y)<1)B.vel.y=0;}
  if(B.pos.y>CEIL-BALL_R){B.pos.y=CEIL-BALL_R;B.vel.y*=-BALL_REST;}
  if(B.pos.x>HW-BALL_R){B.pos.x=HW-BALL_R;B.vel.x*=-BALL_REST;wf();}if(B.pos.x<-(HW-BALL_R)){B.pos.x=-(HW-BALL_R);B.vel.x*=-BALL_REST;wf();}
  if(B.pos.z>HL-BALL_R){if(Math.abs(B.pos.x)<GOAL_HW&&B.pos.y<GOAL_H)return scored("you");B.pos.z=HL-BALL_R;B.vel.z*=-BALL_REST;wf();}
  if(B.pos.z<-(HL-BALL_R)){if(Math.abs(B.pos.x)<GOAL_HW&&B.pos.y<GOAL_H)return scored("cpu");B.pos.z=-(HL-BALL_R);B.vel.z*=-BALL_REST;wf();}}
function wf(){if(B.vel.length()>11){shake=Math.max(shake,0.12);buzz(8);wallTone();spark(B.pos,0xffffff,3,4,3,0.35,8);}}
const N=new THREE.Vector3(),sdir=new THREE.Vector3(),cf=new THREE.Vector3();
function carBall(car,boosting){N.copy(B.pos).sub(car.pos);const d=N.length();
  if(d<SUM){N.divideScalar(d||1);B.pos.copy(car.pos).addScaledVector(N,SUM+0.01);cf.set(Math.sin(car.yaw),0,Math.cos(car.yaw));const spd=car.vel.length();
    if(!car.touch){sdir.copy(N).addScaledVector(cf,0.5).normalize();const power=12+spd*1.2+(boosting?11:0);B.vel.copy(sdir).multiplyScalar(power).addScaledVector(car.vel,0.3);B.vel.y+=4.5+(boosting?4:0);if(B.vel.length()>MAXBALL)B.vel.setLength(MAXBALL);shake=Math.max(shake,clamp(power*0.012,0,0.22));buzz(clamp(power,5,22));hitTone(power);spark(B.pos,boosting?C_AMBER:0xffffff,3,Math.round(power/3),4,0.45,9);
      if(mode==="pk"&&car===P&&pk.phase==="ready"){pk.phase="live";pk.committed=false;pk.t=performance.now();}}
    else B.vel.addScaledVector(N,spd*2.2*H);car.touch=true;}else car.touch=false;}
const aimP=new THREE.Vector3(),toT=new THREE.Vector3();
function aiInputs(){aimP.copy(B.pos).sub(new THREE.Vector3(0,0,-HL));aimP.y=0;aimP.normalize().multiplyScalar(3.8);aimP.add(B.pos);aimP.y=0;toT.copy(aimP).sub(A.pos);toT.y=0;toT.normalize();return{wx:toT.x,wy:toT.z,boost:false};}

function pkKeeper(dt){if(mode!=="pk"||pk.phase!=="live")return;const range=GOAL_HW-1.9;
  if(!pk.committed&&B.pos.z>HL-8&&B.vel.z>2){pk.committed=true;const tt=clamp((HL-B.pos.z)/Math.max(1,B.vel.z),0,1.2);pk.diveTarget=clamp(B.pos.x+B.vel.x*tt+(Math.random()*5-2.5),-range,range);}
  const tgt=pk.committed?pk.diveTarget:clamp(B.pos.x*0.6,-range,range);const sp=pk.committed?16:7;keeper.x=toward(keeper.x,tgt,sp*dt);keeperMesh.position.set(keeper.x,1.1,HL-0.8);
  if(B.pos.z>HL-2.3&&B.pos.y<2.4&&Math.abs(B.pos.x-keeper.x)<1.9+BALL_R){B.pos.z=HL-2.4;B.vel.z=-Math.abs(B.vel.z)*0.5-4;B.vel.x+=(B.pos.x-keeper.x)*2.5;spark(B.pos,0xffffff,4,8,4,0.4,8);shake=Math.max(shake,0.25);pkResolve("save");}}

const flash=$("#flash"),goaltxt=$("#goaltxt");
function gtxt(t,c,d){goaltxt.textContent=t;goaltxt.style.color=c;goaltxt.animate([{opacity:0,transform:"scale(.85)"},{opacity:1,transform:"scale(1)"},{opacity:1},{opacity:0}],{duration:d||1200});}
function scored(who){
  if(mode==="practice"){if(who==="you"){practiceGoals++;$("#modehud").textContent="PRACTICE · GOALS "+practiceGoals;flash.animate([{opacity:0.4},{opacity:0}],{duration:400});bloom();spark(B.pos.clone().setY(3),C_AMBER,7,16,8,0.9,7);}B.pos.set(0,7,0);B.vel.set((Math.random()*2-1)*3,0,(Math.random()*2-1)*3);return true;}
  if(mode==="pk"){if(who==="you")pkResolve("goal");return true;}
  if(who==="you"){sYou++;$("#s-you").textContent=sYou;gtxt("GOAL","#ffd23f",1500);}else{sCpu++;$("#s-cpu").textContent=sCpu;gtxt("CONCEDED","#ff8a3d",1500);}
  state="celeb";celeb=1.6;shake=0.4;buzz([30,30,60]);bloom();for(let i=0;i<4;i++)setTimeout(()=>spark(B.pos.clone().setY(2+Math.random()*4),who==="you"?C_AMBER:C_CPU,7,18,8,0.9,7),i*70);flash.animate([{opacity:0.5},{opacity:0}],{duration:700});return true;}
function renderPips(){const c=$("#pkpips");c.innerHTML="";for(let i=0;i<5;i++){const d=document.createElement("div");d.className="pip"+(i<pk.shot?(pk.results[i]==="goal"?" goal":" miss"):"");c.appendChild(d);}}
function pkResolve(kind){if(mode!=="pk"||pk.phase!=="live"||pkBusy)return;pkBusy=true;B.vel.multiplyScalar(0.2);const good=kind==="goal";pk.results[pk.shot]=good?"goal":"miss";gtxt(good?"GOAL":(kind==="save"?"SAVED":"MISS"),good?"#ffd23f":"#ff8a3d",1100);if(good){bloom();buzz([30,30,60]);spark(B.pos.clone().setY(3),C_AMBER,7,16,8,0.9,7);}else{bell(NOTES[1],0.12,2);buzz(20);}pk.shot++;renderPips();pk.phase="resolved";setTimeout(()=>{pkBusy=false;if(pk.shot>=5)pkDone();else pkNext();},1300);}
function pkNext(){pk.phase="ready";pk.committed=false;keeper.x=0;keeperMesh.position.set(0,1.1,HL-0.8);B.pos.set(0,BALL_R,PEN_Z);B.vel.set(0,0,0);P.pos.set(0,REST_Y,HL-16);P.yaw=0;P.vel.set(0,0,0);P.vy=0;P.touch=false;P.boost=BOOST_FUEL;$("#pklabel").textContent="PENALTY "+(pk.shot+1)+" / 5";}
function pkDone(){const g=pk.results.filter(r=>r==="goal").length;state="menu";$("#start .sub").textContent="PENALTIES · "+g+" / 5";$("#start").classList.remove("gone");}
function reset(){P.pos.set(0,REST_Y,-HL*0.5);P.yaw=0;P.vel.set(0,0,0);P.vy=0;A.pos.set(0,REST_Y,HL*0.5);A.yaw=Math.PI;A.vel.set(0,0,0);A.vy=0;B.pos.set(0,7,0);B.vel.set((Math.random()*2-1)*3,0,(Math.random()*2-1)*3);P.boost=A.boost=BOOST_FUEL;P.touch=A.touch=false;}
function setupMode(m){mode=m;cpuCar.visible=cpuSh.visible=(m==="match");keeperMesh.visible=(m==="pk");$("#score").style.display=(m==="match")?"flex":"none";$("#modehud").style.display=(m==="practice")?"block":"none";$("#pkhud").style.display=(m==="pk")?"flex":"none";sYou=sCpu=0;$("#s-you").textContent="0";$("#s-cpu").textContent="0";if(m==="pk"){pk={shot:0,results:[],phase:"ready",committed:false,diveTarget:0,t:0};pkBusy=false;renderPips();pkNext();}else if(m==="practice"){practiceGoals=0;$("#modehud").textContent="PRACTICE · GOALS 0";reset();}else reset();}

/* camera : follow ball, always frame player (zoom-to-fit) */
const focus=new THREE.Vector3(),tf=new THREE.Vector3();let camH=24,camB=13;
function updCam(dt){tf.copy(P.pos).add(B.pos).multiplyScalar(0.5);tf.y=0;focus.lerp(tf,1-Math.pow(0.003,dt));const spread=P.pos.distanceTo(B.pos);const wantH=clamp(19+spread*0.55+Math.max(0,B.pos.y)*0.5,19,40);const wantB=clamp(10+spread*0.32,10,24);camH+=(wantH-camH)*(1-Math.pow(0.01,dt));camB+=(wantB-camB)*(1-Math.pow(0.01,dt));const fx=clamp(focus.x,-(HW-4),HW-4),fz=clamp(focus.z,-(HL-6),HL-6);camera.position.set(fx,camH,fz-camB);camera.lookAt(fx,0,fz+camB*0.4);if(shake>0){camera.position.x+=(Math.random()*2-1)*shake;camera.position.y+=(Math.random()*2-1)*shake*0.5;camera.position.z+=(Math.random()*2-1)*shake*0.5;shake*=Math.pow(0.0001,dt);if(shake<0.01)shake=0;}}

/* AR */
let arOn=false,stream=null;const camEl=$("#cam");
function applyAR(on){arOn=on;camEl.style.display=on?"block":"none";renderer.setClearColor(0x05070a,on?0:1);scene.background=on?null:new THREE.Color(0x05070a);scene.fog=on?null:new THREE.Fog(0x05070a,60,120);floorMat.opacity=on?0.82:1;wallMat.opacity=on?0.22:1;$("#ar").classList.toggle("on",on);$("#ar").textContent=on?"AR ON":"AR";}
async function enableAR(){stream=await navigator.mediaDevices.getUserMedia({video:{facingMode:{ideal:"environment"}},audio:false});camEl.srcObject=stream;await camEl.play();applyAR(true);$("#note").textContent="";}
function disableAR(){if(stream){stream.getTracks().forEach(t=>t.stop());stream=null;}applyAR(false);}
$("#ar").addEventListener("click",async()=>{if(arOn)disableAR();else{try{await enableAR();}catch(e){$("#note").textContent="NO CAMERA";}}});
applyAR(false);

/* loop */
let prev=performance.now(),acc=0;
function frame(now){requestAnimationFrame(frame);let dt=(now-prev)/1000;prev=now;if(dt>0.1)dt=0.1;
  if(state==="play"||state==="celeb"){
    if(state==="play"){
      if(mode==="pk"&&pk.phase==="ready"){B.pos.set(0,BALL_R,PEN_Z);B.vel.set(0,0,0);}
      let wx=-driveX,wy=driveY;if(dId===null){let kx=0,ky=0;if(keys.KeyA||keys.ArrowLeft)kx-=1;if(keys.KeyD||keys.ArrowRight)kx+=1;if(keys.KeyW||keys.ArrowUp)ky+=1;if(keys.KeyS||keys.ArrowDown)ky-=1;if(kx||ky){wx=-kx;wy=ky;}}
      const boostNow=boostHeld||keys.ShiftLeft||keys.ShiftRight;let jump=jumpQ;jumpQ=false;
      const ballLive=(mode!=="pk")||pk.phase==="live";const ai=(mode==="match")?aiInputs():null;
      acc+=dt;let steps=0;
      while(acc>=H&&steps<6){const pB=driveCar(P,wx,wy,boostNow,jump,H);jump=false;let aB=false;if(ai)aB=driveCar(A,ai.wx,ai.wy,ai.boost,false,H);if(ballLive)ballStep(H);carBall(P,pB);if(ai)carBall(A,aB);if(pB){F.set(Math.sin(P.yaw),0,Math.cos(P.yaw));spark(P.pos.clone().addScaledVector(F,-1.8).setY(0.7),C_AMBER,0.5,1,1.2,0.2,2);}acc-=H;steps++;}
      if(steps>=6)acc=0;
      if(mode==="pk"&&pk.phase==="live"){pkKeeper(dt);const dt2=performance.now()-pk.t;if(dt2>5000||(B.vel.length()<2.5&&B.pos.y<=BALL_R+0.1&&dt2>800)||(B.pos.z<PEN_Z-4&&dt2>500))pkResolve("miss");}
      if(AC){const sn=P.vel.length()/BOOST_MAX;windGain.gain.setTargetAtTime(clamp(sn*0.05+(boostNow&&P.boost>0?0.03:0),0,0.08),AC.currentTime,0.1);}
    } else {celeb-=dt;if(celeb<=0){reset();state="play";}}
    ball.position.copy(B.pos);ball.rotation.x+=B.vel.z*dt*0.4;ball.rotation.z-=B.vel.x*dt*0.4;ballSh.position.set(B.pos.x,0.02,B.pos.z);const bsc=clamp(1-(B.pos.y-BALL_R)*0.05,0.4,1);ballSh.scale.setScalar(bsc);ballSh.material.opacity=0.32*bsc;
    youCar.position.set(P.pos.x,P.pos.y-REST_Y,P.pos.z);youCar.rotation.y=P.yaw;youSh.position.set(P.pos.x,0.02,P.pos.z);
    if(cpuCar.visible){cpuCar.position.set(A.pos.x,A.pos.y-REST_Y,A.pos.z);cpuCar.rotation.y=A.yaw;cpuSh.position.set(A.pos.x,0.02,A.pos.z);}
    const pulse=0.16+Math.sin(now*0.003)*0.05;glowT.material.opacity=pulse;glowO.material.opacity=pulse;
    const bp=P.boost/BOOST_FUEL*100;const be=$("#boost");be.style.width=bp+"%";be.classList.toggle("full",bp>99);}
  updP(dt);updCam(dt);renderer.render(scene,camera);}
defaultDrive();requestAnimationFrame(frame);

function start(m){audioInit();setupMode(m);state="play";$("#start").classList.add("gone");$("#start .sub").textContent="SELECT MODE";buzz(16);}
$("#m-match").addEventListener("click",()=>start("match"));$("#m-practice").addEventListener("click",()=>start("practice"));$("#m-pk").addEventListener("click",()=>start("pk"));
$("#menu").addEventListener("click",()=>{state="menu";$("#start").classList.remove("gone");$("#start .sub").textContent="SELECT MODE";});
addEventListener("resize",()=>{camera.aspect=innerWidth/innerHeight;camera.updateProjectionMatrix();renderer.setSize(innerWidth,innerHeight);if(dId===null)defaultDrive();});
}
</script>
