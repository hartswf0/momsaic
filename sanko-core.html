<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>LMC 2400: Course OS (Sankofa Lab)</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;900&family=Playfair+Display:wght@700;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">

  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            teal: '#0E6B66',
            amber: '#E3A21A',
            red: '#B23A2E',
            black: '#111111',
            parchment: '#F5F1E6',
            darkParchment: '#E5E0D8',
          },
          fontFamily: {
            sans: ['Inter', 'system-ui', 'sans-serif'],
            serif: ['"Playfair Display"', 'Georgia', 'serif'],
            mono: ['"Space Mono"', 'ui-monospace', 'SFMono-Regular', 'monospace'],
          }
        }
      }
    }
  </script>
  
  <style>
    html, body { 
      position: fixed; inset: 0; width: 100vw; height: 100dvh; margin: 0; padding: 0;
      overflow: hidden; background-color: #18181b; color: #111111; overscroll-behavior: none; touch-action: none;
    }
    .scrollable { overflow-y: auto; -webkit-overflow-scrolling: touch; overscroll-behavior-y: contain; touch-action: pan-y; }
    .perspective-1000 { perspective: 1000px; }
    .transform-style-3d { transform-style: preserve-3d; }
    .backface-hidden { backface-visibility: hidden; }
    .rotate-y-180 { transform: rotateY(180deg); }
    .no-scrollbar::-webkit-scrollbar { display: none; }
    .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    .bg-noise { background-image: url("data:image/svg+xml,%3Csvg width='100' height='100' viewBox='0 0 100 100' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100' height='100' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E"); }

    @media print {
      @page { margin: 0.25in; }
      html, body { position: static !important; overflow: visible !important; background-color: white !important; -webkit-print-color-adjust: exact; color: #000 !important; touch-action: auto !important; height: auto !important; width: auto !important; }
      #wrapper { display: none !important; }
      #print-container { display: block !important; width: 100%; }
      .print-page { height: 10in; width: 100%; margin: 0 auto; page-break-after: always; display: grid; grid-template-columns: repeat(2, 1fr); grid-template-rows: repeat(4, 1fr); gap: 0; box-sizing: border-box; }
      .print-cut-zone { border: 1px dashed #ccc; padding: 0.25in; display: flex; box-sizing: border-box; height: 100%; width: 100%; page-break-inside: avoid; break-inside: avoid; }
      .print-card { border: 2px solid #111; border-radius: 8px; padding: 12px; display: flex; flex-direction: column; justify-content: space-between; background-color: white !important; width: 100%; height: 100%; box-sizing: border-box; position: relative; }
      .print-card-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 4px; }
      .print-card-suit { display: flex; align-items: center; gap: 6px; font-size: 10px; font-family: 'Space Mono', monospace; font-weight: bold; text-transform: uppercase; color: #111 !important; }
      .print-card-id { font-size: 10px; font-family: 'Space Mono', monospace; color: #666 !important; }
      .print-card-title { font-size: 16px; font-family: 'Playfair Display', serif; font-weight: 900; text-transform: uppercase; line-height: 1.1; text-align: center; margin: auto 0; color: #000 !important;}
      .print-card-desc { font-size: 10px; font-family: 'Inter', sans-serif; text-align: center; border-top: 1px solid #ccc; padding-top: 6px; color: #333 !important; }
      .print-card-author { font-size: 8px; font-family: 'Space Mono', monospace; color: #666 !important; text-align: center; margin-top: 4px; }
    }
    @media screen { #print-container { display: none !important; } }
  </style>
</head>
<body class="font-sans text-black">

  <div id="wrapper" class="fixed inset-0 w-full h-[100dvh] bg-[#18181b] flex justify-center items-center sm:p-6 md:p-12 overflow-hidden pointer-events-none z-0">
    <div id="app-container" class="pointer-events-auto w-full h-full sm:max-h-[95vh] sm:max-w-[480px] lg:max-w-[720px] sm:rounded-[2.5rem] overflow-hidden flex flex-col relative shadow-[0_20px_50px_rgba(0,0,0,0.8)] border-0 sm:border-[8px] border-zinc-800 bg-parchment bg-noise text-black min-h-0">
      <div id="app-root" class="flex-1 overflow-hidden relative flex flex-col min-h-0"></div>
      <div id="nav-root" class="shrink-0 z-40 bg-white relative"></div>
      <div id="side-menu-root"></div>
      <div id="wildcard-modal-root"></div>
    </div>
  </div>

  <div id="print-container"></div>

  <script>
    // --- LMC 2400 COURSE OS DATABASE (Sourced directly from syllabus JSON) ---
    const DATABASE = {
      problems: [
        { id: 'pb1', title: 'Platform Enshittification', desc: 'Platforms start by offering value, then shift to extracting it, ending in degraded user experiences.', author: 'Cory Doctorow', url: 'https://www.wired.com/story/tiktok-platforms-cory-doctorow/' },
        { id: 'pb2', title: 'Algorithmic Bias', desc: 'Opaque machine models encoding and accelerating systemic racial and gender prejudices.', author: 'Joy Buolamwini / Safiya Noble', url: 'https://proceedings.mlr.press/v81/buolamwini18a/buolamwini18a.pdf' },
        { id: 'pb3', title: 'The IRL Fetish', desc: 'The false "digital dualism" belief that "real life" exists in pure disconnection from media.', author: 'Nathan Jurgenson', url: 'https://thenewinquiry.com/the-irl-fetish/' },
        { id: 'pb4', title: 'Loss of Aura', desc: 'Mechanical and algorithmic reproduction decoupling culture from its time, place, and authenticity.', author: 'Walter Benjamin', url: 'https://web.mit.edu/allanmc/www/benjamin.pdf' },
        { id: 'pb5', title: 'The Attention Economy', desc: 'Algorithmic feeds engineered to devour cognitive bandwidth and drive individualism over collective action.', author: 'Adam Curtis / Ezra Klein', url: 'https://www.youtube.com/watch?v=cZO1B4fZlOw' },
        { id: 'pb6', title: 'AI Slop & Brainrot', desc: 'Generative AI flooding the internet with low-friction, unrecognizable spam, eroding cultural production.', author: 'John Oliver / Hard Fork', url: 'https://www.youtube.com/watch?v=TWpg1RmzAbc' },
        { id: 'pb7', title: 'Invisible Custodians', desc: 'Opaque content moderation policies that silently dictate acceptable thought, behavior, and structural power.', author: 'Tarleton Gillespie', url: 'https://www.researchgate.net/profile/Tarleton-Gillespie' },
        { id: 'pb8', title: 'Context Collapse', desc: 'The flattening of nuanced communication into a surveilled global feed, making protest movements fragile.', author: 'Zeynep Tufekci', url: 'https://www.wired.com/2017/05/twitter-tear-gas-protest-age-social-media/' }
      ],
      practices: [
        { id: 'pr1', title: 'Sympathetic Magic', desc: 'Using physical tokens and rituals (Similarity & Contagion) to assert agency over complex systems.', author: 'James George Frazer', url: 'https://www.templeofearth.com/books/goldenbough.pdf' },
        { id: 'pr2', title: 'Primary Orality', desc: 'Memory preservation requiring physical presence, listening, and communal repetition rather than text.', author: 'Walter J. Ong', url: 'https://monoskop.org/images/d/db/Ong_Walter_J_Orality_and_Literacy_2nd_ed.pdf' },
        { id: 'pr3', title: 'The Memex Trail', desc: 'Non-linear, user-directed associative trail-building for organizing and linking knowledge.', author: 'Vannevar Bush', url: 'https://www.theatlantic.com/magazine/archive/1945/07/as-we-may-think/303881/' },
        { id: 'pr4', title: 'Black Twitter Vernaculars', desc: 'Mobilizing platform affordances to create a public sphere rooted in cultural oral traditions and resistance.', author: 'André Brock Jr.', url: 'https://www.researchgate.net/profile/Andre-Brock' },
        { id: 'pr5', title: 'Cyborg Kinship', desc: 'Rejecting extraction to build protocols of respect, reciprocity, and relational accountability with machines.', author: 'Jason E. Lewis / Donna Haraway', url: 'https://jods.mitpress.mit.edu/pub/lewis-arista-pechawis-kite/release/1' },
        { id: 'pr6', title: 'Hyperstition', desc: 'Speculative fictions that make themselves real by injecting traces of the future into the present via belief.', author: 'CCRU', url: 'http://www.ccru.net/id(entity)/ccruhistory.htm' },
        { id: 'pr7', title: 'Participatory Design', desc: 'Collaborative world-building grounded in local cultural values, storytelling, and neighborhood context.', author: 'Ben Caldwell / Karl Baumann', url: 'https://vimeo.com/211625350' },
        { id: 'pr8', title: 'Adversarial Design', desc: 'Luddite-inspired sabotage and design that confronts media systems to re-center labor and human agency.', author: 'Carl DiSalvo', url: 'https://mitpress.mit.edu/9780262528221/adversarial-design/' }
      ],
      functions: [
        { id: 'fn1', title: 'Operative Ekphrasis', desc: 'Using language not as description, but as a performative, generative command to build visual worlds.', author: 'Hannes Bajohr', url: 'https://doi.org/10.1080/02666286.2024.2330335' },
        { id: 'fn2', title: 'Procedural Rhetoric', desc: 'Making arguments and persuading users through coded rules and interactive constraints.', author: 'Ian Bogost', url: 'https://luisnavarrete.com/USC/pdf/Bogost2.pdf' },
        { id: 'fn3', title: 'Ritual Belonging', desc: 'Communication not as transmitting info, but as creating shared cultural reality and connection.', author: 'James W. Carey', url: 'https://web.mit.edu/21l.432/www/readings/Carey_CulturalApproachCommunication.pdf' },
        { id: 'fn4', title: 'Adversarial Decoding', desc: 'Allowing communities to read and operate against the dominant, encoded ideology of a platform.', author: 'Stuart Hall', url: 'https://spstudentenhancement.files.wordpress.com/2015/03/stuart-hall-1980.pdf' },
        { id: 'fn5', title: 'Ontological Presence', desc: 'Restoring an indexical, physical relationship to reality that preserves existence beyond digital decay.', author: 'André Bazin', url: 'https://badspaceusao.wordpress.com/wp-content/uploads/2018/12/Bazin-Ontology-Photographic-Image.pdf' },
        { id: 'fn6', title: 'Attentional Sovereignty', desc: 'Reclaiming the right to structure one’s own focus, utilizing silence and absence as active mediums.', author: 'John Cage / R. M. Schafer', url: 'https://monoskop.org/images/b/b5/Cage_John_Silence_Lectures_and_Writings.pdf' },
        { id: 'fn7', title: 'Technogenesis', desc: 'Embracing the cognitive co-evolution of humans with our digital and technical environments.', author: 'N. Katherine Hayles', url: 'https://dms484.wordpress.com/wp-content/uploads/2017/01/hayles-how-we-think.pdf' },
        { id: 'fn8', title: 'Hauntological Crackle', desc: 'Allowing the ghosts and disjunctions of historical trauma to remain audible in present media.', author: 'Mark Fisher', url: 'https://dj.dancecult.net/index.php/dancecult/article/view/378' }
      ],
      artifacts: [
        { id: 'ar1', title: 'Diegetic Prototype', desc: 'A tangible artifact from a speculative near-future that provokes ethical reflection without overt narrative.', author: 'Julian Bleecker', url: 'https://systemsorienteddesign.net/wp-content/uploads/2011/01/DesignFiction_WebEdition.pdf' },
        { id: 'ar2', title: 'Community AR Node', desc: 'Localized augmented reality architecture designed to anchor community history and alternative futures.', author: 'Karl Baumann / Sankofa City', url: 'https://vimeo.com/211625350' },
        { id: 'ar3', title: 'Speculative Art Book', desc: 'A physical, limited-edition publication that archives and seeds future worlds through tactile media.', author: 'Afrotectopia (Black Metal)', url: 'https://www.afrotectopia.org/' },
        { id: 'ar4', title: 'Neural Media Text', desc: 'A collaborative, co-written text blending human philosophy, ecological thought, and generative LLM outputs.', author: 'K. Allado-McDowell', url: 'https://www.are.na/block/21398733' },
        { id: 'ar5', title: 'Predictive Algorithmic Object', desc: 'A constantly evolving data ledger that acquires volition to nudge human behavior and track biometrics.', author: 'Google X (The Selfish Ledger)', url: 'https://www.youtube.com/watch?v=LUSZfEBTwRc' },
        { id: 'ar6', title: 'Procedural Simulation', desc: 'An interactive system designed to model interconnectedness, shifting perspectives, and hidden systemic bias.', author: 'David O\'Reilly (Everything)', url: 'https://www.youtube.com/watch?v=JYHp8LwBUzo' },
        { id: 'ar7', title: 'Sonic Monument', desc: 'An acoustic ecology project that translates artificial or algorithmic inputs into a public, physical soundscape.', author: 'R. Murray Schafer', url: 'https://monoskop.org/images/d/d4/Schafer_R_Murray_The_Soundscape_Our_Sonic_Environment_and_the_Tuning_of_the_World_1994.pdf' },
        { id: 'ar8', title: 'Cybernetic Generative Film', desc: 'A dynamic, feedback-driven moving image environment combining algorithms, neural sensing, and aesthetic intent.', author: 'Gene Youngblood', url: 'https://monoskop.org/images/4/40/Youngblood_Gene_Expanded_Cinema_no_OCR.pdf' }
      ],
      tags: ['REMEDIATION', 'HAUNTOLOGY', 'CYBERNETICS', 'TECHNOGENESIS', 'SEMIOTICS', 'AURA', 'ORALITY', 'KINSHIP', 'ENSHITTIFICATION', 'HYPERSTITION', 'AFROFUTURISM', 'ATTENTION']
    };

    // --- SYSTEM LOGIC ---
    const app = {
      view: 'onboarding',
      savedPitches: JSON.parse(localStorage.getItem('sankofa_lmc2400_os_v4')) || [],
      isFastMode: false,
      isMenuOpen: false,
      isWildcardMode: false, 
      round: 1,
      cardsFlipped: [false, false, false, false],
      currentDeck: { problem: null, practice: null, func: null, artifact: null },
      currentPitch: null,
      archiveTab: 'ALL',
      searchQuery: '',
      isPlaying: false,
      audioProgress: 0,
      utterance: null,
      previewPrompt: null, 
      editingCategory: null, 

      init() { this.render(); },
      navigate(newView) {
        if(this.view === 'result' && newView !== 'result') this.handleStopSpeak();
        this.view = newView; this.isMenuOpen = false; this.searchQuery = ''; this.previewPrompt = null; this.editingCategory = null;
        this.render();
      },

      getRandomItem(arr) { return arr[Math.floor(Math.random() * arr.length)]; },
      getRandomTags(count = 3) { return [...DATABASE.tags].sort(() => 0.5 - Math.random()).slice(0, count); },
      
      generateNewDeck() {
        return {
          problem: this.getRandomItem(DATABASE.problems),
          practice: this.getRandomItem(DATABASE.practices),
          func: this.getRandomItem(DATABASE.functions),
          artifact: this.getRandomItem(DATABASE.artifacts)
        };
      },

      startNewRound() {
        this.currentDeck = this.generateNewDeck();
        this.cardsFlipped = this.isFastMode ? [true, true, true, true] : [false, false, false, false];
        this.round += 1;
        this.isWildcardMode = false;
        this.navigate('play');
      },
      
      toggleFastMode() { this.isFastMode = !this.isFastMode; this.render(); },
      toggleMenu() { this.isMenuOpen = !this.isMenuOpen; this.renderMenu(); },
      
      handleCardClick(index, category) {
        if (!this.cardsFlipped[index]) {
          this.cardsFlipped[index] = true;
          this.renderPlayCards(); this.renderPlayActions();
        } else {
          this.cardsFlipped[index] = false;
          this.renderPlayCards(); this.renderPlayActions();
          setTimeout(() => {
            this.currentDeck[category] = this.getRandomItem(DATABASE[category === 'func' ? 'functions' : category + 's']);
            setTimeout(() => { this.cardsFlipped[index] = true; this.renderPlayCards(); this.renderPlayActions(); }, 100);
          }, 300);
        }
      },
      
      shuffleDeck() {
        if(this.isWildcardMode) {
            document.getElementById('wc-prob-title').value = '';
            document.getElementById('wc-prob-author').value = '';
            document.getElementById('wc-prac-title').value = '';
            document.getElementById('wc-prac-author').value = '';
            document.getElementById('wc-func-title').value = '';
            document.getElementById('wc-func-author').value = '';
            document.getElementById('wc-art-title').value = '';
            document.getElementById('wc-art-author').value = '';
            return;
        }
        this.cardsFlipped = [false, false, false, false];
        this.renderPlayCards(); this.renderPlayActions();
        setTimeout(() => {
          this.currentDeck = this.generateNewDeck();
          if (this.isFastMode) {
            setTimeout(() => { this.cardsFlipped = [true, true, true, true]; this.renderPlayCards(); this.renderPlayActions(); }, 100);
          } else { this.renderPlayCards(); }
        }, 300);
      },

      // WILDCARD SYSTEM
      openWildcardModal(category, e) {
        e.stopPropagation();
        this.editingCategory = category;
        this.renderWildcardModal();
      },
      closeWildcardModal() {
        this.editingCategory = null;
        document.getElementById('wildcard-modal-root').innerHTML = '';
      },
      saveWildcard() {
        const title = document.getElementById('wc-title').value || 'Custom Variable';
        const desc = document.getElementById('wc-desc').value || 'User injected parameter.';
        const author = document.getElementById('wc-author').value || 'Independent Study';
        const url = document.getElementById('wc-url').value || '';
        
        this.currentDeck[this.editingCategory] = {
          id: 'WILD',
          title, desc, author, url, isWildcard: true
        };
        
        this.closeWildcardModal();
        this.renderPlayCards();
      },

      generateWildcardPitch() {
        const val = (id) => document.getElementById(id).value || 'User Defined';
        this.currentDeck = {
          problem: { title: val('wc-prob-title'), desc: 'User specified failure', author: val('wc-prob-author'), url: '#' },
          practice: { title: val('wc-prac-title'), desc: 'User specified practice', author: val('wc-prac-author'), url: '#' },
          func: { title: val('wc-func-title'), desc: 'User specified logic', author: val('wc-func-author'), url: '#' },
          artifact: { title: val('wc-art-title'), desc: 'User specified artifact', author: val('wc-art-author'), url: '#' }
        };
        this.generatePitch();
      },
      
      generatePitch() {
        const p = this.currentDeck;
        const summary = `A speculative ${p.artifact.title.toLowerCase()} that tackles the crisis of ${p.problem.title.toLowerCase()}. By reviving the media logic of ${p.practice.title.toLowerCase()}, it restores ${p.func.title.toLowerCase()} to the system.`;
        const prefixes = ["Project", "Protocol", "The", "Speculative", "Network", "Proxy"];
        const title = this.isWildcardMode && p.artifact.title === 'User Defined' 
            ? "Custom Project Idea" 
            : `${prefixes[Math.floor(Math.random() * prefixes.length)]} ${p.artifact.title.split(' ')[0]} ${p.practice.title.split(' ')[0]}`;
        
        this.currentPitch = {
          id: Date.now().toString(),
          title, summary, 
          tags: this.getRandomTags(),
          date: new Date().toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' }),
          rating: 0,
          notes: "", 
          elements: p
        };
        this.savePitch();
        this.navigate('result');
      },
      
      savePitch(pitchToSave = this.currentPitch) {
        if (!this.savedPitches.find(p => p.id === pitchToSave.id)) {
          this.savedPitches = [pitchToSave, ...this.savedPitches];
        } else {
          this.savedPitches = this.savedPitches.map(p => p.id === pitchToSave.id ? pitchToSave : p);
        }
        localStorage.setItem('sankofa_lmc2400_os_v4', JSON.stringify(this.savedPitches));
      },
      updateNotes(val) {
        if(this.currentPitch) {
          this.currentPitch.notes = val;
          this.savePitch();
        }
      },
      ratePitch(id, rating) {
        this.savedPitches = this.savedPitches.map(p => p.id === id ? { ...p, rating } : p);
        if (this.currentPitch && this.currentPitch.id === id) { this.currentPitch.rating = rating; }
        localStorage.setItem('sankofa_lmc2400_os_v4', JSON.stringify(this.savedPitches));
        if(this.view === 'detail') this.render();
      },
      deletePitch(id) {
        if(confirm("Delete this log?")) {
          this.savedPitches = this.savedPitches.filter(p => p.id !== id);
          localStorage.setItem('sankofa_lmc2400_os_v4', JSON.stringify(this.savedPitches));
          this.navigate('archive');
        }
      },
      copyToClipboard(text, btnElement) {
        const textArea = document.createElement("textarea"); textArea.value = text;
        textArea.style.position = "fixed"; textArea.style.top = "0"; textArea.style.left = "0";
        document.body.appendChild(textArea); textArea.focus(); textArea.select();
        try { 
            document.execCommand('copy'); 
            if(btnElement) {
                const origHTML = btnElement.innerHTML;
                btnElement.innerHTML = `<i data-lucide="check" class="w-5 h-5 mr-2"></i> Copied!`; lucide.createIcons();
                setTimeout(() => { btnElement.innerHTML = origHTML; lucide.createIcons(); }, 2000);
            }
        } catch (err) { console.error('Copy failed'); }
        document.body.removeChild(textArea);
      },
      openSourceLink(url, e) {
        if(e) e.stopPropagation();
        if(url && url !== '#') window.open(url, '_blank');
      },
      
      // COURSE OS: ACADEMIC FORGE GENERATORS (Now utilizing References & Sandbox Notes)
      getPromptText(type) {
        if (!this.currentPitch) return "";
        const p = this.currentPitch.elements;
        const art = this.currentPitch.title;
        const notes = this.currentPitch.notes ? `\n[ STUDENT STUDIO NOTES ]\n${this.currentPitch.notes}\n` : '';

        const header = `[ LMC 2400 SANKOFA FUTURES EXCAVATION ]\n` +
                       `• Speculative Title: ${art}\n` +
                       `• Present Media Failure: ${p.problem.title} (Theory context: ${p.problem.author})\n` +
                       `• Historical Recovery: ${p.practice.title} (Theory context: ${p.practice.author})\n` +
                       `• Restored Logic: ${p.func.title} (Theory context: ${p.func.author})\n` +
                       `• Artifact Base Form: ${p.artifact.title} (Theory context: ${p.artifact.author})\n` +
                       notes +
                       `--------------------------------------------------\n\n`;

        let prompt = "";

        switch(type) {
          case 'memo':
            prompt = `Prompt Operator: ACADEMIC ADVISOR (LMC 2400)\n\nGenerate a detailed structural outline for a 1000-1500 word "Analytical Memo" based on the project parameters above.\n\nREQUIREMENTS:\nProvide bulleted talking points for each section, integrating the specified theorists/authors and any Student Studio Notes provided:\n\nA. The Recovery: Using the theories of [${p.practice.author}], explain why [${p.practice.title}] mattered historically and how it was erased.\nB. The Present Failure: Using the theories of [${p.problem.author}], diagnose the current crisis of [${p.problem.title}]. Who benefits? Who pays the cost?\nC. The Design: Explain how the [${p.artifact.title}] carries the older practice forward to restore [${p.func.title}] (Ref: ${p.func.author}).\nD. The Barriers: Identify structural obstacles (law, platform incentives, labor) preventing adoption.\nE. Course Connections: Ensure the outline heavily utilizes the authors listed in the prompt header to justify the design choices.`;
            break;
          case 'video':
            prompt = `Prompt Operator: VIDEO PRESENTATION SCRIPTWRITER\n\nCreate a tight, highly-focused script outline for a 3-5 minute asynchronous Video Presentation of the "${art}".\n\nREQUIREMENTS:\nDo not write vague introductions. Frame it as a rigorous design pitch integrating LMC 2400 concepts and my Student Studio Notes.\n\nTIMECODES:\n1. 0:00–0:45 The Recovery: Script a hook explaining the logic of [${p.practice.title}] referencing [${p.practice.author}].\n2. 0:45–1:15 The Failure: Clearly define [${p.problem.title}] using contemporary examples and concepts from [${p.problem.author}].\n3. 1:15–3:15 The Artifact (VISUAL DEMO): Provide scene notes on exactly what the viewer is seeing on screen as we demonstrate the [${p.artifact.title}]. Focus on how the user interacts with it to achieve [${p.func.title}].\n4. 3:15–4:00+ The Payoff and Barrier: Conclude with what changes if adopted, and the primary structural barrier standing in the way.`;
            break;
          case 'artifact':
            prompt = `Prompt Operator: DIEGETIC PROTOTYPE DESIGNER\n\nWrite a specific, grounded "Artifact Manifest" to help me physically/digitally build the "${art}".\n\nAXIOM: The future cannot be theorized; it must be rendered as a usable object. Draw on the design fiction principles of [${p.artifact.author}].\n\nREQUIREMENTS:\nDescribe the [${p.artifact.title}] in granular detail as if it exists today to solve [${p.problem.title}] via [${p.practice.title}]. Integrate my Student Studio Notes.\n\nOUTPUT:\n1. Form Factor & Materials (Is it code, paper, hardware, a policy? What does it look/feel like?)\n2. The Core Interaction Loop (Step-by-step: what does the user actually do?)\n3. Evidence of "Wear and Tear" (How does restoring [${p.func.title}] leave a physical or digital mark on the object over time?)\n4. Suggest 3 specific visual/textual elements I must include when building my mockup/prototype to make it convincing.`;
            break;
          case 'lens':
            prompt = `Prompt Operator: LENS ANALYST\n\nAnalyze this project concept through the three specific lenses of the LMC 2400 assignment. Use the theorists provided in the prompt header and my Student Studio Notes to ground the analysis:\n\n1. Remediation and Retrofuture: How does it adapt [${p.practice.title}] for a future-facing design?\n2. Resistance and Alternative Histories: How does it confront the current system of [${p.problem.title}]?\n3. Collective Imagination: How does it recover shared media practices that current systems have privatized?\n\nConclude by recommending which of the three lenses is the STRONGEST framing for this specific project.`;
            break;
        }

        return header + prompt;
      },

      openPromptPreview(title, type) { this.previewPrompt = { title, text: this.getPromptText(type) }; this.render(); },
      closePromptPreview() { this.previewPrompt = null; this.render(); },

      // TTS
      toggleTTS() { if (this.isPlaying) this.handleStopSpeak(); else if (this.currentPitch) this.handleSpeak(this.currentPitch.summary); },
      handleSpeak(text) {
        if ('speechSynthesis' in window) {
          window.speechSynthesis.cancel();
          this.utterance = new SpeechSynthesisUtterance(text);
          this.utterance.onboundary = (e) => { if (e.name === 'word') this.updateAudioProgress((e.charIndex / text.length) * 100); };
          this.utterance.onend = () => { this.isPlaying = false; this.updateAudioProgress(100); setTimeout(() => this.updateAudioProgress(0), 1000); this.renderTTSControls(); };
          this.utterance.onerror = () => { this.isPlaying = false; this.updateAudioProgress(0); this.renderTTSControls(); };
          this.isPlaying = true; this.updateAudioProgress(0); this.renderTTSControls();
          window.speechSynthesis.speak(this.utterance);
        }
      },
      handleStopSpeak() { if ('speechSynthesis' in window) { window.speechSynthesis.cancel(); this.isPlaying = false; this.updateAudioProgress(0); if(this.view === 'result' || this.view === 'detail') this.renderTTSControls(); } },
      updateAudioProgress(percent) { this.audioProgress = percent; const bar = document.getElementById('audio-progress-bar'); if (bar) bar.style.width = `${percent}%`; },

      // Search & Print
      setArchiveTab(tab) { this.archiveTab = tab; this.renderArchiveList(); },
      handleSearch(e) { this.searchQuery = e.target.value; this.renderArchiveList(); },
      clearSearch() { this.searchQuery = ''; document.getElementById('archive-search-input').value = ''; this.renderArchiveList(); },

              <div class="print-card-header">

                1. Separate cards into 4 decks by icon.<br><br>
                2. Draw 1 card from each deck.<br><br>
                3. Design Fiction: Address the <b>[Failure]</b> using the <b>[Recovery]</b> to restore the <b>[Logic]</b>, built as a <b>[Form]</b>.<br><br>
                4. Discard and redraw to iterate.
              </div>
            </div>
          </div>
        `;

        const blankCard = `
          <div class="print-cut-zone">
            <div class="print-card" style="border-color: #aaa; border-style: dashed; background-color: #fff !important;">
              <div class="print-card-header">

        const renderPage = (cards) => `<div class="print-page">${cards.join('')}</div>`;

        let allPrintCards = [rulesCard];
        DATABASE.problems.forEach(i => allPrintCards.push(renderPrintCard('FAILURE', i, '#B23A2E')));

        for (let i = 0; i < allPrintCards.length; i += 8) { html += renderPage(allPrintCards.slice(i, i + 8)); }

        pContainer.innerHTML = html; window.print();

      renderNav() { document.getElementById('nav-root').innerHTML = this.view === 'onboarding' ? '' : this.htmlNavBar(); lucide.createIcons(); },
      renderMenu() { document.getElementById('side-menu-root').innerHTML = this.htmlSideMenu(); lucide.createIcons(); },
      renderPlayCards() { const c = document.getElementById('play-cards-container'); if(c && !this.isWildcardMode) { c.innerHTML = this.htmlPlayCards(); lucide.createIcons(); } },
      renderPlayActions() { const c = document.getElementById('play-actions-container'); if(c) { c.innerHTML = this.htmlPlayActions(); lucide.createIcons(); } },
      renderArchiveList() { const c = document.getElementById('archive-list-container'); if(c) { c.innerHTML = this.htmlArchiveList(); lucide.createIcons(); } },
      renderTTSControls() { const c = document.getElementById('tts-controls-container'); if(c) { c.innerHTML = this.htmlTTSControls(); lucide.createIcons(); } }
    };

    window.onload = () => app.init();
  </script>
</body>
</html>
