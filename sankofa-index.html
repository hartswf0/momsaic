<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sankofa</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">

  <style>
    :root {
      --ink: #171717;
      --paper: #f7f4ec;
      --line: #d9d2c3;
      --muted: #6f685f;
      --red: #bd554e;
      --amber: #d6a044;
      --teal: #429c9b;
      --sans: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      --mono: "Space Mono", ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
    }

    * { box-sizing: border-box; }

    html,
    body {
      margin: 0;
      min-height: 100%;
      font-family: var(--sans);
      background: var(--paper);
      color: var(--ink);
    }

    body {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
    }

    main {
      width: min(680px, 100%);
    }

    header {
      margin-bottom: 40px;
    }

    h1 {
      margin: 0;
      font-size: clamp(52px, 10vw, 96px);
      line-height: .88;
      letter-spacing: -.075em;
      font-weight: 900;
    }

    p {
      margin: 18px 0 0;
      color: var(--muted);
      font-size: 18px;
      line-height: 1.4;
      max-width: 420px;
    }

    nav {
      display: grid;
      gap: 12px;
    }

    a {
      min-height: 94px;
      padding: 20px 22px;
      border: 1px solid var(--line);
      border-radius: 18px;
      color: var(--ink);
      text-decoration: none;
      display: grid;
      grid-template-columns: auto 1fr auto;
      align-items: center;
      gap: 18px;
      background: rgba(255, 255, 255, .28);
      transition: border-color .16s ease, transform .16s ease, background .16s ease;
    }

    a:hover,
    a:focus-visible {
      border-color: var(--ink);
      background: rgba(255, 255, 255, .52);
      transform: translateY(-1px);
      outline: none;
    }

    .badge {
      width: 54px;
      height: 54px;
      border: 1px solid var(--ink);
      border-radius: 14px;
      display: grid;
      place-items: center;
      font-size: 28px;
      font-weight: 700;
      letter-spacing: -.06em;
    }

    .meta {
      font-family: var(--mono);
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: .08em;
      font-weight: 700;
      color: var(--muted);
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 6px;
    }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 999px;
      display: inline-block;
    }

    .red { background: var(--red); }
    .amber { background: var(--amber); }
    .teal { background: var(--teal); }

    .title {
      font-size: 24px;
      line-height: 1;
      letter-spacing: -.04em;
      font-weight: 900;
    }

    .url {
      margin-top: 8px;
      font-family: var(--mono);
      font-size: 11px;
      color: var(--muted);
      word-break: break-all;
    }

    .arrow {
      font-size: 30px;
      color: var(--muted);
      line-height: 1;
    }

    footer {
      margin-top: 28px;
      font-family: var(--mono);
      font-size: 11px;
      color: var(--muted);
    }

    @media (max-width: 560px) {
      body { padding: 18px; place-items: start center; }
      main { padding-top: 36px; }
      header { margin-bottom: 30px; }
      a { min-height: 86px; grid-template-columns: auto 1fr; }
      .arrow { display: none; }
      .badge { width: 48px; height: 48px; font-size: 24px; }
      .title { font-size: 22px; }
      p { font-size: 16px; }
    }
  </style>
</head>
<body>
  <main>
    <header>
      <h1>Sankofa</h1>
      <p>Choose an operating surface.</p>
    </header>

    <nav aria-label="Sankofa versions">
      <a href="https://hartswf0.github.io/momsaic/sanko-core.html" target="_blank" rel="noopener noreferrer" onclick="openExactUrl(event, 'https://hartswf0.github.io/momsaic/sanko-core.html')">
        <span class="badge">A</span>
        <span>
          <span class="meta"><span class="dot red"></span>A / CORE</span>
          <span class="title">Course OS</span>
          <span class="url">https://hartswf0.github.io/momsaic/sanko-core.html</span>
        </span>
        <span class="arrow">›</span>
      </a>

      <a href="https://hartswf0.github.io/momsaic/sanko-plus.html" target="_blank" rel="noopener noreferrer" onclick="openExactUrl(event, 'https://hartswf0.github.io/momsaic/sanko-plus.html')">
        <span class="badge">B</span>
        <span>
          <span class="meta"><span class="dot amber"></span>B / PLUS</span>
          <span class="title">Futures Lab</span>
          <span class="url">https://hartswf0.github.io/momsaic/sanko-plus.html</span>
        </span>
        <span class="arrow">›</span>
      </a>

      <a href="https://hartswf0.github.io/momsaic/sanko-00.html" target="_blank" rel="noopener noreferrer" onclick="openExactUrl(event, 'https://hartswf0.github.io/momsaic/sanko-00.html')">
        <span class="badge">C</span>
        <span>
          <span class="meta"><span class="dot teal"></span>C / 00</span>
          <span class="title">Design Lab</span>
          <span class="url">https://hartswf0.github.io/momsaic/sanko-00.html</span>
        </span>
        <span class="arrow">›</span>
      </a>
    </nav>

    <footer>Live pages open in a new tab.</footer>
  </main>

  <script>
    function openExactUrl(event, url) {
      event.preventDefault();
      const opened = window.open(url, '_blank', 'noopener,noreferrer');
      if (!opened) window.location.href = url;
    }

    const links = [...document.querySelectorAll('a[href]')];
    console.assert(links.length === 3, 'Expected exactly three Sankofa links.');
    console.assert(links[0].href === 'https://hartswf0.github.io/momsaic/sanko-core.html', 'A should link to the exact sanko-core URL.');
    console.assert(links[1].href === 'https://hartswf0.github.io/momsaic/sanko-plus.html', 'B should link to the exact sanko-plus URL.');
    console.assert(links[2].href === 'https://hartswf0.github.io/momsaic/sanko-00.html', 'C should link to the exact sanko-00 URL.');
    console.assert(typeof openExactUrl === 'function', 'openExactUrl should exist for sandbox-safe navigation.');
  </script>
</body>
</html>
